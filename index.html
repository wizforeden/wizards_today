  W38:{MEET:["저기, 여기는 어디예요? 저 사람들은 뭘 쓰는 거예요? 이곳의 마법은 어떤 수식을 쓰나요? 언어를 기반으로 작동하는 것 같은데 정말이에요? 그러면 혹시…… 아, 저, 저는 준이에요…….."],MEET_AGAIN:["이제 알겠어! 마소가 마법진 대신 매개체로 작용하는 거야. 그러니까 마법진이 없어도 마도서와 마소만으로 마법이 작동하는 거지! 하지만 그러면 수급할 수 있는 마소 양에 따라 마법의 기동 범위가 좌우되니까 상당히 불안정할 텐데 이곳 마법사들은 정말…… 아…… 미, 미안, 혹시 바쁜 일 중이었어?"],TASK_MATCH:["나! 내가 해 볼게! 자, 잘해낼 거야…!"],TASK_UNMATCH:["자, 잠깐만…… 이런 건 에이미가 잘할 것 같은데…….(두리번거리며 에이미를 찾는다)","으응? 고, 고요한테 물어보고 와도 돼…….?","데, 데인티보단 잘할 수 있을 거야……."],TASK_SUCCESS:["어때? 잘 된 것 같아? 응?"],TASK_FAILURE:["아, 안 돼……! 실수했다……!(거대한 폭발음이 들린다.)","나 혹시…… 여기선 도움이 안 되는 걸까……?"],LV_UP:{1:["언제까지 여기에 있을 수 있을까? 있는 동안 새로운 '마법'을 배우고 싶은데……. 여기는 다들 엄청나게 강하고 똑똑한 것 같아."],2:["고요랑- 다른 친구들은 잘 적응하고 있을까? 나한테는 잘 말해주지 않지만 내심 고생 중일지도 몰라…… 내가 익숙해져서 도와줄 수 있으면 좋을 텐데."],3:["있잖아, 다들 나한테 「요정」이냐는 말을 하는데, 내 생각에 「요정」은 노움과는 다른 것 같아. 이곳의 마법생물학적 분류에 따르면 「요정」의 특징은……. ……호, 혹시 재미 없어?"],4:["이곳에도 축제가 있다니 너무 기대 돼! 맥주도 마시겠지? 나, 예전에 드워프들이 만든 맥주를 먹어 본 적이 있어! 이곳의 맥주는 어떨까? 있잖아, 같이 가 줄 거지?"]}},
  W39:{MEET:["안녕하세요, 이사야 코엔이라고 합니다."],MEET_AGAIN:["안녕하세요, 잠은 푹 주무셨나요?"],TASK_MATCH:["도와드릴까요?"],TASK_UNMATCH:["이…렇게 하면 될까요?"],TASK_SUCCESS:["수고하셨습니다."],TASK_FAILURE:["이런…. 미안합니다. 다음에 다시 시도해 볼까요?"],LV_UP:{1:["아, 네. 결혼했다는 말을 안했었나요? 나스타샤 벨로바-코엔 양이 제 아내입니다. 다 함께 식사라도 할 수 있으면 좋을 텐데요."],2:["이것들이 모두 마도서인가요…? 정말로 제가 읽어도 괜찮은 건가요…? …신이시여…."],3:["이상한 사건들에 휘말리는 것이 벅차지 않다고 하면 거짓말이겠지만… 그만큼 얻은 것들도 있다고 생각합니다. 이곳의"],4:["세상이 아무리 바뀌어도 여전히 쓸모 있는 지식도 있다니 다행입니다. 차가 취향에 맞으면 좋겠네요. 아니어도 건강에는 좋은 약이니까 잘 보관해 두세요."]}},

  W41:{MEET:["…여긴 또 어디…?! 이 녀석이 한 짓인가?!(달려들어 당신의 팔을 뒤로 꺾으려 한다)"],MEET_AGAIN:["앗… 또 너야? (한숨을 푹) 저번엔 의심해서 미안했는데…(여전히 의심스러운 눈이다)"],TASK_MATCH:["이걸 하면 되는 거지?"],TASK_UNMATCH:["내가? 흠…"],TASK_SUCCESS:["좋아, 이제 일당을… 응? 그런 건 없다고?"],TASK_FAILURE:["하암-… 미련이 남으면 또 불러. 난 일단 쉬러 간다-"],LV_UP:{1:["…프레데리카 볼프. 편한 대로 불러."],2:["마법이라는 거 말이야, 유용하지만 너무 빠져드는 것을 보면… 조금 불안하기도 해. …미안, 네게 할 말은 아니네."],3:["어때? 조금 익숙해진 것 같지만… 그래, 아직은 부족하지. 괜찮으면 연습 상대가 되어주지 않을래? 자, 받아봐!"],4:["새 명함을 만들어 봤어. 곤란한 일이 생기면 이쪽으로 연락해. 내 친구들이지만 꽤 괜찮은 탐정사무소였거든. 지금은 나도 좀 더 쓸모있어졌고."]}},

const FB_JOURNALS = {
  W01:["시그너스는 서가에서 오래된 고서를 찾아냈다. 조금 복잡한 표정으로 그것을 쓰다듬었다. 무슨 사연이 있었을까?","시그너스가 전서구에 매달린 편지를 받았다. 읽고 난 그의 표정이 조금 부드러워졌다.","시그너스는 하루 종일 안락의자에서 느긋한 하루를 보낸 것 같다.","시그너스는 오랜만에 외출한 모양이다. 금방 올 것 같았는데, 왠지 지친 표정으로 밤 늦게 귀가했다. 누군가에게 시달린 걸까?"],
  W02:["호타루는 오랜만에 스바루와 드럼을 연습했다. 곧 라이브 일정이 있을지도?","호타루는 재기발랄한 학원생들 덕분에 하루 종일 학원을 동분서주했다. 귀가하자마자 풀썩 쓰러졌다.","호타루는 대법전의 서공과 진지한 대화를 나누었던 모양이다. 평소보다 조금 어두운 얼굴로 돌아나왔다.","호타루는 한참 동안 옷을 고르며 외출 준비를 했다. 오늘은 늦을지도 모른다고 어딘지 비장한 표정으로 말하고 나갔다."],
  W03:["릴리메이는 며칠 동안 전화를 붙잡고 씨름하더니, 드디어 분과회원을 불러내는 데 성공한 모양이다. 오늘은 조금 늦는다며 기뻐 보이는 얼굴로 나갔다.","릴리메이는 예언서에 꽂아둔 책갈피를 한참이나 물끄러미 바라보았다. 어떤 미래를 보고 있는 걸까?","오늘 릴리메이는 쇼핑을 마치고 행복한 표정으로 돌아왔다. 데보라를 잔뜩 괴롭혔다며 즐거워했다. ...그래도 되는 거야?","오늘은 릴리메이의 신작 발표회가 있었다. 세상이 온통 대여배우의 화려한 복귀로 들썩였다."],
  W04:["시타는 오랜만에 학원에 방문했다. 어린 학생들의 동경 어린 시선이 부끄러우면서도 싫지만은 않았던 것 같다.","시타는 아침부터 엽귀의 소집 명령을 받고 다녀왔다. 돌아온 눈빛이 평소보다 어둡다. ","놀이공원 성에 공주가 살고 있다는 유튜브가 게시되었다. 소문을 해명하기 위해 시타는 하루종일 진땀을 빼야 했다.","시타는 영화관에서 수상한 마력을 감지하고 온종일 추격전을 벌였다. 엉망이 된 옷차림보다도 신작 영화를 놓쳐 우울해 보인다."],
  W05:["데네브가 무언가를 끄적이더니 전서구에 매달아 보냈다. 의기양양해 보인다.","데네브는 하루 종일 나무 위에서 낮잠을 잤다. 간신히 찾아낸 분과회원들이 잔소리를 하지만 건성으로 들은 게 틀림없지.","데네브가 용의 형상으로 꿈을 꾼 모양이다. 잠꼬대를 하며 작은 불꽃을 내뱉는 바람에 커튼 한쪽이 조금 그슬리고 말았다.","한밤중, 데네브는 훌쩍 창문 너머로 뛰어내리더니 잠시 후 거대한 용이 되어 하늘을 날아올랐다. 근사한 야간 비행을 했다."],
  W06:["초롱은 놀이공원에서 꼬마 손님들과 한바탕 술래잡기를 했다. 돌아와 탈을 벗자마자 김이 날 정도로 온 힘을 다한 모양이다.","초롱은 학원의 친구들과 비밀 회동을 했다. 무슨 모의를 했는지, 가방 안에서 수상한 마법 폭죽들이 잔뜩 쏟아져 나왔다.","초롱은 분과회원들과 유행한다는 과자 만들기를 했다. 코코아 가루를 묻힌 경단이 대량 생산되었다.","초롱은 시타가 뜨던 옷을 몰래 입어 보다가 실수로 망가뜨리고 말았다. 시타가 돌아오기 전까지 필사적으로 수복한다던데, 결과는 과연……. "],
  W07:["오늘 가흠의 레코드샵에는 손님이 한 명도 없었다. 하루 종일 주인장 취향의 오래된 노래가 흘러나왔다.","가흠이 심각한 얼굴로 꽃집에서 꽃다발을 골랐다. 특별한 날은 아닌 것 같았는데….","원탁 상사의 부름을 받고 나간 가흠은 하루 종일 자리를 비웠다. 조금 지친 표정으로 귀가했다.","오늘 가흠은 분과회원들과 MT를 갔다. 시작부터 자동차 타이어가 펑크 났다던데, 이래저래 험난했던 모양이다."],
  W08:["리온은 대청소를 했다. 네로가 들어가지 말라는 방에 실수로 들어갔다가 새파래진 얼굴로 뛰쳐나왔다.","오늘 리온은 분과회원들과 MT를 갔다. 간신히 강릉 숙소에 도착해서 기진맥진해 뻗고 말았다. 원래 가려던 곳은 포천이었던 것 같은데….","리온은 고모의 강권에 못 이겨 슬램덩크를 읽기 시작했다. 처음에는 심드렁하더니 결국 식음을 전폐하며 독서 삼매경에 빠지고 말았다.","리온은 하루 종일 꾸벅꾸벅 졸았다. 어제 밤 늦게까지 서공 마법을 익혔던 모양이다. "],
  W09:["네로가 업로드한 유튜브가 알고리즘을 탔다. 세계의 음모론이 조금 짙어졌지만, 아무튼 마법계의 비밀은 지켜냈다.","네로는 하루 종일 카페에 앉아 사람을 구경했다. 어느 때보다 즐거운 표정이었다.","네로는 방에 틀어박힌 하루를 보냈다. 방에서는 인간의 귀로 포착할 수 없는 소리들이 들려온다… 착각이겠지.","네로는 분과회원들과 MT를 다녀왔다. 괴담 영상의 새로운 소재를 찾아냈다며 즐거운 듯 웃었다."],
  W10:["유리디스는 앨범을 정리하다가 생각에 잠겼다. 기억나지 않는 누군가 있는 걸까?","유리디스는 쇼핑몰에서 힘든 시간을 보냈다. 토라진 앵커의 마음을 풀어줘야 하는 모양이다. ","임무 배분 오류로, 유리디스는 하루 동안 다섯 건이나 임무를 처리해야 했다. 내색하지 않아서 아무도 눈치채지 못했다.","유리디스는 리디아와 모처럼 맛집에 다녀왔다. 혈당 스파이크로 유명한 디저트를 먹으며 간만에 휴식을 취한 것 같다."],
  W11:["리디아는 신규 문호 마법사를 보살피느라 하루 종일 쉴 틈이 없었다. 목이 쉴 지경일 텐데, 표정만은 상냥하고 밝다.","리디아는 방에서 혼자 눈을 감고 손을 모으고 한참을 보냈다. 누군가에게 기도하는 걸까?","리디아는 유리디스와 모처럼 맛집에 갔다. 디저트는 너무 달아서 먹을 수 없었지만 녹차가 훌륭했기에 만족했다.","리디아의 동물병원은 하루 종일 바빴다. 물 마실 틈도 없는 리디아를 보고 묘묘가 혀를 찼지만 본인은 행복한 듯했다."],
  W12:["판은 하루 종일 작업실에서 보냈다. 마감이 코앞에 다가온 담당자의 성화를 피하려고 핸드폰까지 꺼 둔 것 같다.","판은 공방을 정리하며 하루를 보냈다. 외전의 오래된 장정들을 한편에 가지런히 쌓아두었다.","판은 캐럴과 피크닉을 갔다. 사람이 너무 많아서 금세 지치고 말았지만 즐거운 하루였다.","판은 기다리던 새 마도서를 얻어서 모처럼 신이 난 것 같다. 길에서 마주치자 먼저 인사해 주었다."],
  W13:["캐럴은 〈별빛 기행〉의 장거리 여행에서 돌아왔다. 신기한 특산물들을 잔뜩 사 돌린 덕분에 문호가 시끌벅적해졌다.","캐럴은 창가에 앉아 턱을 괴고 하염없이 우주의 풍경을 바라보았다. 어디를 보고 있을까?","캐럴은 마도서 장정을 조금 보수받았다. 신이 나서 하루 종일 종소리를 울리고 다녔다.","캐럴은 판과 피크닉을 갔다. 사진을 잔뜩 찍었지만 다른 사람에게는 보여주지 말라는 판의 신신당부를 들었다."],
  W14:["사요는 악몽을 꾼 것 같다. 재이와 타르가 작당해서 아방궁을 몰락시켰다고 한다. 무슨 개꿈인가 싶으면서도 하루 종일 두 사람을 보는 사요의 눈빛이 착잡했다.","오랜만에 타토와 타르가 사요의 폐가에 찾아왔다. 둘이 사이좋게 뛰어노는 모습을 사요는 흐뭇하게 지켜보았다."],
  W15:["오랜만에 쇼핑을 즐기던 세르비가 우연히 분과회원을 발견했다. 안색을 바꾸지 않고 그대로 돌아 나온 모양이다.","세르비는 미아 씨와 좋은 일이 있었던 것 같다. 하루 종일 꿈을 꾸는 것처럼 몽롱해 보였지만 아무도 말을 걸지 못했다."],
  W16:["비가 내리는 날, 하루종일 누군가의 시선이 느껴지는 것 같다. 에이, 착각이겠지… 응? 저건… 당신의 시야 가장자리에서 휙! 털짐승의 꼬리 같은 것이 보였다 사라진다. 꿈인가?","선글라스와 모자를 쓴 레위가 즐거운 표정으로 누군가를 주시하고 있었다. 눈이 마주쳤더니 '쉿'이라고 한다. …뭘 하고 있는 걸까?","레위에게 옛 제자가 찾아왔다. 얼굴을 붉힌 소녀들이 꺄꺄거리더니 초콜릿 따위를 잔뜩 주고 갔다. 당연하다는 표정으로 받던데…… 의외로 제법 팬이 많았던 걸까?"],
  W17:["재이는 자신의 공방에 들어가려다가 말고 멈칫하더니 잠시 고민하다가 그대로 돌아 다른 곳으로 가 버렸다. 한참 후에 재이의 공방에서 마법사 넷이 우르르 나왔다."],
  W18:["타토는 신입생들에게 달리기 실력을 뽐내고 하루 종일 우쭐해 있었다. 내일은 뜀틀 시합을 한다고 한다."],
  W19:["아야메는 오늘 2개의 기관과 3개의 분과회, 5명의 앵커들에게 도움을 요청받았다. 밥은 먹고 다니는 걸까?"],
  W20:["로사의 정원에 장미가 만개했다는 소문이 돌았다. 누가 총대를 메고 방문을 허락받을 것인지 눈치 싸움이 시작되었다.","로사의 정원에 불청객이 찾아왔다. 불운하게 마법문을 넘었던 이경의 침입자들은 대법전 정원사의 냉혹함을 맛봐야 했다."],
  W21:["눈을 마주친 핀이 음흉하게 웃으며 '좋은 꿈 꿨어?' 하고 물었다. ……그러고 보니 무슨 꿈을 꿨더라?","핀은 저녁부터 단골 바에 들어가 혼자서 멍하니 시간을 보냈다. 칵테일 잔을 쓰다듬으며 무언가를 고민하는 듯했다."],
  W22:["타르는 오랜만에 사요의 집에 방문했다. 다소 시끄러운 군식구가 한 명 더 있었지만 그럭저럭 만족스러운 시간이었다."],
  W23:["모처럼 고요가 낮잠을 자는 동안 준과 에이미, 데인티가 하나둘씩 모여들더니 단체로 옹기종기 낮잠을 잤다. 먼저 깬 고요가 몸을  움직일 수 없어 난감해 했다.","고요는 혼자 산에 다녀온 모양이다. 분과회원들은 모두 거절했던 걸까?","원탁의 복도에서 고요와 마주쳤다. 기분 탓인지 평소와는 조금 다른 분위기가 느껴져서 함부로 말을 걸기 어려웠다.","에이미와 준이 한국의 '경주시'에 관심을 가졌다. 하루 종일 기상천외한 질문을 고요에게 쏟아냈다."],
  W24:["새벽에 데인티가 주방에서 밀크티 우리는 모습을 보고 깜짝 놀란 에이미가 한바탕 소동을 벌였다. 밀크티는 결국 먹지 못했다.","시장을 구경한다고 나갔던 데인티가 야바위장에서 발견됐다. 이미 한탕 한 모양인지 주머니가… 아주 허름했다. ","찻잔 속의 찻잎을 살피던 데인티가 묘한 표정을 지었다. 뭔가 보였던 걸까?","모처럼 아무도 없는 캠벨가, 데인티는 평소 꺼내보지 않던 물건을 만지작거리며 멍하니 침대를 굴러다녔다."],
  W25:["준은 마도서를 해독하다가 막혔는지, 하루 종일 어항 속 금붕어를 바라보며 멍하니 머리를 비웠다.","준이 서고 위험 구역에 특별 허가를 얻었다. 너무 흥분한 나머지 들어가자마자 대뜸 금서를 집어들어 쫓겨날 뻔했다.","한동안 두문불출하던 준이 분과회원들을 닮은 강아지 인형을 만들어서 선물했다. 인형은 조금 못생겼지만 다들 기뻐했다.","준이 개발한 마법 약물이 원탁의 판매 허가를 얻었다. 다 같이 축하 파티를 했는데, 와인 대신 약을 따르는 바람에 큰 사고가 날 뻔했다."],
  W26:["에이미는 새벽부터 덤벨을 들다가, 갑자기 뛰어들어 온 코하네 덕분에 중심을 잃어 집 바닥을 움푹 패게 만들었다.","에이미가 요즘 핫한 데이트 스팟에 출몰한다고 주변이 술렁거렸다. 정작 본인은 길거리 양아치들을 훈계하느라 데이트는 뒷전이었다.","에이미가 물고기며 조개를 한가득 들고 왔다. '보이길래 잡았어'라고 하는데, 대체 어디서?","에이미가 밀린 집안일을 하겠다며 대청소를 시작했다. 실수로 준의 연구 일지를 깨끗하게 분리수거할 뻔했다. "],
  W27:["리스가 누구와 함께 임무할지를 두고 아키와 아리엘이 왁왁 싸워댔다. 팔 한 쪽씩 붙잡힌 리스는 돌부처처럼 체념한 표정이었다.","우연히 게임 센터를 돌아다니던 누군가 리스가 코인 노래방에 들어가는 것을 보았다며 혼란스러워했다. 모두가 그의 수면 부족을 걱정해 주었다.","아키의 보고를 듣던 리스가 '3줄로 요약해줘' 라고 말했다가 3시간 동안 잔소리를 들었다.","에어컨이 고장난 덕분에 지부에 비상이 걸릴 뻔했다. 리스가 수제 빙수를 만들어 주며 간신히 폭동의 위기를 잠재웠다."],
  W28:["아키는 뒷골목에서 수상한 밀담을 엿듣다가 한바탕 추격전을 벌였다. 옷자락의 그을음을 들켜 레몬에게 놀림받았다.","게임 센터의 기기에 '팬텀'이라는 닉네임이 신기록을 도배했다. 수군대는 사람들 뒤로 아키가 기분 좋은 듯 걸어나왔다.","아키는 치카를 놀리다가 너무 당황한 치카에게 그만 한 대 맞고 말았다. 세 시간 후 간신히 정신을 차리곤 침울해졌다.","아키는 게임 센터를 지나가다가 노래방 기계로 들어가는 익숙한 뒷모습을 발견했다. 설마……. 아니겠지… ?"],
  W29:["치카는 노래방에서 신곡을 연습하다가 마법 소녀로 변신하는 연출을 시도했다. 너무 몰입한 나머지 방 안의 미러볼을 깨뜨려 변상해야 했다.","치카가 소품 편집샵에서 한정판 인형을 뽑기 위해 전 재산을 탕진했다. 아키에게 잔소리를 듣고 카드를 압수당했지만, 인형을 안고 행복해 보였다.","비가 오는 탓이었을까? 오늘따라 치카는 조금 센티멘털한 표정으로 창가에 기대 있었다. 고양이로 변한 레몬이 고롱고롱 안겨 주었다.","치카가 촬영한 일상 사진이 SNS에서 화제가 되었다. 정작 사진의 주인공인 아키가 삭제를 요구하며 치카를 추격하는 진풍경이 벌어졌다."],
  W30:["산책을 나갔던 레몬은 조용한 명당을 발견했다. 실컷 낮잠을 잤다고 생각했는데 이틀 동안 안 보여서 걱정했다며 치카가 꽉 안고 엉엉 울었다.","레몬이 뒷골목에서 고양이들에게 밥을 주던 중, 불행한 양아치들이 시비를 걸었다. 살벌한 소리가 뒷골목에 울려퍼졌다. ","레몬은 치카의 권유에 못 이겨 블로그에 영화 리뷰를 올렸다. SNS에서 묘한 화제가 되어 댓글이 수십 개나 달리자 귀찮다고 글을 지워 버렸다.","뒷골목을 산책하던 레몬은 아키가 시시한 녀석들에게 쫓겨다니는 것을 보았다. 재미있어 보여서 구경하다가 아키가 탈출한 것을 확인하고 녀석들을 마무리해 주었다."],
  W31:["백우는 오늘 지나가는 신호등마다 대기 없이 초록불에 건널 수 있었다. 어쩐지 세상이 자기에게 경의를 바치는 것 같아 대단히 의기양양해졌다."],
  W32:["로웬은 하루 종일 문호에서 불려다니느라 철야를 해야 했다. 다행히 책상에 엎드려 잔 쪽잠에 와플이 나와줘서 다시 기운을 낼 수 있었다."],
  W33:["오도르는 헨치를 업그레이드하는 데 꼬박 하루를 쏟았다. 뭐가 잘못된 건지, '거처 디폴트값'이 자꾸만 로웬의 집으로 설정되는 바람에 애를 먹었다."],
  W34:["밀렌은 먼지 쌓인 성을 대청소했다. 문득 용도 없이 버려진 방들이 눈에 띄어서 조만간 정리해야겠다고 마음 먹었다. …원래 빈 방이었던가?"],
  W35:["고요는 우연히 도시의 기도당에 들렀다. 조금 흥미로운 듯 둘러보다가 '이쪽이 조금 더 점잖은 것 같네' 하고 쓴웃음을 지었다.","혼자서 쉬던 고요가 작은 소리로 찬트를 흥얼거렸다. 이전 시대의 언어였을까?","이곳의 고대 마법서를 발견한 준의 질문 세례를 피하느라 고요가 진땀을 뺐다. 나중에 몰래 그 마법서를 처분하는 것 같던데, 알려주기 싫은 내용이라도 쓰여 있던 걸까?"],
  W36:["데인티는 「요정」에 대한 설명을 흥미롭게 듣는 것 같았지만 막상 만나 보더니 노골적으로 김이 빠진 표정을 지었다. '엘프'랑은 다르다는 모양이다.","데인티는 「전이」를 터득하더니 하루 종일 불쑥불쑥 나타나서 동료를 놀래키는 데 재미를 붙인 것 같다.","데인티는 다양한 학파의 이야기에 관심을 가지고 들었다. 대법전은 그다지 그의 흥미를 끌지 못했던 것 같은데……."],
  W37:["에이미는  이곳의 마법을 공부하던 준을 잡아다가 불도마뱀 골목을 구경하러 다녔다. 쓸데없는 지출을 잔뜩 하는 바람에 고요가 이마를 짚었지만 꽤 즐거운 시간이었던 것 같다.","에이미는 하루 종일 준을 관찰했다. 노움의 생태를 완벽하게 이해했다며 의기양양해졌다. 준은 짜증을 냈다.","해마를 처리하기 위한 물리전 인원에 에이미가 차출되었다. 다녀와서는 '이곳의 몬스터도 크게 다르지 않네' 하고 즐거운 듯 콧노래를 불렀다. 아니, 꽤 다르지 않나…? "],
  W38:["준은 마소와 마법진의 대응 관계에 대한 논문을 쓰겠다며 하루 종일 머리를 싸매더니 시무룩해졌다. 아직은 이쪽 세계의 마법에 대한 이해가 부족한 모양이다.","준은 이곳에서는 '순간이동'이 매우 평범한 능력이라는 사실을 듣고 크게 충격을 받았다. 이후에 자신도 속주를 쓸 수 있게 되자 금세 행복해져서 열심히 남용하기 시작했다.","준은 신기한 고대 마법서를 발견했다. 고요에게 무슨 뜻인지 묻고 싶었지만 어째서인지 하루 종일 찾아다녀도 보이지 않아 포기해야 했다."],
  W39:["이사야는 하루 종일 도서관에 틀어박혀 있었다. 마도서를 잔뜩 쌓아 놓은 탓에 얼굴도 안 보일 지경이었다. 어째 하나같이 표지가 좀 무시무시했는데… 괜찮겠지? ","이사야는 현역 마법 의사가 마법병에 대해 설명해 주는 것을 흥미롭게 들었다. 무언가 자신의 노트에 휘갈겨 쓰는 것 같았지만 다른 사람은 해독할 수 없는 필기체였다."],
  W40:["나스타샤는 요즘 마법사들의 무도회에 푹 빠졌다 싶더니 무도회 연출에 쓰이는 마법을 순식간에 익혀 버렸다. 집안이 온통 꽃으로 넘쳐흘러서 이사야가 감탄했다.","나스타샤는 친구들을 끌고 불도마뱀 골목을 쇼핑했다. 언제 그렇게 많은 상인들과 안면을 튼 건지, 쇼핑백에 허덕이면서도 모두가 감탄했다."],
  W41:["프레데리카는 「외전」이라는 존재의 설명을 듣더니 흥미를 가진 것 같다. 공방을 구경하겠다며 아방궁 골목으로 사라지더니 밤늦게서야 돌아왔다. ","볼프 탐정사무소에 의뢰가 들어왔다. 언제나처럼 자리를 비운 나스타샤 대신 프레데리카가 의뢰를 접수했다가 덜컥 마법재액을 해결해 버리고 말았따."],
  W42:["니코는 환혹관에 하루 종일 틀어박혀 있었다. 밤에는 프레데리카에게 자신이 본 것을 설명하려고 했지만 도저히 설명할 수가 없어서 허우적대다가 낙담해 버렸따.","니코는 의뢰를 해결하기 위해 잠복 임무를 했다. 변신 마법을 처음으로 실전에서 써 본 모양인데 꽤 만족스러운 눈치였다."],
};

// ── 모듈 레벨 게임 데이터 (동적 로드 후 업데이트) ────────────────────────────
// ── 게임 데이터 (하드코드) ──────────────────────────────────────────────────────
var _dlg = FB_DLG;
var _journals = FB_JOURNALS;
var _tasks = FB_TASKS;
var _wizardDefs = FB_WIZARDS;

// ── Storage 유틸 ──────────────────────────────────────────────────────────────
function storeSet(k,v){try{localStorage.setItem(k,v);}catch(e){}return Promise.resolve();}
function storeGet(k){try{return Promise.resolve(localStorage.getItem(k));}catch(e){return Promise.resolve(null);}}
function storeDel(k){try{localStorage.removeItem(k);}catch(e){}return Promise.resolve();}

// ── 게임 유틸 ─────────────────────────────────────────────────────────────────
function gameDay(){
  var now=new Date();
  if(now.getHours()<5)now=new Date(now.getTime()-864e5);
  var y=now.getFullYear();
  var m=String(now.getMonth()+1).padStart(2,'0');
  var d=String(now.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function weekKey(){
  var now=new Date();
  if(now.getHours()<5)now=new Date(now.getTime()-864e5);
  var day=now.getDay();
  var diff=now.getDate()-(day===0?6:day-1);
  var mon=new Date(now.getFullYear(),now.getMonth(),diff);
  return mon.getFullYear()+'-'+String(mon.getMonth()+1).padStart(2,'0')+'-'+String(mon.getDate()).padStart(2,'0');
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function getLine(wId,key){var a=_dlg[wId]&&_dlg[wId][key];return Array.isArray(a)&&a.length?pick(a):null;}
function getLvUpLine(wId,lv){var a=_dlg[wId]&&_dlg[wId].LV_UP&&_dlg[wId].LV_UP[lv];return a&&a.length?pick(a):'…';}
function mkSlot(){return{taskId:null,wizardId:null,status:'idle',dialogue:null,tagMatch:false,isSystem:false,systemText:null,startedAt:null};}
function mkSystemSlot(wiz){
  var text=wiz.name+wiz.josa+' '+pick(SYS_SUBJECTS)+' '+pick(SYS_ACTIONS)+'.';
  return{taskId:'__system__',wizardId:wiz.id,status:'system_active',dialogue:null,tagMatch:false,isSystem:true,systemText:text};
}
function finalizeLog(dl){
  if(dl.finalized)return dl;
  var completedCount=(dl.entries||[]).filter(e=>e.dir==='up'&&e.source==='task').length;
  var journalWizardId=null,journalText=null,journalUnread=false;
  if(completedCount>=3){
    var candidates=Object.entries(dl.affinityTotals||{})
      .filter(([wId,data])=>data.total>0&&_journals[wId]);
    if(candidates.length>0){
      var chosen=candidates[Math.floor(Math.random()*candidates.length)];
      journalWizardId=chosen[0];
      journalText=pick(_journals[chosen[0]]);
      journalUnread=true;
    }
  }
  return{...dl,finalized:true,completedCount,journalWizardId,journalText,journalUnread};
}

// ── UI 컴포넌트 ───────────────────────────────────────────────────────────────
function Avatar({wiz,size}){
  var s=size||36;var[err,setErr]=useState(false);
  var st={width:s,height:s,borderRadius:'50%',overflow:'hidden',flexShrink:0,border:'0.5px solid rgba(0,0,0,0.12)'};
  if(wiz.img&&!err)return<div style={st}><img src={wiz.img} onError={()=>setErr(true)} alt={wiz.name} style={{width:'100%',height:'100%',objectFit:'cover'}}/></div>;
  return<div style={st}><div style={{width:'100%',height:'100%',background:wiz.bg,display:'flex',alignItems:'center',justifyContent:'center',fontSize:s*0.38,fontWeight:600,color:wiz.accent}}>{wiz.name[0]}</div></div>;
}
function AffinityRow({wiz,aff,chg,lv,lvTrans}){
  var threshold=lv<5?LV_REQ[lv]:LV_REQ[4],isMax=lv>=5;
  function cl(v){return Math.min(Math.max(v,0),threshold);}
  var base=isMax?threshold:cl(chg?chg.from:aff);
  var barBase=base/threshold*100;
  var dPct=chg&&!isMax?Math.min(Math.abs(chg.delta)/threshold*100,100-barBase):0;
  var dLeft=(chg&&chg.dir==='up')?barBase:cl(aff)/threshold*100;
  var numLabel=isMax?'MAX':(chg?chg.from+'→'+aff+'/'+threshold:aff+'/'+threshold);
  var lvLabel=lvTrans?<span style={{fontWeight:600}}>{'운명 Lv.'+lvTrans.from}<span style={{opacity:0.5}}> → </span>{'운명 Lv.'+lvTrans.to}</span>:<span>{'운명 Lv.'+lv}</span>;
  return(
    <div style={{marginBottom:6}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
        <span style={{fontSize:12,color:wiz.accent,fontWeight:600}}>{wiz.name}</span>
        <span style={{fontSize:11,color:wiz.accent,opacity:0.75}}>{lvLabel}</span>
      </div>
      <div style={{height:4,background:'rgba(0,0,0,0.1)',borderRadius:2,overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',left:0,top:0,height:'100%',width:barBase+'%',background:wiz.accent,opacity:0.5,borderRadius:2,transition:'width 0.3s'}}/>
        {chg&&!isMax&&<div style={{position:'absolute',left:dLeft+'%',top:0,height:'100%',width:dPct+'%',background:chg.dir==='up'?'#5A9A48':'#C05050',borderRadius:2}}/>}
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:3}}>
        <span style={{fontSize:10,color:'rgba(0,0,0,0.35)'}}>{numLabel}</span>
      </div>
    </div>
  );
}

        <button onClick={onClose} style={{fontSize:11,color:w.accent,background:'rgba(255,255,255,0.6)',border:'0.5px solid '+w.border,borderRadius:20,padding:'3px 10px',cursor:'pointer'}}>닫기</button>
      </div>
      <div style={{display:'flex',gap:12,alignItems:'center'}}>
        <Avatar wiz={w} size={48}/>

// ── 임무 선택 모달 ────────────────────────────────────────────────────────────
function TaskPickerModal({tasks,favTasks,selected,onSelect,onClose}){
  var favIds=favTasks||[];
  var favList=tasks.filter(t=>!t.isCustom&&favIds.includes(t.id)).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  var customList=tasks.filter(t=>t.isCustom).sort((a,b)=>a.name.localeCompare(b.name,'ko'));
  var otherList=TASK_TAG_ORDER.flatMap(tag=>tasks.filter(t=>!t.isCustom&&!favIds.includes(t.id)&&t.tag===tag));
  function chip(t,keyPfx){
    var sel=selected===t.id;
    return<span key={(keyPfx||'')+t.id} onClick={()=>{onSelect(t.id);onClose();}} style={{fontSize:12,padding:'5px 12px',borderRadius:20,border:'0.5px solid '+(sel?'var(--color-primary)':'rgba(0,0,0,0.13)'),background:sel?'var(--color-primary)':'rgba(255,255,255,0.9)',color:sel?'white':'var(--color-text-primary)',cursor:'pointer',transition:'all 0.12s',fontWeight:sel?500:400}}>{t.name}</span>;
  }
  return(
    <Overlay>
      <div style={{background:'white',borderRadius:14,padding:'20px 18px',maxWidth:310,width:'92%',border:'0.5px solid #D8D8D8',boxShadow:'0 6px 28px rgba(0,0,0,0.10)',maxHeight:'78vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <span style={{fontSize:12,fontWeight:600,letterSpacing:'0.3px',color:'var(--color-text-secondary)'}}>임무 선택</span>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:15,cursor:'pointer',color:'rgba(0,0,0,0.3)',lineHeight:1,padding:'2px 4px'}}>✕</button>
        </div>
        {favList.length>0&&(
          <>
            <div style={{fontSize:10,color:'var(--color-primary)',marginBottom:6,letterSpacing:'0.3px',fontWeight:600}}>즐겨찾기</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
              {favList.map(t=>chip(t,'fav_'))}
            </div>
            <div style={{borderTop:'0.5px solid rgba(0,0,0,0.07)',marginBottom:10}}/>
          </>
        )}
        {customList.length>0&&(
          <>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:10}}>
              {customList.map(t=>chip(t,'c_'))}
            </div>
            <div style={{borderTop:'0.5px solid rgba(0,0,0,0.07)',marginBottom:10}}/>
          </>
        )}
        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
          {otherList.map(t=>chip(t,''))}
        </div>
      </div>
    </Overlay>
  );
}

// ── 마법사 선택 모달 ──────────────────────────────────────────────────────────
function WizardPickerModal({wizards,disabledIds,affinity,level,onSelect,onClose}){
  var[sortMode,setSortMode]=useState(0); // 0=기본(운명↑), 1=분과회, 2=이름
  var[sortMsg,setSortMsg]=useState('');
  var sortLabels=['','분과회 순 정렬','이름 순 정렬'];

  function handleSortToggle(){
    var next=(sortMode+1)%3;
    setSortMode(next);
    setSortMsg(next===0?'서먹한 순 정렬':sortLabels[next]);
    setTimeout(()=>setSortMsg(''),1000);
  }

  var sorted=[...wizards].sort((a,b)=>{
    if(sortMode===0){
      var la=level[a.id]||1,lb=level[b.id]||1;
      if(la!==lb)return la-lb;
      var aa=affinity[a.id]||0,ab=affinity[b.id]||0;
      if(aa!==ab)return aa-ab;
      return a.name.localeCompare(b.name,'ko');
    }
    if(sortMode===1){
      var cc=a.club.localeCompare(b.club,'ko');
      return cc!==0?cc:a.name.localeCompare(b.name,'ko');
    }
    return a.name.localeCompare(b.name,'ko');
  });

  return(
    <Overlay>
      <div style={{background:'white',borderRadius:14,padding:'20px 18px',maxWidth:310,width:'92%',border:'0.5px solid #D8D8D8',boxShadow:'0 6px 28px rgba(0,0,0,0.10)',maxHeight:'78vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:12,fontWeight:600,letterSpacing:'0.3px',color:'var(--color-text-secondary)'}}>마법사 선택</span>
            <button onClick={handleSortToggle} title="정렬 변경"
              style={{width:20,height:20,borderRadius:'50%',border:'0.5px solid rgba(0,0,0,0.15)',background:'white',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,color:'rgba(0,0,0,0.4)',flexShrink:0,padding:0}}>⇅</button>
            {sortMsg&&<span style={{fontSize:10,color:'#3A6A28'}}>{sortMsg}</span>}
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:15,cursor:'pointer',color:'rgba(0,0,0,0.3)',lineHeight:1,padding:'2px 4px'}}>✕</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {sorted.map(w=>{
            var dis=disabledIds.includes(w.id);
            var lv=level[w.id]||1;
            var aff=affinity[w.id]||0;
            return(
              <div key={w.id} onClick={()=>{if(!dis){onSelect(w.id);onClose();}}}
                style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:10,border:'0.5px solid '+(dis?'rgba(0,0,0,0.07)':w.border),background:dis?'rgba(0,0,0,0.025)':w.bg,cursor:dis?'not-allowed':'pointer',opacity:dis?0.38:1,transition:'opacity 0.12s'}}>
                <Avatar wiz={w} size={34}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:dis?'rgba(0,0,0,0.3)':w.accent,marginBottom:1}}>{w.name}</div>
                  <div style={{fontSize:10,color:'rgba(0,0,0,0.38)'}}>운명 {lv} · {w.club}</div>
                </div>
                {dis
                  ?<span style={{fontSize:10,color:'rgba(0,0,0,0.28)',flexShrink:0}}>배정됨</span>
                  :<span style={{fontSize:10,color:'rgba(0,0,0,0.3)',flexShrink:0}}>{aff}pt</span>
                }
              </div>
            );
          })}
        </div>
      </div>
    </Overlay>
  );
}
function Overlay({children}){
  return<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.28)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100}}>{children}</div>;
}

function SparkleLoader({msg}){

// ── 설정 패널 ─────────────────────────────────────────────────────────────────
function SettingsPanel({onClose,onReset,onBackup,onRestore,clubFilter,onChangeClubs,allWizards,mahwa,onInstantChange,favTasks,onChangeFavTasks,allTasks,customTasks,onDeleteCustomTask}){
  var fileRef=useRef(null);
  var[msg,setMsg]=useState('');
  var[customHex,setCustomHex]=useState('');
  var[subModal,setSubModal]=useState(null); // 'fav' | 'club' | 'custom'
  var[editFavs,setEditFavs]=useState(favTasks||[]);
  var[editClubs,setEditClubs]=useState(clubFilter?clubFilter.clubs:[]);
  var[deleteConfirm,setDeleteConfirm]=useState(null); // taskId
  var[showInstantConfirm,setShowInstantConfirm]=useState(false);
  var currentColor=getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim();
  var allClubs=[...new Set(allWizards.map(w=>w.club))].sort((a,b)=>a.localeCompare(b,'ko'));

  var canChangeClubs=true;
  var nextChangeDate=null;
  if(clubFilter&&clubFilter.changedAt){
    var changed=new Date(clubFilter.changedAt);
    var diff=(Date.now()-changed.getTime())/(1000*60*60*24);
    if(diff<30){
      canChangeClubs=false;
      var next=new Date(changed.getTime()+30*24*60*60*1000);
      nextChangeDate=next.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
    }
  }

  function handleFile(e){
    var f=e.target.files[0];if(!f)return;
    var reader=new FileReader();
    reader.onload=ev=>{try{onRestore(JSON.parse(ev.target.result));}catch{setMsg('파일을 읽을 수 없습니다.');}};
    reader.readAsText(f);e.target.value='';
  }
  function handleCustomInput(){
    var hex=customHex.trim();
    if(!/^#[0-9A-Fa-f]{6}$/.test(hex)){setMsg('올바른 색상 코드를 입력하세요. 예: #A07828');return;}
    applyPrimaryColor(hex);setMsg('');setCustomHex('');
  }
  function toggleEditClub(club){setEditClubs(prev=>prev.includes(club)?prev.filter(c=>c!==club):[...prev,club]);}
  function handleSaveClubs(){
    if(editClubs.length===0)return;
    onChangeClubs(editClubs);
    setSubModal(null);
    setMsg('✓ 수집 필터가 업데이트되었습니다');
    setTimeout(()=>setMsg(''),2000);
  }
  function toggleFav(taskId){
    setEditFavs(prev=>{
      if(prev.includes(taskId))return prev.filter(id=>id!==taskId);
      if(prev.length>=10)return prev;
      return[...prev,taskId];
    });
  }
  function handleSaveFavs(){
    onChangeFavTasks(editFavs);
    setSubModal(null);
    setMsg('✓ 즐겨찾기가 저장되었습니다');
    setTimeout(()=>setMsg(''),2000);

  return(<>
    <Overlay>
      <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'90%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)',maxHeight:'88vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:msg?8:20}}>
          <span style={{fontSize:13,fontWeight:500,color:'var(--color-text-secondary)'}}>설정</span>

        </div>
        {msg&&<div style={{fontSize:11,color:msg.startsWith('✓')?'#3A6A28':'#8A3030',textAlign:'center',marginBottom:12}}>{msg}</div>}

          {/* 테마 색상 */}

            <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:8}}>테마 색상</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:8}}>
              {PALETTE_COLORS.map(p=>(
                <div key={p.hex} onClick={()=>{applyPrimaryColor(p.hex);setMsg('✓ 적용되었습니다');setTimeout(()=>setMsg(''),3000);}} title={p.label} style={{cursor:'pointer'}}>
                  <div style={{width:36,height:36,borderRadius:'50%',background:p.hex,border:currentColor===p.hex?'2.5px solid rgba(0,0,0,0.5)':'2px solid rgba(0,0,0,0.08)',boxSizing:'border-box'}}/>

            <div style={{display:'flex',gap:6}}>

            <input ref={fileRef} type="file" accept=".json" style={{display:'none'}} onChange={handleFile}/>
            <button onClick={onReset} style={{width:'100%',padding:'10px 0',borderRadius:8,border:'0.5px solid #D0A0A0',background:'white',fontSize:13,cursor:'pointer',color:'#8A3030'}}>데이터 초기화</button>
          </div>
        </div>
      </div>
    </Overlay>

    {/* 즐겨찾기 서브모달 */}
    {subModal==='fav'&&(
      <Overlay>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'90%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)',maxHeight:'80vh',overflowY:'auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>

          <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:14}}>{editFavs.length}/10 선택됨</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
            {allTasks.filter(t=>!t.isCustom).sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(t=>{

        </div>
      </Overlay>
    )}

    {/* 수집 필터 서브모달 */}
    {subModal==='club'&&(
      <Overlay>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'90%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)',maxHeight:'80vh',overflowY:'auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{fontSize:13,fontWeight:500,color:'var(--color-text-secondary)'}}>수집 필터</span>
            <button onClick={()=>setSubModal(null)} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:'rgba(0,0,0,0.35)',lineHeight:1}}>✕</button>
          </div>
          {!canChangeClubs&&(
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:12,textAlign:'center'}}>
              {nextChangeDate} 변경 가능
              <button onClick={()=>setShowInstantConfirm(true)} style={{display:'block',margin:'6px auto 0',fontSize:10,color:'var(--color-primary)',background:'none',border:'0.5px solid var(--color-primary)',borderRadius:4,cursor:'pointer',padding:'2px 8px'}}>즉시 변경 (300닢)</button>
            </div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
            {allClubs.map(club=>{
              var checked=editClubs.includes(club);
              var disabled=!canChangeClubs;
              return(
                <div key={club} onClick={disabled?undefined:()=>toggleEditClub(club)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 12px',borderRadius:8,border:'0.5px solid '+(checked?'var(--color-primary)':'rgba(0,0,0,0.1)'),background:checked?'rgba(184,146,42,0.05)':'transparent',cursor:disabled?'default':'pointer',opacity:disabled?0.5:1}}>
                  <span style={{fontSize:12,color:checked?'var(--color-primary)':'var(--color-text-primary)',fontWeight:checked?500:400}}>{club}</span>

                    {checked&&<span style={{color:'white',fontSize:9,lineHeight:1}}>✓</span>}

      <Overlay>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'90%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)',maxHeight:'80vh',overflowY:'auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>

          </div>
          <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:14}}>{(customTasks||[]).length}/5</div>
          {(customTasks||[]).length===0
            ?<div style={{fontSize:12,color:'var(--color-text-tertiary)',textAlign:'center',padding:'20px 0'}}>등록된 창작 임무가 없습니다.</div>
            :<div>
              <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'center',marginBottom:10}}>
                {(customTasks||[]).map(t=>(
                  <div key={t.id} style={{display:'flex',alignItems:'center',gap:3}}>
                    <span style={{fontSize:12,padding:'5px 11px',borderRadius:20,border:'0.5px solid rgba(0,0,0,0.12)',background:'white',color:'var(--color-text-primary)'}}>{t.name}</span>
                    <button onClick={()=>setDeleteConfirm(deleteConfirm===t.id?null:t.id)} style={{width:18,height:18,borderRadius:'50%',border:'none',background:'var(--color-primary)',color:'white',fontSize:10,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',padding:0,flexShrink:0,lineHeight:1}}>✕</button>
                  </div>
                ))}
              </div>
              {deleteConfirm&&(customTasks||[]).find(t=>t.id===deleteConfirm)&&(
                <div style={{padding:'10px 12px',borderRadius:8,border:'0.5px solid #D0A0A0',background:'#FDF5F5'}}>
                  <div style={{fontSize:11,color:'#8A3030',marginBottom:8}}>"{(customTasks||[]).find(t=>t.id===deleteConfirm).name}"을 삭제할까요?</div>
                  <div style={{display:'flex',gap:7}}>
                    <button onClick={()=>setDeleteConfirm(null)} style={{flex:1,padding:'6px 0',borderRadius:6,border:'0.5px solid #D0D0D0',background:'white',fontSize:12,cursor:'pointer',color:'var(--color-text-secondary)'}}>취소</button>
                    <button onClick={()=>{onDeleteCustomTask(deleteConfirm);setDeleteConfirm(null);}} style={{flex:1,padding:'6px 0',borderRadius:6,border:'none',background:'#8A3030',color:'white',fontSize:12,fontWeight:500,cursor:'pointer'}}>삭제</button>
                  </div>

        </div>
      </Overlay>
    )}

    {/* 즉시 변경 확인 모달 */}
    {showInstantConfirm&&(
      <Overlay>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>마화 300닢을 지불하여{'\n'}즉시 수집 필터 설정을 변경할까요?</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowInstantConfirm(false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>아니오</button>

// ── 제보 모달 ────────────────────────────────────────────────────────────────
var REPORT_ENDPOINT='https://wizforeden.harmful00.workers.dev/';
var REPORT_SITUATIONS=[
  {key:'TASK_MATCH',label:'임무 배정(특기)'},
  {key:'TASK_UNMATCH',label:'임무 배정'},
  {key:'TASK_SUCCESS',label:'임무 성공'},
  {key:'TASK_FAILURE',label:'임무 포기'},
  {key:'MEET_AGAIN',label:'재회'},
  {key:'JOURNALTEXT',label:'일상 기록'},
  {key:'etc',label:'기타'}
];
function ReportModal({onClose,wizards,playerName,reportInfo,onReportSuccess,addMahwaLog,setMahwa,clubFilter}){
  var[selWiz,setSelWiz]=useState('');
  var[selSit,setSelSit]=useState('');
  var[text,setText]=useState('');
  var[status,setStatus]=useState('idle');
  var today=gameDay();
  var todayCount=reportInfo.date===today?(reportInfo.count||0):0;
  var canReport=todayCount<3;
  var mahwaReward=5;

  // owned와 clubFilter에 해당하는 캐릭터 전체
  var available=wizards.filter(w=>w.owned||!clubFilter||!clubFilter.clubs||clubFilter.clubs.length===0||clubFilter.clubs.includes(w.club))
    .sort((a,b)=>a.name.localeCompare(b.name,'ko'));

  async function handleSubmit(){
    if(!selWiz||!selSit||!text.trim())return;
    setStatus('sending');
    try{
      var sitLabel=REPORT_SITUATIONS.find(s=>s.key===selSit)?.label||selSit;
      var res=await fetch(REPORT_ENDPOINT,{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({'닉네임':playerName||'(익명)','캐릭터':selWiz,'상황':sitLabel,'대사':text.trim(),'반영':false})
});
      if(!res.ok)throw new Error('fail');
      if(canReport){
        setMahwa(n=>{var nx=n+mahwaReward;addMahwaLog('report',+mahwaReward,nx,'대사 제보 보상');return nx;});
        onReportSuccess(today,todayCount+1);
      }
      setStatus('done');
    }catch(e){setStatus('error');}
  }

  var selStyle={width:'100%',padding:'8px 10px',borderRadius:8,border:'0.5px solid #D0D0D0',fontSize:12,outline:'none',fontFamily:'inherit',color:'var(--color-text-primary)',background:'white',marginBottom:10,boxSizing:'border-box'};

  return(
    <Overlay>
      <div style={{background:'white',borderRadius:14,padding:'24px 20px',maxWidth:310,width:'92%',border:'0.5px solid #D8D8D8',boxShadow:'0 6px 28px rgba(0,0,0,0.10)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <span style={{fontSize:13,fontWeight:500,color:'var(--color-text-secondary)'}}>마법사 데이터 제보</span>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:'rgba(0,0,0,0.35)',lineHeight:1}}>✕</button>
        </div>
        {status==='done'?(
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <div style={{fontSize:13,color:'var(--color-text-primary)',marginBottom:6,lineHeight:1.8}}>수집에 협조해 주셔서 감사합니다.</div>
            {todayCount<=3&&<div style={{fontSize:11,color:'#3A6A28',marginBottom:16}}>마화 {mahwaReward}닢을 받았습니다. (오늘 {todayCount}/3회)</div>}
            <button onClick={onClose} style={{padding:'8px 28px',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,cursor:'pointer'}}>확인</button>
          </div>
        ):status==='error'?(
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <div style={{fontSize:13,color:'#8A3030',marginBottom:16}}>전송에 실패했습니다. 잠시 후 다시 시도해 주세요.</div>
            <button onClick={()=>setStatus('idle')} style={{padding:'8px 28px',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,cursor:'pointer'}}>다시 시도</button>
          </div>
        ):(
          <>
            <div style={{fontSize:11,color:canReport?'var(--color-text-tertiary)':'#8A3030',marginBottom:12,textAlign:'right'}}>제보 시 마화 {mahwaReward}닢 지급<br/>오늘 {todayCount}/3회 제보</div>
            <select value={selWiz} onChange={e=>setSelWiz(e.target.value)} style={selStyle}>
              <option value=''>마법사 선택</option>
              {available.map(w=><option key={w.id} value={w.name}>{w.name} ({w.club})</option>)}
            </select>
            <select value={selSit} onChange={e=>setSelSit(e.target.value)} style={selStyle}>
              <option value=''>상황 선택</option>
              {REPORT_SITUATIONS.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
            </select>
            <textarea value={text} onChange={e=>setText(e.target.value)} placeholder="대사를 입력하세요" rows={4}
              style={{width:'100%',padding:'8px 10px',borderRadius:8,border:'0.5px solid #D0D0D0',fontSize:12,outline:'none',fontFamily:'inherit',color:'var(--color-text-primary)',resize:'vertical',marginBottom:14,boxSizing:'border-box'}}/>
            <button onClick={(selWiz&&selSit&&text.trim()&&canReport&&status!=='sending')?handleSubmit:undefined}
              disabled={!selWiz||!selSit||!text.trim()||!canReport||status==='sending'}
              style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',
                background:(selWiz&&selSit&&text.trim()&&canReport)?'var(--color-primary)':'rgba(0,0,0,0.07)',
                color:(selWiz&&selSit&&text.trim()&&canReport)?'white':'rgba(0,0,0,0.3)',
                fontSize:13,fontWeight:500,cursor:(selWiz&&selSit&&text.trim()&&canReport)?'pointer':'not-allowed'}}>
              {status==='sending'?'전송 중…':canReport?'제보하기':'오늘 제보 한도 도달'}
            </button>
          </>
        )}
      </div>
    </Overlay>
  );
}

// ── 슬롯 카드 ─────────────────────────────────────────────────────────────────
function SystemSlotCard({slot,wizards,onAskSysReset,idx}){
  var wiz=wizards.find(w=>w.id===slot.wizardId);
  var bg=wiz?wiz.bg:'#F5F5F5',bdr=wiz?wiz.border:'#E0E0E0';
  return(
    <div style={{background:bg,borderRadius:'var(--border-radius-lg)',border:'0.5px solid '+bdr,padding:'12px 14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
        <span style={{fontSize:11,padding:'2px 9px',borderRadius:20,background:'rgba(0,0,0,0.05)',color:'rgba(0,0,0,0.35)',fontWeight:500}}>자유 행동 중</span>
        {wiz&&onAskSysReset&&<button onClick={()=>onAskSysReset(idx,wiz.name)} style={{width:18,height:18,borderRadius:'50%',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.6)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'rgba(0,0,0,0.35)',padding:0}}>✕</button>}
      </div>
      <div style={{fontSize:12,color:'rgba(0,0,0,0.48)',lineHeight:1.7,fontFamily:"Georgia,'Nanum Myeongjo',serif",fontStyle:'italic'}}>
        {slot.systemText||'지금은 대기실에 아무도 없다…….'}
      </div>
    </div>
  );
}
function SlotCard({slot,idx,confirmed,affinity,affinityChanges,level,lvTransitions,onUpd,usedWizIds,wizards,tasks,onAskForfeit,onSlotReset,allDone,onAskActivate,onAskComplete,onAskSysReset,favTasks}){
  var[showTaskModal,setShowTaskModal]=useState(false);
  var[showWizModal,setShowWizModal]=useState(false);
  if(slot.isSystem)return<SystemSlotCard slot={slot} wizards={wizards} onAskSysReset={onAskSysReset} idx={idx}/>;
  var wiz=wizards.find(w=>w.id===slot.wizardId);
  var task=tasks.find(t=>t.id===slot.taskId);
  var aff=wiz?affinity[wiz.id]:0,chg=wiz?affinityChanges[wiz.id]:null;
  var lv=wiz?level[wiz.id]:1,lvTrans=wiz?lvTransitions[wiz.id]:null;
  var disW=usedWizIds.filter(id=>id!==slot.wizardId);
  var ownedWiz=wizards.filter(w=>w.owned).sort((a,b)=>{var aDis=disW.includes(a.id),bDis=disW.includes(b.id);if(aDis!==bDis)return aDis?1:-1;var cc=a.club.localeCompare(b.club,'ko');return cc!==0?cc:a.name.localeCompare(b.name,'ko');});
  var bg=wiz?wiz.bg:'#F0F0F0',bdr=wiz?wiz.border:'#DCDCDC',acc=wiz?wiz.accent:'#888';
  function onTask(taskId){var w=wizards.find(w=>w.id===slot.wizardId),t=tasks.find(t=>t.id===taskId);var tm=!!(w&&t&&w.tags.includes(t.tag));onUpd(idx,{taskId,tagMatch:tm,dialogue:w?getLine(slot.wizardId,tm?'TASK_MATCH':'TASK_UNMATCH'):null});}
  function onWiz(wId){var w=wizards.find(w=>w.id===wId),t=tasks.find(t=>t.id===slot.taskId);var tm=!!(w&&t&&w.tags.includes(t.tag));onUpd(idx,{wizardId:wId,tagMatch:tm,dialogue:getLine(wId,tm?'TASK_MATCH':'TASK_UNMATCH')});if(slot.editing&&slot.taskId)onAskActivate(idx);}
  return(
    <div style={{background:bg,borderRadius:'var(--border-radius-lg)',border:'0.5px solid '+bdr,padding:'12px 14px',transition:'background 0.5s,border-color 0.5s'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:wiz?10:8}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,padding:'2px 9px',borderRadius:20,background:slot.status==='idle'?'rgba(0,0,0,0.06)':slot.status==='active'?'rgba(0,0,0,0.08)':slot.status==='done'?'rgba(80,140,60,0.15)':'rgba(180,60,60,0.12)',color:slot.status==='idle'?'rgba(0,0,0,0.38)':slot.status==='active'?acc:slot.status==='done'?'#3A6A28':'#8A3030',fontWeight:500}}>{slot.status==='idle'?'대기':slot.status==='active'?'진행 중':slot.status==='done'?'완료':'포기'}</span>
          {slot.status==='idle'&&slot.wizardId&&<button onClick={()=>onUpd(idx,{wizardId:null,dialogue:null,tagMatch:false})} style={{width:18,height:18,borderRadius:'50%',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.6)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'rgba(0,0,0,0.35)',padding:0}}>✕</button>}
        </div>
      </div>
      {wiz&&<AffinityRow wiz={wiz} aff={aff} chg={chg} lv={lv} lvTrans={lvTrans}/>}
      {(!confirmed||slot.editing)&&(
        <div style={{display:'flex',gap:7}}>
          <button onClick={()=>setShowTaskModal(true)} style={{flex:1,padding:'7px 10px',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.55)',fontSize:12,color:slot.taskId?'var(--color-text-primary)':'var(--color-text-tertiary)',cursor:'pointer',textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {task?task.name:'임무 선택'}
          </button>
          <button onClick={()=>{if(slot.taskId)setShowWizModal(true);}} disabled={!slot.taskId} style={{flex:1,padding:'7px 10px',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr,background:!slot.taskId?'rgba(0,0,0,0.03)':'rgba(255,255,255,0.55)',fontSize:12,color:slot.wizardId?'var(--color-text-primary)':!slot.taskId?'rgba(0,0,0,0.2)':'var(--color-text-tertiary)',cursor:!slot.taskId?'not-allowed':'pointer',textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',opacity:!slot.taskId?0.5:1}}>
            {wiz?wiz.name:'마법사 선택'}
          </button>
        </div>
      )}
      {showTaskModal&&<TaskPickerModal tasks={tasks} favTasks={favTasks} selected={slot.taskId} onSelect={onTask} onClose={()=>setShowTaskModal(false)}/>}
      {showWizModal&&<WizardPickerModal wizards={ownedWiz} disabledIds={disW} affinity={affinity} level={level} onSelect={onWiz} onClose={()=>setShowWizModal(false)}/>}
      {confirmed&&!slot.editing&&task&&<div style={{fontSize:13,color:'rgba(0,0,0,0.5)',marginBottom:8}}><span style={{fontWeight:500,color:acc}}>{task.name}</span></div>}
      {wiz&&slot.dialogue&&<div style={{display:'flex',gap:10,alignItems:'flex-start',marginTop:0,padding:'9px 11px',background:'rgba(255,255,255,0.55)',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr}}><Avatar wiz={wiz} size={40}/><div><div style={{fontSize:11,fontWeight:500,color:acc,marginBottom:2}}>{wiz.name}</div><div style={{fontSize:12,color:'rgba(0,0,0,0.55)',lineHeight:1.6}}>{slot.dialogue}</div></div></div>}
      {confirmed&&slot.status==='active'&&<div style={{display:'flex',gap:8,marginTop:10}}><button onClick={()=>onAskComplete(idx,slot.startedAt)} style={{flex:2,background:acc,color:'white',border:'none',borderRadius:'var(--border-radius-md)',padding:'8px 0',fontSize:13,fontWeight:500,cursor:'pointer'}}>완료</button><button onClick={()=>onAskForfeit(idx)} style={{flex:1,background:'rgba(255,255,255,0.55)',color:'#8A3030',border:'0.5px solid #D0A0A0',borderRadius:'var(--border-radius-md)',padding:'8px 0',fontSize:13,cursor:'pointer'}}>포기</button></div>}
{confirmed&&!slot.isSystem&&(slot.status==='done'||slot.status==='forfeited')&&!allDone&&<button onClick={()=>onSlotReset(idx)} style={{width:'100%',marginTop:8,padding:'7px 0',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.6)',color:'rgba(0,0,0,0.45)',fontSize:12,cursor:'pointer'}}>새 임무 배정</button>}
    </div>
  );
}

// ── 인트로 ───────────────────────────────────────────────────────────────────
function IntroScreen({wizards,setWizards,onComplete}){
  var INTRO="오래된 책 냄새에 눈을 뜬다.\n당신은 누구지?\n이름이란 해내는 일로써 정의되는 것.\n마법의 힘은 명명하는 힘.\n그렇다면 분명,\n당신이 수행하는 하루하루의 임무는…….\n…\n…\n한 권의 책이 당신 앞에 나타난다.";
  var[phase,setPhase]=useState('text');
  var[charPos,setCharPos]=useState(0);
  var[queue,setQueue]=useState([]);
  var[acqIdx,setAcqIdx]=useState(0);
  var[acqWiz,setAcqWiz]=useState(null);
  var[typed,setTyped]=useState('');
  var[full,setFull]=useState('');
  var[showResult,setShowResult]=useState(false);
  var[nameInput,setNameInput]=useState('');
  var[selectedClubs,setSelectedClubs]=useState([]);

  // 전체 club 목록 추출
  var allClubs=[...new Set(wizards.map(w=>w.club))].sort((a,b)=>a.localeCompare(b,'ko'));

  useEffect(()=>{
    if(phase!=='text')return;
    if(charPos>=INTRO.length){var t=setTimeout(()=>setPhase('askName'),1000);return()=>clearTimeout(t);}
    var delay=INTRO[charPos]==='\n'?600:58;
    var t=setTimeout(()=>setCharPos(p=>p+1),delay);return()=>clearTimeout(t);
  },[phase,charPos]);

  function handleNameConfirm(){
    if(!nameInput.trim())return;
    // 모든 club 기본 선택
    setSelectedClubs(allClubs);
    setPhase('selectClub');
  }

  function toggleClub(club){
    setSelectedClubs(prev=>prev.includes(club)?prev.filter(c=>c!==club):[...prev,club]);
  }

  function handleClubConfirm(){
    if(selectedClubs.length===0)return;
    var filtered=wizards.filter(w=>!w.owned&&selectedClubs.includes(w.club));
    var q=filtered.slice().sort(()=>Math.random()-0.5).slice(0,2);
    setQueue(q);
    if(q.length>0)doAcquire(q,0);
    else setPhase('mahwaPopup');
  }

  function doAcquire(q,idx){
    if(idx>=q.length){setPhase('mahwaPopup');return;}
    var wiz=q[idx];var txt=getLine(wiz.id,'MEET')||'…';
    setWizards(p=>p.map(w=>w.id===wiz.id?{...w,owned:true}:w));
    setAcqWiz(wiz);setFull(txt);setTyped('');setShowResult(false);setAcqIdx(idx);setPhase('acquiring');
  }
  useEffect(()=>{
    if(phase!=='acquiring'||showResult)return;
    if(typed.length>=full.length){var t=setTimeout(()=>setShowResult(true),800);return()=>clearTimeout(t);}
    var t=setTimeout(()=>setTyped(p=>full.slice(0,p.length+1)),45);return()=>clearTimeout(t);
  },[phase,typed,full,showResult]);
  useEffect(()=>{
    if(!showResult||phase!=='acquiring')return;
    var q=queue,idx=acqIdx;
    var t=setTimeout(()=>doAcquire(q,idx+1),2000);return()=>clearTimeout(t);
  },[showResult,acqIdx,queue]);

  var isLight=phase==='acquiring'||phase==='mahwaPopup'||phase==='selectClub';
  return(
    <div style={{minHeight:'100vh',background:isLight?'#F4F4F2':'#15161C',transition:'background 1.2s ease',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',boxSizing:'border-box'}}>
      {phase==='text'&&<div style={{maxWidth:340,width:'100%',fontFamily:"Georgia,'Nanum Myeongjo',serif",fontSize:15,lineHeight:2.3,color:'#C8C4B4',letterSpacing:'0.3px',whiteSpace:'pre-line'}}>{INTRO.slice(0,charPos)}<span style={{opacity:0.4}}>▌</span></div>}
      {phase==='askName'&&<>
        <div style={{maxWidth:340,width:'100%',fontFamily:"Georgia,'Nanum Myeongjo',serif",fontSize:15,lineHeight:2.3,color:'#C8C4B4',letterSpacing:'0.3px',whiteSpace:'pre-line',marginBottom:32}}>{INTRO}</div>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'100%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',marginBottom:14,textAlign:'center',fontFamily:"Georgia,'Nanum Myeongjo',serif",lineHeight:1.8}}>당신의 이름?</div>
          <input value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&nameInput.trim())handleNameConfirm();}} autoFocus style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'0.5px solid #D0D0D0',fontSize:13,outline:'none',marginBottom:12,boxSizing:'border-box',fontFamily:'inherit',color:'var(--color-text-primary)'}}/>
          <button onClick={handleNameConfirm} disabled={!nameInput.trim()} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:nameInput.trim()?'var(--color-primary)':'rgba(0,0,0,0.07)',color:nameInput.trim()?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:nameInput.trim()?'pointer':'not-allowed'}}>확인</button>
        </div>
      </>}
      {phase==='selectClub'&&(
        <div style={{maxWidth:320,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{fontSize:15,fontWeight:500,color:'var(--color-text-primary)',marginBottom:8,fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>이 세계에 있는 마법사들</div>
            <div style={{fontSize:12,color:'var(--color-text-tertiary)',lineHeight:1.8}}>당신의 세계에 반영할 분과회를 선택하세요.<br/>선택한 분과회의 마법사들만 이곳에 등장합니다.</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:24}}>
            {allClubs.map(club=>{
              var checked=selectedClubs.includes(club);
              var clubWizards=wizards.filter(w=>w.club===club);
              return(
                <div key={club} onClick={()=>toggleClub(club)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderRadius:10,border:'0.5px solid '+(checked?'var(--color-primary)':'rgba(0,0,0,0.1)'),background:checked?'rgba(184,146,42,0.06)':'white',cursor:'pointer',transition:'all 0.15s'}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:checked?500:400,color:checked?'var(--color-primary)':'var(--color-text-primary)'}}>{club}</div>
                    <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginTop:2}}>{clubWizards.map(w=>w.name).join(' · ')}</div>
                  </div>
                  <div style={{width:18,height:18,borderRadius:'50%',border:'1.5px solid '+(checked?'var(--color-primary)':'rgba(0,0,0,0.2)'),background:checked?'var(--color-primary)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s'}}>
                    {checked&&<span style={{color:'white',fontSize:10,lineHeight:1}}>✓</span>}
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={handleClubConfirm} disabled={selectedClubs.length===0} style={{width:'100%',padding:'11px 0',borderRadius:10,border:'none',background:selectedClubs.length>0?'var(--color-primary)':'rgba(0,0,0,0.07)',color:selectedClubs.length>0?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:selectedClubs.length>0?'pointer':'not-allowed'}}>
            {selectedClubs.length>0?`${selectedClubs.length}개 분과회 선택 완료`:'1개 이상 선택해 주세요'}
          </button>
        </div>
      )}
      {phase==='acquiring'&&acqWiz&&(
        <div style={{maxWidth:380,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:16}}><div style={{fontSize:11,color:'rgba(0,0,0,0.3)',letterSpacing:'1px'}}>{acqIdx+1} / {queue.length}</div></div>
          <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:acqWiz.bg,borderRadius:12,border:'0.5px solid '+acqWiz.border}}>
            <Avatar wiz={acqWiz} size={48}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:acqWiz.accent,marginBottom:6}}>{acqWiz.name}</div>
              <div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{typed}{typed.length<full.length&&<span style={{opacity:0.4}}>▌</span>}</div>
            </div>
          </div>
          {showResult&&<div style={{marginTop:12,textAlign:'center',padding:'11px',background:'rgba(255,255,255,0.7)',borderRadius:10,border:'0.5px solid rgba(0,0,0,0.07)'}}><div style={{fontSize:13,color:'rgba(0,0,0,0.55)',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>{acqWiz.name} 수집 성공!</div></div>}
        </div>
      )}
      {phase==='mahwaPopup'&&(
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>초기 자금으로 마화 80닢이 지급되었습니다.</div>
          <button onClick={()=>onComplete(nameInput,selectedClubs)} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
        </div>
      )}
    </div>
  );
}

// ── 임무 페이지 ───────────────────────────────────────────────────────────────
function MissionPage({wizards,tasks,mahwa,doneCount,affinity,affinityChanges,level,lvTransitions,lvUpEvent,setLvUpEvent,onUpd,onConfirmMission,onReset,onSlotReset,slots,confirmed,favTasks,inventory,logs}){
  var[modal,setModal]=useState(null);
  var[diceMsg,setDiceMsg]=useState('');
  function formatElapsed(startedAt){
    if(!startedAt)return '알 수 없는 시간';
    var mins=Math.floor((Date.now()-startedAt)/60000);
    if(mins<1)return '1분 미만';
    if(mins<60)return mins+'분';
    var h=Math.floor(mins/60),m=mins%60;
    return m>0?h+'시간 '+m+'분':h+'시간';
  }

  function handleRandomAssign(){
    var idleSlots=slots.map((sl,i)=>({sl,i})).filter(({sl})=>!sl.isSystem&&sl.status==='idle'&&!sl.wizardId);
    if(idleSlots.length===0)return;
    var targets=idleSlots.filter(({sl})=>sl.taskId);
    if(targets.length===0){setDiceMsg('error:먼저 임무를 설정해 주세요.');setTimeout(()=>setDiceMsg(''),3000);return;}
    var lastDone={};
    Object.keys(logs||{}).sort().forEach(dateStr=>{
      (logs[dateStr].entries||[]).filter(e=>e.dir==='up'&&e.source==='task').forEach(e=>{
        if(e.wizardId)lastDone[e.wizardId]=dateStr;
      });
    });
    var usedIds=slots.map(s=>s.wizardId).filter(Boolean);
    var owned=wizards.filter(w=>w.owned&&!usedIds.includes(w.id));
    if(owned.length===0)return;
    owned.sort((a,b)=>{
      var da=lastDone[a.id]||'0000-00-00';
      var db=lastDone[b.id]||'0000-00-00';
      return da<db?-1:da>db?1:0;
    });
    var assignCount=Math.min(targets.length,owned.length);
    var remaining=[...owned];
    targets.slice(0,assignCount).forEach(({i})=>{
      if(remaining.length===0)return;
      var pool=remaining.slice(0,Math.min(5,remaining.length));
      var picked=pool[Math.floor(Math.random()*pool.length)];
      remaining=remaining.filter(w=>w.id!==picked.id);
      var t=tasks.find(t=>t.id===slots[i].taskId);
      var tm=!!(picked&&t&&picked.tags.includes(t.tag));
      onUpd(i,{wizardId:picked.id,tagMatch:tm,dialogue:getLine(picked.id,tm?'TASK_MATCH':'TASK_UNMATCH')});
    });
    setDiceMsg('ok:마법사를 자동으로 배치했습니다.');
    setTimeout(()=>setDiceMsg(''),3000);
  }

  var canConfirm=!confirmed&&slots.some(s=>!s.isSystem&&s.taskId&&s.wizardId);
  var hasEmpty=slots.some(s=>!s.isSystem&&(!s.taskId||!s.wizardId));
  var userSlots=slots.filter(s=>!s.isSystem&&s.taskId&&s.wizardId);
  var allDone=confirmed&&userSlots.length>0&&userSlots.every(s=>s.status==='done'||s.status==='forfeited');
  var usedWizIds=slots.map(s=>s.wizardId).filter(Boolean);

  var idleSlotsNoWiz=slots.filter(s=>!s.isSystem&&s.status==='idle'&&!s.wizardId);
  var hasTaskNoWiz=idleSlotsNoWiz.some(s=>s.taskId);
  var hasIdleNoTask=idleSlotsNoWiz.length>0&&!hasTaskNoWiz;
  var hasAssignableSlot=!confirmed&&(hasTaskNoWiz||hasIdleNoTask);

  function handleConfirmClick(){
    if(hasEmpty)setModal({type:'confirmWithEmpty'});
    else{onConfirmMission(false);setModal(null);}
  }
  function handleOk(){
    if(modal.type==='confirmWithEmpty'){onConfirmMission(true);setModal(null);}
    else if(modal.type==='forfeit'){onUpd(modal.idx,'forfeit');setModal(null);}
    else if(modal.type==='forfeit_ticket'){onUpd(modal.idx,'forfeit_ticket');setModal(null);}
    else if(modal.type==='activateSlot'){onUpd(modal.idx,'activate');setModal(null);}
    else if(modal.type==='confirmComplete'){onUpd(modal.idx,'complete');setModal(null);}
    else if(modal.type==='sysReset'){onSlotReset(modal.idx);setModal(null);}
  }
  var l1=<span>오늘 완료한 임무: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{doneCount}건</span></span>;
  var l2=<span>소지 마화: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{mahwa}닢</span></span>;
  return(
    <div style={{padding:'60px 16px 20px',maxWidth:420,margin:'0 auto'}}>
      <PageHeader title='오늘의 임무' line1={l1} line2={l2}/>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
        <button onClick={hasAssignableSlot?handleRandomAssign:undefined} title="마법사 무작위 배치"
          style={{width:34,height:34,borderRadius:'50%',border:'0.5px solid rgba(0,0,0,0.13)',background:'white',cursor:hasAssignableSlot?'pointer':'not-allowed',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,opacity:hasAssignableSlot?1:0.35,transition:'all 0.15s',flexShrink:0}}>🎲</button>
        {diceMsg&&<span style={{fontSize:11,color:diceMsg.startsWith('error:')?'#8A3030':'#3A6A28'}}>{diceMsg.replace(/^(error:|ok:)/,'')}</span>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {slots.map((sl,i)=><SlotCard key={i} slot={sl} idx={i} confirmed={confirmed} affinity={affinity} affinityChanges={affinityChanges} level={level} lvTransitions={lvTransitions} onUpd={onUpd} usedWizIds={usedWizIds} wizards={wizards} tasks={tasks} onAskForfeit={idx=>setModal({type:'forfeit',idx})} onSlotReset={onSlotReset} allDone={allDone} onAskActivate={idx=>setModal({type:'activateSlot',idx})}
onAskComplete={(idx,startedAt)=>setModal({type:'confirmComplete',idx,elapsed:formatElapsed(startedAt),startedAt})}
onAskSysReset={(idx,wizName)=>setModal({type:'sysReset',idx,wizName})} favTasks={favTasks}/>)}
        {!confirmed&&<button onClick={handleConfirmClick} disabled={!canConfirm} style={{marginTop:4,background:canConfirm?'var(--color-primary)':'rgba(0,0,0,0.07)',color:canConfirm?'white':'var(--color-text-tertiary)',border:'none',borderRadius:'var(--border-radius-lg)',padding:'11px 0',fontSize:13,fontWeight:500,cursor:canConfirm?'pointer':'not-allowed',transition:'background 0.2s'}}>임무 확정</button>}
        {allDone&&<div style={{textAlign:'center',padding:'18px 16px',marginTop:4,background:'#EAEAEA',borderRadius:'var(--border-radius-lg)',border:'0.5px solid #D0D0D0'}}><div style={{fontSize:14,fontWeight:500,color:'#3A4A40',marginBottom:10,fontFamily:"Georgia,'Nanum Myeongjo',serif",letterSpacing:'0.3px'}}>당신의 임무, 세계를 구했다!</div><button onClick={onReset} style={{background:'white',color:'var(--color-text-secondary)',border:'0.5px solid #C8C8C8',borderRadius:'var(--border-radius-md)',padding:'6px 20px',fontSize:12,cursor:'pointer'}}>Reset</button></div>}
      </div>
      {modal&&modal.type!=='forfeit'&&<ConfirmModal
        msg={modal.type==='confirmWithEmpty'?'빈 임무 슬롯이 있어요.\n이대로 임무를 확정할까요?':modal.type==='activateSlot'?'이대로 새 임무를 시작할까요?':modal.type==='sysReset'?modal.wizName+'의 자유 행동을 종료할까요?':
modal.type==='sysReset'?modal.wizName+'의 자유 행동을 종료할까요?':
modal.type==='confirmComplete'?(modal.startedAt&&(Date.now()-modal.startedAt)>=18000000?'꽤 시간이 필요한 임무였군요!\n완료 보고서를 제출하시겠어요?':'임무를 수령한 지 '+modal.elapsed+'이 경과하였네요.\n완료 보고서를 제출하시겠어요?'):'정말 포기하시겠어요?'}
        confirmLabel='예' cancelLabel={modal.type==='confirmComplete'?'아직':'아니오'}
        onConfirm={handleOk}
        onCancel={modal.type==='activateSlot'?()=>{onUpd(modal.idx,{wizardId:null,dialogue:null,tagMatch:false});setModal(null);}:()=>setModal(null)}
        confirmDisabled={false}
      />}
      {modal&&modal.type==='forfeit'&&<ForfeitModal
        forfeitTickets={(inventory&&inventory.forfeitTickets)||0}
        onForfeit={handleOk}
        onForfeitTicket={()=>{onUpd(modal.idx,'forfeit_ticket');setModal(null);}}
        onCancel={()=>setModal(null)}
      />}
      <div style={{textAlign:'center',marginTop:24,paddingBottom:8}}>
        <span style={{fontSize:10,color:'rgba(0,0,0,0.2)',lineHeight:1.8}}>브라우저 캐시·쿠키 삭제 전 데이터를 백업해 두세요 (우상단 A → 데이터 백업)</span>
      </div>
    </div>
  );
}


// ── 상점 페이지 ───────────────────────────────────────────────────────────────
function StorePage({wizards,setWizards,mahwa,setMahwa,affinity,level,applyAff,ownedCount,storeDate,setStoreDate,addLogEntry,clubFilter,addMahwaLog,inventory,setInventory,customTasks,setCustomTasks}){
  var[phase,setPhase]=useState('idle');
  var[gWiz,setGWiz]=useState(null);
  var[gNew,setGNew]=useState(false);
  var[full,setFull]=useState('');
  var[typed,setTyped]=useState('');
  var[gType,setGType]=useState('normal');
  var[customName,setCustomName]=useState('');
  var[flash,setFlash]=useState('');
  var[showFirstBonus,setShowFirstBonus]=useState(false);
  var[forfeitConfirm,setForfeitConfirm]=useState(false);

  var today=gameDay();
  var gachaDone=storeDate.gacha===today;
  var thisWeek=weekKey();
  var forfeitWeekCount=storeDate.forfeitWeekKey===thisWeek?(storeDate.forfeitWeekCount||0):0;
  var forfeitDone=forfeitWeekCount>=3;

  // 타이핑 애니메이션
  useEffect(()=>{
    if(phase!=='dialogue')return;
    if(typed.length>=full.length){
      var t=setTimeout(()=>{
        if(gNew){
          setWizards(p=>{
            var up=p.map(w=>w.id===gWiz.id?{...w,owned:true}:w);
            storeSet('app:wizards',JSON.stringify(Object.fromEntries(up.map(w=>[w.id,w.owned]))));
            return up;
          });
          addMahwaLog('gacha_new',0,mahwa,'신규 수집: '+gWiz.name,{wizardId:gWiz.id,wizardName:gWiz.name});
          setPhase('resultNew');
        }else{
          applyAff(gWiz.id,20,'up');
          setMahwa(n=>{var nx=n+30;addMahwaLog('gacha_dup',+30,nx,'중복 수집: '+gWiz.name+' (마화 30 환급)',{wizardId:gWiz.id,wizardName:gWiz.name});return nx;});
          addLogEntry({taskId:'__gacha__',taskName:'수집(중복)',wizardId:gWiz.id,wizardName:gWiz.name,delta:20,dir:'up',source:'gacha'});
          setPhase('resultDup');
        }
      },700);
      return()=>clearTimeout(t);
    }
    var t=setTimeout(()=>setTyped(p=>full.slice(0,p.length+1)),45);
    return()=>clearTimeout(t);
  },[phase,typed,full,gNew,gWiz,gType]);

  // 로딩 후 마법사 추첨
  useEffect(()=>{
    if(phase!=='loading')return;
    var t=setTimeout(()=>{
      var pool=clubFilter&&clubFilter.clubs&&clubFilter.clubs.length>0
        ?wizards.filter(w=>clubFilter.clubs.includes(w.club))
        :wizards;
      var wiz=pool.length>0?pool[Math.floor(Math.random()*pool.length)]:wizards[Math.floor(Math.random()*wizards.length)];
      var isNew=!wiz.owned;
      setGWiz(wiz);setGNew(isNew);
      setFull(getLine(wiz.id,isNew?'MEET':'MEET_AGAIN')||'…');
      setTyped('');setPhase('dialogue');
    },3000);
    return()=>clearTimeout(t);
  },[phase]);

  function doFlash(msg){setFlash(msg);setTimeout(()=>setFlash(''),3000);}

  function startNormalGacha(){
    setMahwa(n=>{var nx=n-100;addMahwaLog('gacha_cost',-100,nx,'수집 시도');return nx;});
    setStoreDate(p=>{var u={...p,gacha:today};storeSet('app:storeDate',JSON.stringify(u));return u;});
    setGType('normal');setPhase('loading');
  }

  function buyForfeit(){
    var wk=weekKey();
    var cnt=storeDate.forfeitWeekKey===wk?(storeDate.forfeitWeekCount||0):0;
    if(cnt>=3)return;
    setMahwa(n=>{var nx=n-30;addMahwaLog('forfeit_cost',-30,nx,'포기 사유서 구매');return nx;});
    setStoreDate(p=>{var u={...p,forfeitWeekKey:wk,forfeitWeekCount:cnt+1};storeSet('app:storeDate',JSON.stringify(u));return u;});
    setInventory(p=>{var u={...p,forfeitTickets:(p.forfeitTickets||0)+1};storeSet('app:inventory',JSON.stringify(u));return u;});
    doFlash('포기 사유서 1매를 구입했습니다.');
  }

  function confirmCustomTask(){
    var name=customName.trim();if(!name)return;
    var tag=TASK_TAG_ORDER[Math.floor(Math.random()*TASK_TAG_ORDER.length)];
    var newTask={id:'CT'+Date.now(),name,tag,isCustom:true};
    setCustomTasks(p=>{var u=[...p,newTask];storeSet('app:customTasks',JSON.stringify(u));return u;});
    setMahwa(n=>{var nx=n-100;addMahwaLog('custom_task_cost',-200,nx,'창작 임무 추가: '+name);return nx;});
    setPhase('idle');setCustomName('');
    doFlash('"'+name+'" 임무가 추가되었습니다.');
  }

  function finishGacha(){
    if(gType==='normal'&&!localStorage.getItem('app:firstGachaDone')){
      localStorage.setItem('app:firstGachaDone','1');
      setShowFirstBonus(true);
    }
    setGWiz(null);setPhase('idle');
  }

  var items=[
    {id:'gacha',sym:'✦',name:'마법사 수집',desc:'어쩌면 당신의 진정한 임무',price:100,done:gachaDone,active:!gachaDone&&mahwa>=100,onBuy:startNormalGacha,btnLabel:'수집'},
    {id:'forfeit',sym:'⬡',name:'포기 사유서',desc:'잔소리는 듣겠지만 평판은 지킬 것이다',price:30,done:forfeitDone,active:!forfeitDone&&mahwa>=30,onBuy:()=>setForfeitConfirm(true),info:'이번 주 ('+forfeitWeekCount+'/3)매 구매'},
    {id:'custom',sym:'❖',name:'창작 임무 추가',desc:customTasks.length>=5?'임무 창작 한도에 도달했습니다 (5/5)':'원하는 임무를 작성하여 목록에 추가한다',price:100,done:false,active:mahwa>=100&&customTasks.length<5,onBuy:()=>{setCustomName('');setPhase('custom_input');},info:'('+customTasks.length+'/5)개 창작 완료'},
  ];

  var showDlg=phase==='dialogue'||phase==='resultNew'||phase==='resultDup';

  return(<>
    <div style={{padding:'60px 16px 20px',maxWidth:420,margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:20}}>
        <div style={{fontSize:17,fontWeight:500,color:'var(--color-text-primary)',letterSpacing:'-0.3px'}}>상점</div>
        <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginTop:6}}>
          수집한 마법사: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{ownedCount}명</span>
          <span style={{marginLeft:14}}>소지 마화: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{mahwa}닢</span></span>
        </div>
      </div>

      {flash&&<div style={{textAlign:'center',fontSize:12,color:'#3A6A28',marginBottom:12,padding:'8px 12px',background:'rgba(90,154,72,0.08)',borderRadius:8,border:'0.5px solid rgba(90,154,72,0.2)'}}>{flash}</div>}

      {/* 아이템 목록 */}
      {phase==='idle'&&(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {items.map(item=>(
            <div key={item.id} style={{background:'white',borderRadius:12,padding:'14px 16px',border:'0.5px solid #D8D8D8',display:'flex',alignItems:'center',gap:14}}>
              <div style={{fontSize:24,width:36,textAlign:'center',color:'var(--color-primary)',flexShrink:0,opacity:item.done?0.4:1}}>{item.sym}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                  <span style={{fontSize:13,fontWeight:500,color:item.done?'var(--color-text-tertiary)':'var(--color-text-primary)'}}>{item.name}</span>
                  {item.badge&&<span style={{fontSize:10,color:'var(--color-primary)',background:'rgba(184,146,42,0.10)',borderRadius:10,padding:'1px 7px',border:'0.5px solid rgba(184,146,42,0.25)'}}>{item.badge}</span>}
                </div>
                <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>{item.desc}</div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:4}}>
                  <div style={{fontSize:11,color:item.active?'var(--color-primary)':'var(--color-text-tertiary)',fontWeight:item.active?500:400}}>마화 {item.price}닢</div>
                  {item.info&&<div style={{fontSize:10,color:'var(--color-text-tertiary)'}}>{item.info}</div>}
                </div>
              </div>
              <button
                onClick={item.active?item.onBuy:undefined}
                style={{flexShrink:0,padding:'7px 14px',borderRadius:8,border:'none',
                  background:item.done?'rgba(0,0,0,0.05)':item.active?'var(--color-primary)':'rgba(0,0,0,0.07)',
                  color:item.done?'var(--color-text-tertiary)':item.active?'white':'var(--color-text-tertiary)',
                  fontSize:12,fontWeight:500,cursor:item.active?'pointer':'not-allowed'}}
              >{item.done?'매진':item.btnLabel||'구매'}</button>
            </div>
          ))}
        </div>
      )}

      {/* 가챠 로딩 */}
      {phase==='loading'&&<SparkleLoader msg="소환 중..."/>}

      {/* 가챠 대화 */}
      {showDlg&&gWiz&&(
        <div>
          <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:gWiz.bg,borderRadius:'var(--border-radius-lg)',border:'0.5px solid '+gWiz.border}}>
            <Avatar wiz={gWiz} size={48}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:gWiz.accent,marginBottom:6}}>{gWiz.name}</div>
              <div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{typed}{typed.length<full.length&&<span style={{opacity:0.4}}>▌</span>}</div>
            </div>
          </div>
          {(phase==='resultNew'||phase==='resultDup')&&(
            <Overlay>
              <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:290,width:'88%',textAlign:'center',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
                <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:18,whiteSpace:'pre-line'}}>
                  {phase==='resultNew'?gWiz.name+' 수집 성공!':gWiz.name+'과 더 가까워졌다!\n인연이 20 상승했다.\n마화 30닢을 돌려받았다.'}
                </div>
                <button onClick={finishGacha} style={{background:'var(--color-primary)',color:'white',border:'none',borderRadius:8,padding:'8px 28px',fontSize:13,cursor:'pointer'}}>확인</button>
              </div>
            </Overlay>
          )}
        </div>
      )}

      {/* 창작 임무 입력 */}
      {phase==='custom_input'&&(
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',border:'0.5px solid #D8D8D8'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',marginBottom:4,textAlign:'center'}}>임무 이름을 등록하세요.</div>
          <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:16}}>어떤 마법사의 특기가 될지는 랜덤으로 정해집니다.</div>
          <input value={customName} onChange={e=>setCustomName(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&customName.trim())confirmCustomTask();}}
            autoFocus placeholder="임무 이름"
            style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'0.5px solid #D0D0D0',fontSize:13,outline:'none',marginBottom:12,boxSizing:'border-box',fontFamily:'inherit',color:'var(--color-text-primary)'}}/>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setPhase('idle')} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>취소</button>
            <button onClick={confirmCustomTask} disabled={!customName.trim()}
              style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:customName.trim()?'var(--color-primary)':'rgba(0,0,0,0.07)',color:customName.trim()?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:customName.trim()?'pointer':'not-allowed'}}>
              추가 (100닢)
            </button>
          </div>
        </div>
      )}
    </div>
    {forfeitConfirm&&(
      <Overlay>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',textAlign:'center',marginBottom:8}}>포기 사유서를 구매할까요?</div>
          <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:20,lineHeight:1.7}}>구매한 사유서는 이번 주 일요일까지만 사용 가능합니다.</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setForfeitConfirm(false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>취소</button>
            <button onClick={()=>{buyForfeit();setForfeitConfirm(false);}} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>구매</button>
          </div>
        </div>
      </Overlay>
    )}
    {showFirstBonus&&(
      <Overlay>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,fontWeight:600,color:'var(--color-text-primary)',marginBottom:14,textAlign:'center'}}>최초 수집 보너스</div>
          <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:2,marginBottom:6}}>
