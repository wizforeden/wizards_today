const FB_JOURNALS = {
  W01:["시그너스는 서가에서 오래된 고서를 찾아냈다. 조금 복잡한 표정으로 그것을 쓰다듬었다. 무슨 사연이 있었을까?","시그너스가 전서구에 매달린 편지를 받았다. 읽고 난 그의 표정이 조금 부드러워졌다.","시그너스는 하루 종일 안락의자에서 느긋한 하루를 보낸 것 같다.","시그너스는 오랜만에 외출한 모양이다. 금방 올 것 같았는데, 왠지 지친 표정으로 밤 늦게 귀가했다. 누군가에게 시달린 걸까?"],
  W02:["호타루는 오랜만에 스바루와 드럼을 연습했다. 곧 라이브 일정이 있을지도?","호타루는 재기발랄한 학원생들 덕분에 하루 종일 학원을 동분서주했다. 귀가하자마자 풀썩 쓰러졌다.","호타루는 대법전의 서공과 진지한 대화를 나누었던 모양이다. 평소보다 조금 어두운 얼굴로 돌아나왔다.","호타루는 한참 동안 옷을 고르며 외출 준비를 했다. 오늘은 늦을지도 모른다고 어딘지 비장한 표정으로 말하고 나갔다."],
  W03:["릴리메이는 며칠 동안 전화를 붙잡고 씨름하더니, 드디어 분과회원을 불러내는 데 성공한 모양이다. 오늘은 조금 늦는다며 기뻐 보이는 얼굴로 나갔다.","릴리메이는 예언서에 꽂아둔 책갈피를 한참이나 물끄러미 바라보았다. 어떤 미래를 보고 있는 걸까?","오늘 릴리메이는 쇼핑을 마치고 행복한 표정으로 돌아왔다. 데보라를 잔뜩 괴롭혔다며 즐거워했다. ...그래도 되는 거야?","오늘은 릴리메이의 신작 발표회가 있었다. 세상이 온통 대여배우의 화려한 복귀로 들썩였다."],
  W04:["시타는 오랜만에 학원에 방문했다. 어린 학생들의 동경 어린 시선이 부끄러우면서도 싫지만은 않았던 것 같다.","시타는 아침부터 엽귀의 소집 명령을 받고 다녀왔다. 돌아온 눈빛이 평소보다 어둡다. ","놀이공원 성에 공주가 살고 있다는 유튜브가 게시되었다. 소문을 해명하기 위해 시타는 하루종일 진땀을 빼야 했다.","시타는 영화관에서 수상한 마력을 감지하고 온종일 추격전을 벌였다. 엉망이 된 옷차림보다도 신작 영화를 놓쳐 우울해 보인다."],
  W05:["데네브가 무언가를 끄적이더니 전서구에 매달아 보냈다. 의기양양해 보인다.","데네브는 하루 종일 나무 위에서 낮잠을 잤다. 간신히 찾아낸 분과회원들이 잔소리를 하지만 건성으로 들은 게 틀림없지.","데네브가 용의 형상으로 꿈을 꾼 모양이다. 잠꼬대를 하며 작은 불꽃을 내뱉는 바람에 커튼 한쪽이 조금 그슬리고 말았다.","한밤중, 데네브는 훌쩍 창문 너머로 뛰어내리더니 잠시 후 거대한 용이 되어 하늘을 날아올랐다. 근사한 야간 비행을 했다."],
  W06:["초롱은 놀이공원에서 꼬마 손님들과 한바탕 술래잡기를 했다. 돌아와 탈을 벗자마자 김이 날 정도로 온 힘을 다한 모양이다.","초롱은 학원의 친구들과 비밀 회동을 했다. 무슨 모의를 했는지, 가방 안에서 수상한 마법 폭죽들이 잔뜩 쏟아져 나왔다.","초롱은 분과회원들과 유행한다는 과자 만들기를 했다. 코코아 가루를 묻힌 경단이 대량 생산되었다.","초롱은 시타가 뜨던 옷을 몰래 입어 보다가 실수로 망가뜨리고 말았다. 시타가 돌아오기 전까지 필사적으로 수복한다던데, 결과는 과연……. "],
  W07:["오늘 가흠의 레코드샵에는 손님이 한 명도 없었다. 하루 종일 주인장 취향의 오래된 노래가 흘러나왔다.","가흠이 심각한 얼굴로 꽃집에서 꽃다발을 골랐다. 특별한 날은 아닌 것 같았는데….","원탁 상사의 부름을 받고 나간 가흠은 하루 종일 자리를 비웠다. 조금 지친 표정으로 귀가했다.","오늘 가흠은 분과회원들과 MT를 갔다. 시작부터 자동차 타이어가 펑크 났다던데, 이래저래 험난했던 모양이다."],
  W08:["리온은 대청소를 했다. 네로가 들어가지 말라는 방에 실수로 들어갔다가 새파래진 얼굴로 뛰쳐나왔다.","오늘 리온은 분과회원들과 MT를 갔다. 간신히 강릉 숙소에 도착해서 기진맥진해 뻗고 말았다. 원래 가려던 곳은 포천이었던 것 같은데….","리온은 고모의 강권에 못 이겨 슬램덩크를 읽기 시작했다. 처음에는 심드렁하더니 결국 식음을 전폐하며 독서 삼매경에 빠지고 말았다.","리온은 하루 종일 꾸벅꾸벅 졸았다. 어제 밤 늦게까지 서공 마법을 익혔던 모양이다. "],
  W09:["네로가 업로드한 유튜브가 알고리즘을 탔다. 세계의 음모론이 조금 짙어졌지만, 아무튼 마법계의 비밀은 지켜냈다.","네로는 하루 종일 카페에 앉아 사람을 구경했다. 어느 때보다 즐거운 표정이었다.","네로는 방에 틀어박힌 하루를 보냈다. 방에서는 인간의 귀로 포착할 수 없는 소리들이 들려온다… 착각이겠지.","네로는 분과회원들과 MT를 다녀왔다. 괴담 영상의 새로운 소재를 찾아냈다며 즐거운 듯 웃었다."],
  W10:["유리디스는 앨범을 정리하다가 생각에 잠겼다. 기억나지 않는 누군가 있는 걸까?","유리디스는 쇼핑몰에서 힘든 시간을 보냈다. 토라진 앵커의 마음을 풀어줘야 하는 모양이다. ","임무 배분 오류로, 유리디스는 하루 동안 다섯 건이나 임무를 처리해야 했다. 내색하지 않아서 아무도 눈치채지 못했다.","유리디스는 리디아와 모처럼 맛집에 다녀왔다. 혈당 스파이크로 유명한 디저트를 먹으며 간만에 휴식을 취한 것 같다."],
  W11:["리디아는 신규 문호 마법사를 보살피느라 하루 종일 쉴 틈이 없었다. 목이 쉴 지경일 텐데, 표정만은 상냥하고 밝다.","리디아는 방에서 혼자 눈을 감고 손을 모으고 한참을 보냈다. 누군가에게 기도하는 걸까?","리디아는 유리디스와 모처럼 맛집에 갔다. 디저트는 너무 달아서 먹을 수 없었지만 녹차가 훌륭했기에 만족했다.","리디아의 동물병원은 하루 종일 바빴다. 물 마실 틈도 없는 리디아를 보고 묘묘가 혀를 찼지만 본인은 행복한 듯했다."],
  W12:["판은 하루 종일 작업실에서 보냈다. 마감이 코앞에 다가온 담당자의 성화를 피하려고 핸드폰까지 꺼 둔 것 같다.","판은 공방을 정리하며 하루를 보냈다. 외전의 오래된 장정들을 한편에 가지런히 쌓아두었다.","판은 캐럴과 피크닉을 갔다. 사람이 너무 많아서 금세 지치고 말았지만 즐거운 하루였다.","판은 기다리던 새 마도서를 얻어서 모처럼 신이 난 것 같다. 길에서 마주치자 먼저 인사해 주었다."],
  W13:["캐럴은 〈별빛 기행〉의 장거리 여행에서 돌아왔다. 신기한 특산물들을 잔뜩 사 돌린 덕분에 문호가 시끌벅적해졌다.","캐럴은 창가에 앉아 턱을 괴고 하염없이 우주의 풍경을 바라보았다. 어디를 보고 있을까?","캐럴은 마도서 장정을 조금 보수받았다. 신이 나서 하루 종일 종소리를 울리고 다녔다.","캐럴은 판과 피크닉을 갔다. 사진을 잔뜩 찍었지만 다른 사람에게는 보여주지 말라는 판의 신신당부를 들었다."],
  W14:["오랜만에 타토와 타르가 사요의 폐가에 찾아왔다. 둘이 사이좋게 뛰어노는 모습을 사요는 흐뭇하게 지켜보았다."],
  W15:["세르비는 미아 씨와 좋은 일이 있었던 것 같다. 하루 종일 꿈을 꾸는 것처럼 몽롱해 보였지만 아무도 말을 걸지 못했다."],
  W16:["레위에게 옛 제자가 찾아왔다. 얼굴을 붉힌 소녀들이 꺄꺄꺼리더니 초콜릿 따위를 잔뜩 주고 갔다. 당연하다는 표정으로 받던데…… 의외로 제법 팬이 많았던 걸까?"],
  W17:["재이는 자신의 공방에 들어가려다가 말고 멈칫하더니 잠시 고민하다가 그대로 돌아 다른 곳으로 가 버렸다. 한참 후에 재이의 공방에서 마법사 넷이 우르르 나왔다."],
  W18:["타토는 신입생들에게 달리기 실력을 뽐내고 하루 종일 우쭐해 있었다. 내일은 뜀틀 시합을 한다고 한다."],
  W19:["아야메는 오늘 2개의 기관과 3개의 분과회, 5명의 앵커들에게 도움을 요청받았다. 밥은 먹고 다니는 걸까?"],
  W20:["로사의 정원에 불청객이 찾아왔다. 불운하게 마법문을 넘었던 이경의 침입자들은 대법전 정원사의 냉혹함을 맛봐야 했다."],
  W21:["핀은 저녁부터 단골 바에 들어가 혼자서 멍하니 시간을 보냈다. 칵테일 잔을 쓰다듬으며 무언가를 고민하는 듯했다."],
  W22:["타르는 오랜만에 사요의 집에 방문했다. 다소 시끄러운 군식구가 한 명 더 있었지만 그럭저럭 만족스러운 시간이었다."],
  W23:["모처럼 고요가 낮잠을 자는 동안 준과 에이미, 데인티가 하나둘씩 모여들더니 단체로 옹기종기 낮잠을 잤다. 먼저 깬 고요가 몸을  움직일 수 없어 난감해 했다.","고요는 혼자 산에 다녀온 모양이다. 분과회원들은 모두 거절했던 걸까?","원탁의 복도에서 고요와 마주쳤다. 기분 탓인지 평소와는 조금 다른 분위기가 느껴져서 함부로 말을 걸기 어려웠다.","에이미와 준이 한국의 '경주시'에 관심을 가졌다. 하루 종일 기상천외한 질문을 고요에게 쏟아냈다."],
  W24:["새벽에 데인티가 주방에서 밀크티 우리는 모습을 보고 깜짝 놀란 에이미가 한바탕 소동을 벌였다. 밀크티는 결국 먹지 못했다.","시장을 구경한다고 나갔던 데인티가 야바위장에서 발견됐다. 이미 한탕 한 모양인지 주머니가… 아주 허름했다. ","찻잔 속의 찻잎을 살피던 데인티가 묘한 표정을 지었다. 뭔가 보였던 걸까?","모처럼 아무도 없는 캠벨가, 데인티는 평소 꺼내보지 않던 물건을 만지작거리며 멍하니 침대를 굴러다녔다."],
  W25:["준은 마도서를 해독하다가 막혔는지, 하루 종일 어항 속 금붕어를 바라보며 멍하니 머리를 비웠다.","준이 서고 위험 구역에 특별 허가를 얻었다. 너무 흥분한 나머지 들어가자마자 대뜸 금서를 집어들어 쫓겨날 뻔했다.","한동안 두문불출하던 준이 분과회원들을 닮은 강아지 인형을 만들어서 선물했다. 인형은 조금 못생겼지만 다들 기뻐했다.","준이 개발한 마법 약물이 원탁의 판매 허가를 얻었다. 다 같이 축하 파티를 했는데, 와인 대신 약을 따르는 바람에 큰 사고가 날 뻔했다."],
  W26:["에이미는 새벽부터 덤벨을 들다가, 갑자기 뛰어들어 온 코하네 덕분에 중심을 잃어 집 바닥을 움푹 패게 만들었다.","에이미가 요즘 핫한 데이트 스팟에 출몰한다고 주변이 술렁거렸다. 정작 본인은 길거리 양아치들을 훈계하느라 데이트는 뒷전이었다.","에이미가 물고기며 조개를 한가득 들고 왔다. '보이길래 잡았어'라고 하는데, 대체 어디서?","에이미가 밀린 집안일을 하겠다며 대청소를 시작했다. 실수로 준의 연구 일지를 깨끗하게 분리수거할 뻔했다. "],
  W27:["리스가 누구와 함께 임무할지를 두고 아키와 아리엘이 왁왁 싸워댔다. 팔 한 쪽씩 붙잡힌 리스는 돌부처처럼 체념한 표정이었다.","우연히 게임 센터를 돌아다니던 누군가 리스가 코인 노래방에 들어가는 것을 보았다며 혼란스러워했다. 모두가 그의 수면 부족을 걱정해 주었다.","아키의 보고를 듣던 리스가 '3줄로 요약해줘' 라고 말했다가 3시간 동안 잔소리를 들었다.","에어컨이 고장난 덕분에 지부에 비상이 걸릴 뻔했다. 리스가 수제 빙수를 만들어 주며 간신히 폭동의 위기를 잠재웠다."],
  W28:["아키는 뒷골목에서 수상한 밀담을 엿듣다가 한바탕 추격전을 벌였다. 옷자락의 그을음을 들켜 레몬에게 놀림받았다.","게임 센터의 기기에 '팬텀'이라는 닉네임이 신기록을 도배했다. 수군대는 사람들 뒤로 아키가 기분 좋은 듯 걸어나왔다.","아키는 치카를 놀리다가 너무 당황한 치카에게 그만 한 대 맞고 말았다. 세 시간 후 간신히 정신을 차리곤 침울해졌다.","아키는 게임 센터를 지나가다가 노래방 기계로 들어가는 익숙한 뒷모습을 발견했다. 설마……. 아니겠지… ?"],
  W29:["치카는 노래방에서 신곡을 연습하다가 마법 소녀로 변신하는 연출을 시도했다. 너무 몰입한 나머지 방 안의 미러볼을 깨뜨려 변상해야 했다.","치카가 소품 편집샵에서 한정판 인형을 뽑기 위해 전 재산을 탕진했다. 아키에게 잔소리를 듣고 카드를 압수당했지만, 인형을 안고 행복해 보였다.","비가 오는 탓이었을까? 오늘따라 치카는 조금 센티멘털한 표정으로 창가에 기대 있었다. 고양이로 변한 레몬이 고롱고롱 안겨 주었다.","치카가 촬영한 일상 사진이 SNS에서 화제가 되었다. 정작 사진의 주인공인 아키가 삭제를 요구하며 치카를 추격하는 진풍경이 벌어졌다."],
  W30:["산책을 나갔던 레몬은 조용한 명당을 발견했다. 실컷 낮잠을 잤다고 생각했는데 이틀 동안 안 보여서 걱정했다며 치카가 꽉 안고 엉엉 울었다.","레몬이 뒷골목에서 고양이들에게 밥을 주던 중, 불행한 양아치들이 시비를 걸었다. 살벌한 소리가 뒷골목에 울려퍼졌다. ","레몬은 치카의 권유에 못 이겨 블로그에 영화 리뷰를 올렸다. SNS에서 묘한 화제가 되어 댓글이 수십 개나 달리자 귀찮다고 글을 지워 버렸다.","뒷골목을 산책하던 레몬은 아키가 시시한 녀석들에게 쫓겨다니는 것을 보았다. 재미있어 보여서 구경하다가 아키가 탈출한 것을 확인하고 녀석들을 마무리해 주었다."],
};

// ── 모듈 레벨 게임 데이터 (동적 로드 후 업데이트) ────────────────────────────
// ── 게임 데이터 (하드코드) ──────────────────────────────────────────────────────
var _dlg = FB_DLG;
var _journals = FB_JOURNALS;
var _tasks = FB_TASKS;
var _wizardDefs = FB_WIZARDS;

// ── Storage 유틸 ──────────────────────────────────────────────────────────────
function storeSet(k,v){try{localStorage.setItem(k,v);}catch(e){}return Promise.resolve();}
function storeGet(k){try{return Promise.resolve(localStorage.getItem(k));}catch(e){return Promise.resolve(null);}}
function storeDel(k){try{localStorage.removeItem(k);}catch(e){}return Promise.resolve();}

// ── 게임 유틸 ─────────────────────────────────────────────────────────────────
function gameDay(){
  var now=new Date();
  if(now.getHours()<5)now=new Date(now.getTime()-864e5);
  var y=now.getFullYear();
  var m=String(now.getMonth()+1).padStart(2,'0');
  var d=String(now.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function getLine(wId,key){var a=_dlg[wId]&&_dlg[wId][key];return Array.isArray(a)&&a.length?pick(a):null;}
function getLvUpLine(wId,lv){var a=_dlg[wId]&&_dlg[wId].LV_UP&&_dlg[wId].LV_UP[lv];return a&&a.length?pick(a):'…';}
function mkSlot(){return{taskId:null,wizardId:null,status:'idle',dialogue:null,tagMatch:false,isSystem:false,systemText:null,startedAt:null};}
function mkSystemSlot(wiz){
  var text=wiz.name+wiz.josa+' '+pick(SYS_SUBJECTS)+' '+pick(SYS_ACTIONS)+'.';
  return{taskId:'__system__',wizardId:wiz.id,status:'system_active',dialogue:null,tagMatch:false,isSystem:true,systemText:text};
}
function finalizeLog(dl){
  if(dl.finalized)return dl;
  var completedCount=(dl.entries||[]).filter(e=>e.dir==='up'&&e.source==='task').length;
  var journalWizardId=null,journalText=null,journalUnread=false;
  if(completedCount>=3){
    var candidates=Object.entries(dl.affinityTotals||{})
      .filter(([wId,data])=>data.total>0&&_journals[wId]);
    if(candidates.length>0){
      var chosen=candidates[Math.floor(Math.random()*candidates.length)];
      journalWizardId=chosen[0];
      journalText=pick(_journals[chosen[0]]);
      journalUnread=true;
    }
  }
  return{...dl,finalized:true,completedCount,journalWizardId,journalText,journalUnread};
}

function AffinityRow({wiz,aff,chg,lv,lvTrans}){
  var threshold=lv<5?LV_REQ[lv]:LV_REQ[4],isMax=lv>=5;
  function cl(v){return Math.min(Math.max(v,0),threshold);}
  var base=isMax?threshold:cl(chg?chg.from:aff);
  var barBase=base/threshold*100;
  var dPct=chg&&!isMax?Math.min(Math.abs(chg.delta)/threshold*100,100-barBase):0;
  var dLeft=(chg&&chg.dir==='up')?barBase:cl(aff)/threshold*100;
  var numLabel=isMax?'MAX':(chg?chg.from+'→'+aff+'/'+threshold:aff+'/'+threshold);
  var lvLabel=lvTrans?<span style={{fontWeight:600}}>{'운명 Lv.'+lvTrans.from}<span style={{opacity:0.5}}> → </span>{'운명 Lv.'+lvTrans.to}</span>:<span>{'운명 Lv.'+lv}</span>;
  return(
    <div style={{marginBottom:6}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
        <span style={{fontSize:12,color:wiz.accent,fontWeight:600}}>{wiz.name}</span>
        <span style={{fontSize:11,color:wiz.accent,opacity:0.75}}>{lvLabel}</span>
      </div>
      <div style={{height:4,background:'rgba(0,0,0,0.1)',borderRadius:2,overflow:'hidden',position:'relative'}}>
        <div style={{position:'absolute',left:0,top:0,height:'100%',width:barBase+'%',background:wiz.accent,opacity:0.5,borderRadius:2,transition:'width 0.3s'}}/>
        {chg&&!isMax&&<div style={{position:'absolute',left:dLeft+'%',top:0,height:'100%',width:dPct+'%',background:chg.dir==='up'?'#5A9A48':'#C05050',borderRadius:2}}/>}
      </div>
      <div style={{display:'flex',justifyContent:'flex-end',marginTop:3}}>
        <span style={{fontSize:10,color:'rgba(0,0,0,0.35)'}}>{numLabel}</span>
      </div>
    </div>
  );
}

function SettingsPanel({onClose,onReset,onBackup,onRestore,clubFilter,onChangeClubs,allWizards,mahwa,onInstantChange,favTasks,onChangeFavTasks,allTasks}){
  var fileRef=useRef(null);
  var[msg,setMsg]=useState('');
  var[customHex,setCustomHex]=useState('');
  var[showClubEdit,setShowClubEdit]=useState(false);
  var[editClubs,setEditClubs]=useState(clubFilter?clubFilter.clubs:[]);
  var[showInstantConfirm,setShowInstantConfirm]=useState(false);
  var[showFavEdit,setShowFavEdit]=useState(false);
  var[editFavs,setEditFavs]=useState(favTasks||[]);
  var currentColor=getComputedStyle(document.documentElement).getPropertyValue('--color-primary').trim();
  var allClubs=[...new Set(allWizards.map(w=>w.club))].sort((a,b)=>a.localeCompare(b,'ko'));

  // 변경 가능 여부 확인
  var canChangeClubs=true;
  var nextChangeDate=null;
  if(clubFilter&&clubFilter.changedAt){
    var changed=new Date(clubFilter.changedAt);
    var diff=(Date.now()-changed.getTime())/(1000*60*60*24);
    if(diff<30){
      canChangeClubs=false;
      var next=new Date(changed.getTime()+30*24*60*60*1000);
      nextChangeDate=next.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
    }
  }

  function handleFile(e){
    var f=e.target.files[0];if(!f)return;
    var reader=new FileReader();
    reader.onload=ev=>{try{onRestore(JSON.parse(ev.target.result));}catch{setMsg('파일을 읽을 수 없습니다.');}};
    reader.readAsText(f);
    e.target.value='';
  }
  function handleCustomInput(){
    var hex=customHex.trim();
    if(!/^#[0-9A-Fa-f]{6}$/.test(hex)){setMsg('올바른 색상 코드를 입력하세요. 예: #A07828');return;}
    applyPrimaryColor(hex);setMsg('');setCustomHex('');
  }
  function toggleEditClub(club){
    setEditClubs(prev=>prev.includes(club)?prev.filter(c=>c!==club):[...prev,club]);
  }
  function handleSaveClubs(){
    if(editClubs.length===0)return;
    onChangeClubs(editClubs);
    setShowClubEdit(false);
    setMsg('✓ 수집 필터가 업데이트되었습니다');
    setTimeout(()=>setMsg(''),2000);
  }
  function toggleFav(taskId){
    setEditFavs(prev=>{
      if(prev.includes(taskId))return prev.filter(id=>id!==taskId);
      if(prev.length>=10)return prev;
      return[...prev,taskId];
    });
  }
  function handleSaveFavs(){
    onChangeFavTasks(editFavs);
    setShowFavEdit(false);
    setMsg('✓ 즐겨찾기가 저장되었습니다');
    setTimeout(()=>setMsg(''),2000);
  }

    <Overlay>
      <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'90%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)',maxHeight:'88vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:msg?8:20}}>
          <span style={{fontSize:13,fontWeight:500,color:'var(--color-text-secondary)'}}>설정</span>
          <button onClick={onClose} style={{background:'none',border:'none',fontSize:16,cursor:'pointer',color:'rgba(0,0,0,0.35)',lineHeight:1}}>✕</button>
        </div>
        {/* 상태 메시지 - 제목과 색상 사이 */}
        {msg&&<div style={{fontSize:11,color:msg.startsWith('✓')?'#3A6A28':'#8A3030',textAlign:'center',marginBottom:12,transition:'opacity 0.3s'}}>{msg}</div>}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {/* 컬러 팔레트 */}
          <div>
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:8}}>테마 색상</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:8}}>
              {PALETTE_COLORS.map(p=>(
                <div key={p.hex} onClick={()=>{applyPrimaryColor(p.hex);setMsg('✓ 적용되었습니다');setTimeout(()=>setMsg(''),1500);}} title={p.label} style={{cursor:'pointer'}}>
                  <div style={{width:36,height:36,borderRadius:'50%',background:p.hex,border:currentColor===p.hex?'2.5px solid rgba(0,0,0,0.5)':'2px solid rgba(0,0,0,0.08)',boxSizing:'border-box'}}/>

              <input value={customHex} onChange={e=>setCustomHex(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleCustomInput();}} placeholder="#직접 입력" style={{flex:1,padding:'6px 10px',borderRadius:8,border:'0.5px solid #D0D0D0',fontSize:12,outline:'none',fontFamily:'monospace'}}/>
              <button onClick={handleCustomInput} style={{padding:'6px 12px',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:12,cursor:'pointer'}}>적용</button>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>

                  <span style={{fontSize:10,color:'var(--color-text-tertiary)'}}>{nextChangeDate} 변경 가능</span>

      </div>

    {/* 즐겨찾기 편집 모달 */}

          </div>
          <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:14}}>{editFavs.length}/10 선택됨</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:16}}>
            {allTasks.sort((a,b)=>a.name.localeCompare(b.name,'ko')).map(t=>{
              var sel=editFavs.includes(t.id);
              var full=!sel&&editFavs.length>=10;
              return<span key={t.id} onClick={()=>{if(!full)toggleFav(t.id);}} style={{fontSize:12,padding:'5px 11px',borderRadius:20,border:'0.5px solid '+(sel?'var(--color-primary)':'rgba(0,0,0,0.12)'),background:sel?'var(--color-primary)':full?'rgba(0,0,0,0.03)':'white',color:sel?'white':full?'rgba(0,0,0,0.25)':'var(--color-text-primary)',cursor:full?'not-allowed':'pointer',transition:'all 0.15s'}}>{t.name}</span>;
            })}
          </div>

        </div>

    {showInstantConfirm&&(
      <Overlay>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>마화 300닢을 지불하여{'\n'}즉시 수집 필터 설정을 변경할까요?</div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setShowInstantConfirm(false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>아니오</button>
            <button onClick={()=>{if(mahwa<300){setShowInstantConfirm(false);setMsg('마화가 부족합니다.');setTimeout(()=>setMsg(''),2000);return;}onInstantChange();setShowInstantConfirm(false);setShowClubEdit(true);setEditClubs(clubFilter?[...clubFilter.clubs]:allClubs);}} disabled={mahwa<300} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:mahwa>=300?'var(--color-primary)':'rgba(0,0,0,0.07)',color:mahwa>=300?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:mahwa>=300?'pointer':'not-allowed'}}>예</button>
          </div>
          {mahwa<300&&<div style={{fontSize:11,color:'#8A3030',textAlign:'center',marginTop:8}}>마화가 부족합니다. (현재 {mahwa}닢)</div>}
        </div>
      </Overlay>
    )}
  </>);
}

function SystemSlotCard({slot,wizards,onAskSysReset,idx}){
  var wiz=wizards.find(w=>w.id===slot.wizardId);
  var bg=wiz?wiz.bg:'#F5F5F5',bdr=wiz?wiz.border:'#E0E0E0';
  return(
    <div style={{background:bg,borderRadius:'var(--border-radius-lg)',border:'0.5px solid '+bdr,padding:'12px 14px'}}>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
        <span style={{fontSize:11,padding:'2px 9px',borderRadius:20,background:'rgba(0,0,0,0.05)',color:'rgba(0,0,0,0.35)',fontWeight:500}}>자유 행동 중</span>
        {wiz&&onAskSysReset&&<button onClick={()=>onAskSysReset(idx,wiz.name)} style={{width:18,height:18,borderRadius:'50%',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.6)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'rgba(0,0,0,0.35)',padding:0}}>✕</button>}
      </div>
      <div style={{fontSize:12,color:'rgba(0,0,0,0.48)',lineHeight:1.7,fontFamily:"Georgia,'Nanum Myeongjo',serif",fontStyle:'italic'}}>
        {slot.systemText||'지금은 대기실에 아무도 없다…….'}
      </div>
    </div>
  );
}
function SlotCard({slot,idx,confirmed,affinity,affinityChanges,level,lvTransitions,onUpd,usedWizIds,wizards,tasks,onAskForfeit,onSlotReset,allDone,onAskActivate,onAskComplete,onAskSysReset,favTasks}){
  var[showTaskModal,setShowTaskModal]=useState(false);
  var[showWizModal,setShowWizModal]=useState(false);
  if(slot.isSystem)return<SystemSlotCard slot={slot} wizards={wizards} onAskSysReset={onAskSysReset} idx={idx}/>;
  var wiz=wizards.find(w=>w.id===slot.wizardId);
  var task=tasks.find(t=>t.id===slot.taskId);
  var aff=wiz?affinity[wiz.id]:0,chg=wiz?affinityChanges[wiz.id]:null;
  var lv=wiz?level[wiz.id]:1,lvTrans=wiz?lvTransitions[wiz.id]:null;
  var disW=usedWizIds.filter(id=>id!==slot.wizardId);
  var ownedWiz=wizards.filter(w=>w.owned).sort((a,b)=>{var aDis=disW.includes(a.id),bDis=disW.includes(b.id);if(aDis!==bDis)return aDis?1:-1;var cc=a.club.localeCompare(b.club,'ko');return cc!==0?cc:a.name.localeCompare(b.name,'ko');});
  var bg=wiz?wiz.bg:'#F0F0F0',bdr=wiz?wiz.border:'#DCDCDC',acc=wiz?wiz.accent:'#888';
  function onTask(taskId){var w=wizards.find(w=>w.id===slot.wizardId),t=tasks.find(t=>t.id===taskId);var tm=!!(w&&t&&w.tags.includes(t.tag));onUpd(idx,{taskId,tagMatch:tm,dialogue:w?getLine(slot.wizardId,tm?'TASK_MATCH':'TASK_UNMATCH'):null});}
  function onWiz(wId){var w=wizards.find(w=>w.id===wId),t=tasks.find(t=>t.id===slot.taskId);var tm=!!(w&&t&&w.tags.includes(t.tag));onUpd(idx,{wizardId:wId,tagMatch:tm,dialogue:getLine(wId,tm?'TASK_MATCH':'TASK_UNMATCH')});if(slot.editing&&slot.taskId)onAskActivate(idx);}
  return(
    <div style={{background:bg,borderRadius:'var(--border-radius-lg)',border:'0.5px solid '+bdr,padding:'12px 14px',transition:'background 0.5s,border-color 0.5s'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:wiz?10:8}}>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{fontSize:11,padding:'2px 9px',borderRadius:20,background:slot.status==='idle'?'rgba(0,0,0,0.06)':slot.status==='active'?'rgba(0,0,0,0.08)':slot.status==='done'?'rgba(80,140,60,0.15)':'rgba(180,60,60,0.12)',color:slot.status==='idle'?'rgba(0,0,0,0.38)':slot.status==='active'?acc:slot.status==='done'?'#3A6A28':'#8A3030',fontWeight:500}}>{slot.status==='idle'?'대기':slot.status==='active'?'진행 중':slot.status==='done'?'완료':'포기'}</span>
          {slot.status==='idle'&&slot.wizardId&&<button onClick={()=>onUpd(idx,{wizardId:null,dialogue:null,tagMatch:false})} style={{width:18,height:18,borderRadius:'50%',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.6)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'rgba(0,0,0,0.35)',padding:0}}>✕</button>}
        </div>
      </div>
      {wiz&&<AffinityRow wiz={wiz} aff={aff} chg={chg} lv={lv} lvTrans={lvTrans}/>}
      {(!confirmed||slot.editing)&&(
        <div style={{display:'flex',gap:7}}>
          <button onClick={()=>setShowTaskModal(true)} style={{flex:1,padding:'7px 10px',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.55)',fontSize:12,color:slot.taskId?'var(--color-text-primary)':'var(--color-text-tertiary)',cursor:'pointer',textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {task?task.name:'임무 선택'}
          </button>
          <button onClick={()=>{if(slot.taskId)setShowWizModal(true);}} disabled={!slot.taskId} style={{flex:1,padding:'7px 10px',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr,background:!slot.taskId?'rgba(0,0,0,0.03)':'rgba(255,255,255,0.55)',fontSize:12,color:slot.wizardId?'var(--color-text-primary)':!slot.taskId?'rgba(0,0,0,0.2)':'var(--color-text-tertiary)',cursor:!slot.taskId?'not-allowed':'pointer',textAlign:'left',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',opacity:!slot.taskId?0.5:1}}>
            {wiz?wiz.name:'마법사 선택'}
          </button>
        </div>
      )}
      {showTaskModal&&<TaskPickerModal tasks={tasks} favTasks={favTasks} selected={slot.taskId} onSelect={onTask} onClose={()=>setShowTaskModal(false)}/>}
      {showWizModal&&<WizardPickerModal wizards={ownedWiz} disabledIds={disW} affinity={affinity} level={level} onSelect={onWiz} onClose={()=>setShowWizModal(false)}/>}
      {confirmed&&!slot.editing&&task&&<div style={{fontSize:13,color:'rgba(0,0,0,0.5)',marginBottom:8}}><span style={{fontWeight:500,color:acc}}>{task.name}</span></div>}
      {wiz&&slot.dialogue&&<div style={{display:'flex',gap:10,alignItems:'flex-start',marginTop:0,padding:'9px 11px',background:'rgba(255,255,255,0.55)',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr}}><Avatar wiz={wiz} size={40}/><div><div style={{fontSize:11,fontWeight:500,color:acc,marginBottom:2}}>{wiz.name}</div><div style={{fontSize:12,color:'rgba(0,0,0,0.55)',lineHeight:1.6}}>{slot.dialogue}</div></div></div>}
      {confirmed&&slot.status==='active'&&<div style={{display:'flex',gap:8,marginTop:10}}><button onClick={()=>onAskComplete(idx,slot.startedAt)} style={{flex:2,background:acc,color:'white',border:'none',borderRadius:'var(--border-radius-md)',padding:'8px 0',fontSize:13,fontWeight:500,cursor:'pointer'}}>완료</button><button onClick={()=>onAskForfeit(idx)} style={{flex:1,background:'rgba(255,255,255,0.55)',color:'#8A3030',border:'0.5px solid #D0A0A0',borderRadius:'var(--border-radius-md)',padding:'8px 0',fontSize:13,cursor:'pointer'}}>포기</button></div>}
{confirmed&&!slot.isSystem&&(slot.status==='done'||slot.status==='forfeited')&&!allDone&&<button onClick={()=>onSlotReset(idx)} style={{width:'100%',marginTop:8,padding:'7px 0',borderRadius:'var(--border-radius-md)',border:'0.5px solid '+bdr,background:'rgba(255,255,255,0.6)',color:'rgba(0,0,0,0.45)',fontSize:12,cursor:'pointer'}}>새 임무 배정</button>}
    </div>
  );
}

// ── 인트로 ───────────────────────────────────────────────────────────────────
function IntroScreen({wizards,setWizards,onComplete}){
  var INTRO="오래된 책 냄새에 눈을 뜬다.\n당신은 누구지?\n이름이란 해내는 일로써 정의되는 것.\n마법의 힘은 명명하는 힘.\n그렇다면 분명,\n당신이 수행하는 하루하루의 임무는…….\n…\n…\n한 권의 책이 당신 앞에 나타난다.";
  var[phase,setPhase]=useState('text');
  var[charPos,setCharPos]=useState(0);
  var[queue,setQueue]=useState([]);
  var[acqIdx,setAcqIdx]=useState(0);
  var[acqWiz,setAcqWiz]=useState(null);
  var[typed,setTyped]=useState('');
  var[full,setFull]=useState('');
  var[showResult,setShowResult]=useState(false);
  var[nameInput,setNameInput]=useState('');
  var[selectedClubs,setSelectedClubs]=useState([]);

  // 전체 club 목록 추출
  var allClubs=[...new Set(wizards.map(w=>w.club))].sort((a,b)=>a.localeCompare(b,'ko'));

  useEffect(()=>{
    if(phase!=='text')return;
    if(charPos>=INTRO.length){var t=setTimeout(()=>setPhase('askName'),1000);return()=>clearTimeout(t);}
    var delay=INTRO[charPos]==='\n'?600:58;
    var t=setTimeout(()=>setCharPos(p=>p+1),delay);return()=>clearTimeout(t);
  },[phase,charPos]);

  function handleNameConfirm(){
    if(!nameInput.trim())return;
    // 모든 club 기본 선택
    setSelectedClubs(allClubs);
    setPhase('selectClub');
  }

  function toggleClub(club){
    setSelectedClubs(prev=>prev.includes(club)?prev.filter(c=>c!==club):[...prev,club]);
  }

  function handleClubConfirm(){
    if(selectedClubs.length===0)return;
    var filtered=wizards.filter(w=>!w.owned&&selectedClubs.includes(w.club));
    var q=filtered.slice().sort(()=>Math.random()-0.5).slice(0,2);
    setQueue(q);
    if(q.length>0)doAcquire(q,0);
    else setPhase('mahwaPopup');
  }

  function doAcquire(q,idx){
    if(idx>=q.length){setPhase('mahwaPopup');return;}
    var wiz=q[idx];var txt=getLine(wiz.id,'MEET')||'…';
    setWizards(p=>p.map(w=>w.id===wiz.id?{...w,owned:true}:w));
    setAcqWiz(wiz);setFull(txt);setTyped('');setShowResult(false);setAcqIdx(idx);setPhase('acquiring');
  }
  useEffect(()=>{
    if(phase!=='acquiring'||showResult)return;
    if(typed.length>=full.length){var t=setTimeout(()=>setShowResult(true),800);return()=>clearTimeout(t);}
    var t=setTimeout(()=>setTyped(p=>full.slice(0,p.length+1)),45);return()=>clearTimeout(t);
  },[phase,typed,full,showResult]);
  useEffect(()=>{
    if(!showResult||phase!=='acquiring')return;
    var q=queue,idx=acqIdx;
    var t=setTimeout(()=>doAcquire(q,idx+1),2000);return()=>clearTimeout(t);
  },[showResult,acqIdx,queue]);

  var isLight=phase==='acquiring'||phase==='mahwaPopup'||phase==='selectClub';
  return(
    <div style={{minHeight:'100vh',background:isLight?'#F4F4F2':'#15161C',transition:'background 1.2s ease',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 28px',boxSizing:'border-box'}}>
      {phase==='text'&&<div style={{maxWidth:340,width:'100%',fontFamily:"Georgia,'Nanum Myeongjo',serif",fontSize:15,lineHeight:2.3,color:'#C8C4B4',letterSpacing:'0.3px',whiteSpace:'pre-line'}}>{INTRO.slice(0,charPos)}<span style={{opacity:0.4}}>▌</span></div>}
      {phase==='askName'&&<>
        <div style={{maxWidth:340,width:'100%',fontFamily:"Georgia,'Nanum Myeongjo',serif",fontSize:15,lineHeight:2.3,color:'#C8C4B4',letterSpacing:'0.3px',whiteSpace:'pre-line',marginBottom:32}}>{INTRO}</div>
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'100%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',marginBottom:14,textAlign:'center',fontFamily:"Georgia,'Nanum Myeongjo',serif",lineHeight:1.8}}>당신의 이름?</div>
          <input value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&nameInput.trim())handleNameConfirm();}} autoFocus style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'0.5px solid #D0D0D0',fontSize:13,outline:'none',marginBottom:12,boxSizing:'border-box',fontFamily:'inherit',color:'var(--color-text-primary)'}}/>
          <button onClick={handleNameConfirm} disabled={!nameInput.trim()} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:nameInput.trim()?'var(--color-primary)':'rgba(0,0,0,0.07)',color:nameInput.trim()?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:nameInput.trim()?'pointer':'not-allowed'}}>확인</button>
        </div>
      </>}
      {phase==='selectClub'&&(
        <div style={{maxWidth:320,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:24}}>
            <div style={{fontSize:15,fontWeight:500,color:'var(--color-text-primary)',marginBottom:8,fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>이 세계에 있는 마법사들</div>
            <div style={{fontSize:12,color:'var(--color-text-tertiary)',lineHeight:1.8}}>당신의 세계에 반영할 분과회를 선택하세요.<br/>선택한 분과회의 마법사들만 이곳에 등장합니다.</div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:24}}>
            {allClubs.map(club=>{
              var checked=selectedClubs.includes(club);
              var clubWizards=wizards.filter(w=>w.club===club);
              return(
                <div key={club} onClick={()=>toggleClub(club)} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',borderRadius:10,border:'0.5px solid '+(checked?'var(--color-primary)':'rgba(0,0,0,0.1)'),background:checked?'rgba(184,146,42,0.06)':'white',cursor:'pointer',transition:'all 0.15s'}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:checked?500:400,color:checked?'var(--color-primary)':'var(--color-text-primary)'}}>{club}</div>
                    <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginTop:2}}>{clubWizards.map(w=>w.name).join(' · ')}</div>
                  </div>
                  <div style={{width:18,height:18,borderRadius:'50%',border:'1.5px solid '+(checked?'var(--color-primary)':'rgba(0,0,0,0.2)'),background:checked?'var(--color-primary)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s'}}>
                    {checked&&<span style={{color:'white',fontSize:10,lineHeight:1}}>✓</span>}
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={handleClubConfirm} disabled={selectedClubs.length===0} style={{width:'100%',padding:'11px 0',borderRadius:10,border:'none',background:selectedClubs.length>0?'var(--color-primary)':'rgba(0,0,0,0.07)',color:selectedClubs.length>0?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:selectedClubs.length>0?'pointer':'not-allowed'}}>
            {selectedClubs.length>0?`${selectedClubs.length}개 분과회 선택 완료`:'1개 이상 선택해 주세요'}
          </button>
        </div>
      )}
      {phase==='acquiring'&&acqWiz&&(
        <div style={{maxWidth:380,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:16}}><div style={{fontSize:11,color:'rgba(0,0,0,0.3)',letterSpacing:'1px'}}>{acqIdx+1} / {queue.length}</div></div>
          <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:acqWiz.bg,borderRadius:12,border:'0.5px solid '+acqWiz.border}}>
            <Avatar wiz={acqWiz} size={48}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:acqWiz.accent,marginBottom:6}}>{acqWiz.name}</div>
              <div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{typed}{typed.length<full.length&&<span style={{opacity:0.4}}>▌</span>}</div>
            </div>
          </div>
          {showResult&&<div style={{marginTop:12,textAlign:'center',padding:'11px',background:'rgba(255,255,255,0.7)',borderRadius:10,border:'0.5px solid rgba(0,0,0,0.07)'}}><div style={{fontSize:13,color:'rgba(0,0,0,0.55)',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>{acqWiz.name} 수집 성공!</div></div>}
        </div>
      )}
      {phase==='mahwaPopup'&&(
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>초기 자금으로 마화 80닢이 지급되었습니다.</div>
          <button onClick={()=>onComplete(nameInput,selectedClubs)} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
        </div>
      )}
    </div>
  );
}

// ── 임무 페이지 ───────────────────────────────────────────────────────────────
function MissionPage({wizards,tasks,mahwa,doneCount,affinity,affinityChanges,level,lvTransitions,lvUpEvent,setLvUpEvent,onUpd,onConfirmMission,onReset,onSlotReset,slots,confirmed,favTasks}){
  var[modal,setModal]=useState(null);
  function formatElapsed(startedAt){
    if(!startedAt)return '알 수 없는 시간';
    var mins=Math.floor((Date.now()-startedAt)/60000);
    if(mins<1)return '1분 미만';
    if(mins<60)return mins+'분';
    var h=Math.floor(mins/60),m=mins%60;
    return m>0?h+'시간 '+m+'분':h+'시간';
  }
  var canConfirm=!confirmed&&slots.some(s=>!s.isSystem&&s.taskId&&s.wizardId);
  var hasEmpty=slots.some(s=>!s.isSystem&&(!s.taskId||!s.wizardId));
  var userSlots=slots.filter(s=>!s.isSystem&&s.taskId&&s.wizardId);
  var allDone=confirmed&&userSlots.length>0&&userSlots.every(s=>s.status==='done'||s.status==='forfeited');
  var usedWizIds=slots.map(s=>s.wizardId).filter(Boolean);
  function handleConfirmClick(){
    if(hasEmpty)setModal({type:'confirmWithEmpty'});

    else if(modal.type==='activateSlot'){onUpd(modal.idx,'activate');setModal(null);}

onAskComplete={(idx,startedAt)=>setModal({type:'confirmComplete',idx,elapsed:formatElapsed(startedAt),startedAt})}
onAskSysReset={(idx,wizName)=>setModal({type:'sysReset',idx,wizName})} favTasks={favTasks}/>)}
        {!confirmed&&<button onClick={handleConfirmClick} disabled={!canConfirm} style={{marginTop:4,background:canConfirm?'var(--color-primary)':'rgba(0,0,0,0.07)',color:canConfirm?'white':'var(--color-text-tertiary)',border:'none',borderRadius:'var(--border-radius-lg)',padding:'11px 0',fontSize:13,fontWeight:500,cursor:canConfirm?'pointer':'not-allowed',transition:'background 0.2s'}}>임무 확정</button>}
        {allDone&&<div style={{textAlign:'center',padding:'18px 16px',marginTop:4,background:'#EAEAEA',borderRadius:'var(--border-radius-lg)',border:'0.5px solid #D0D0D0'}}><div style={{fontSize:14,fontWeight:500,color:'#3A4A40',marginBottom:10,fontFamily:"Georgia,'Nanum Myeongjo',serif",letterSpacing:'0.3px'}}>당신의 임무, 세계를 구했다!</div><button onClick={onReset} style={{background:'white',color:'var(--color-text-secondary)',border:'0.5px solid #C8C8C8',borderRadius:'var(--border-radius-md)',padding:'6px 20px',fontSize:12,cursor:'pointer'}}>Reset</button></div>}
      </div>

modal.type==='sysReset'?modal.wizName+'의 자유 행동을 종료할까요?':
modal.type==='confirmComplete'?(modal.startedAt&&(Date.now()-modal.startedAt)>=10800000?'꽤 시간이 필요한 임무였군요!\n완료 보고서를 제출하시겠어요?':'임무를 수령한 지 '+modal.elapsed+'이 경과하였네요.\n완료 보고서를 제출하시겠어요?'):'정말 포기하시겠어요?'}
        confirmLabel='예' cancelLabel={modal.type==='confirmComplete'?'아직':'아니오'}
        onConfirm={handleOk}
        onCancel={modal.type==='activateSlot'?()=>{onUpd(modal.idx,{wizardId:null,dialogue:null,tagMatch:false});setModal(null);}:()=>setModal(null)}
        confirmDisabled={false}

      <div style={{textAlign:'center',marginTop:24,paddingBottom:8}}>
        <span style={{fontSize:10,color:'rgba(0,0,0,0.2)',lineHeight:1.8}}>캐시·쿠키 삭제 전 데이터를 백업해 두세요 (우상단 A → 데이터 백업)</span>
      </div>
    </div>
  );
}

}},700);return()=>clearTimeout(t);}

      {phase==='idle'&&<div style={{textAlign:'center'}}><button onClick={()=>setPhase('confirming')} style={{background:'var(--color-primary)',color:'white',border:'none',borderRadius:'var(--border-radius-lg)',padding:'12px 48px',fontSize:14,fontWeight:500,cursor:'pointer'}}>수집</button></div>}

      {showDlg&&gWiz&&<div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:gWiz.bg,borderRadius:'var(--border-radius-lg)',border:'0.5px solid '+gWiz.border}}><Avatar wiz={gWiz} size={48}/><div style={{flex:1}}><div style={{fontSize:12,fontWeight:600,color:gWiz.accent,marginBottom:6}}>{gWiz.name}</div><div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{typed}{typed.length<full.length&&<span style={{opacity:0.4}}>▌</span>}</div></div></div>}

      {showFirstBonus&&(

          <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
            <div style={{fontSize:13,fontWeight:600,color:'var(--color-text-primary)',marginBottom:14,textAlign:'center'}}>최초 수집 보너스</div>

// ── 기록 페이지 ───────────────────────────────────────────────────────────────
function RecordPage({logs,wizards,onMarkRead,onTestFinalize}){
  // 날짜 객체 → ISO 키 (로컬 날짜 기준)
  function toKey(date){
    if(!date)return null;
    var y=date.getFullYear();
    var m=String(date.getMonth()+1).padStart(2,'0');
    var d=String(date.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+d;
  }
  // 구형(toDateString) 또는 신형(ISO) 키 모두 조회
  function getLogByDate(date){
    var isoKey=toKey(date);
    var legacyKey=date.toDateString();
    return logs[isoKey]||logs[legacyKey]||null;
  }

  var now=new Date();
  var[calYear,setCalYear]=useState(now.getFullYear());
  var[calMonth,setCalMonth]=useState(now.getMonth());
  var[selDate,setSelDate]=useState(null);
  var detailRef=useRef(null);
  var WEEKDAYS=['일','월','화','수','목','금','토'];
  function prevMonth(){if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);setSelDate(null);}
  function nextMonth(){if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);setSelDate(null);}
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var todayStr=gameDay();
  function getLog(d){
    var date=new Date(calYear,calMonth,d);
    return getLogByDate(date);
  }
  function handleDayClick(d){
    var date=new Date(calYear,calMonth,d);
    setSelDate(date);
    var isoKey=toKey(date);
    var legacyKey=date.toDateString();
    var ds=logs[isoKey]?isoKey:legacyKey;
    if(logs[ds]&&logs[ds].journalUnread)onMarkRead(ds);
    setTimeout(()=>{if(detailRef.current)detailRef.current.scrollIntoView({behavior:'smooth',block:'start'});},80);
  }
  var selLog=selDate?getLogByDate(selDate):null;
  return(
    <div style={{padding:'60px 16px 20px',maxWidth:420,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,paddingTop:8}}>
        <button onClick={prevMonth} style={{width:32,height:32,border:'none',background:'none',cursor:'pointer',fontSize:20,color:'rgba(0,0,0,0.35)',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
        <div style={{fontSize:14,fontWeight:500,color:'var(--color-text-primary)'}}>{calYear}년 {calMonth+1}월</div>
        <button onClick={nextMonth} style={{width:32,height:32,border:'none',background:'none',cursor:'pointer',fontSize:20,color:'rgba(0,0,0,0.35)',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:4}}>
        {WEEKDAYS.map(d=><div key={d} style={{textAlign:'center',fontSize:10,color:'rgba(0,0,0,0.3)',padding:'2px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px 1px'}}>
        {Array.from({length:firstDay}).map((_,i)=><div key={'e'+i}/>)}
        {Array.from({length:daysInMonth}).map((_,i)=>{
          var d=i+1,log=getLog(d),cnt=log?log.completedCount||0:0;
          var dateObj=new Date(calYear,calMonth,d);
          var dateStr=toKey(dateObj);
          var isToday=dateStr===todayStr,isSel=selDate&&(dateStr===toKey(selDate)),hasUnread=log&&log.journalUnread;
          var spark=cnt>=3?{sz:13,c:'#C8A030'}:cnt>=1?{sz:9,c:'rgba(0,0,0,0.22)'}:null;
          return(
            <div key={d} onClick={()=>handleDayClick(d)} style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',padding:'5px 1px 4px',borderRadius:8,cursor:'pointer',background:isSel?'rgba(74,96,128,0.12)':isToday?'rgba(74,96,128,0.05)':'transparent',border:isToday&&!isSel?'0.5px solid rgba(74,96,128,0.18)':'0.5px solid transparent',minHeight:44,userSelect:'none'}}>
              {hasUnread&&<div style={{position:'absolute',top:4,right:5,width:5,height:5,borderRadius:'50%',background:'#C4634A',boxShadow:'0 0 0 1.5px rgba(255,255,255,0.9)'}}/>}
              <div style={{fontSize:12,color:isSel?'var(--color-primary)':'var(--color-text-primary)',fontWeight:isSel||isToday?600:400,lineHeight:1.4,marginBottom:2}}>{d}</div>
              <div style={{height:15,display:'flex',alignItems:'center',justifyContent:'center'}}>{spark&&<span style={{fontSize:spark.sz,color:spark.c,lineHeight:1}}>✦</span>}</div>
            </div>
          );
        })}
      </div>
      <div style={{borderTop:'0.5px solid rgba(0,0,0,0.08)',margin:'16px 0'}}/>
      <div ref={detailRef}>
        {!selDate&&<div style={{textAlign:'center',padding:'32px 0',color:'var(--color-text-tertiary)',fontSize:12,letterSpacing:'0.3px'}}>날짜를 선택하세요<div style={{fontSize:10,marginTop:6,opacity:0.7}}>* 오전 5시에 날짜가 변경됩니다</div></div>}
        {selDate&&(!selLog||selLog.completedCount===0)&&<div style={{textAlign:'center',padding:'32px 0',color:'var(--color-text-tertiary)',fontSize:12}}>{selDate.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}의 기록이 없습니다</div>}
        {selDate&&selLog&&selLog.completedCount>0&&(
          <div>
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:12}}>{selDate.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
              {(selLog.entries||[]).map((entry,i)=>{
                var isUp=entry.dir==='up';
                return<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:isUp?'var(--color-text-primary)':'rgba(0,0,0,0.32)',flex:1,lineHeight:1.5}}>{entry.taskName} | {entry.wizardName}</span>
                  <span style={{fontSize:11,fontWeight:500,color:isUp?'#3A6A28':'rgba(0,0,0,0.28)',flexShrink:0}}>{isUp?'♥+':'♥ −'}{entry.delta}</span>
                </div>;
              })}
            </div>
            {Object.keys(selLog.affinityTotals||{}).length>0&&(
              <div style={{borderTop:'0.5px solid rgba(0,0,0,0.07)',paddingTop:9,marginBottom:selLog.journalText?16:0,display:'flex',flexDirection:'column',gap:4}}>
                {Object.entries(selLog.affinityTotals).map(([wId,data])=>{
                  var isPos=data.total>=0;
                  return<div key={wId} style={{fontSize:11,color:'var(--color-text-secondary)'}}>{data.name}의 인연이 총&nbsp;<span style={{color:isPos?'#3A6A28':'#8A5050',fontWeight:500}}>{isPos?'+':''}{data.total}</span>&nbsp;{isPos?'상승했습니다.':'하락했습니다.'}</div>;
                })}
              </div>
            )}
            {selLog.finalized&&selLog.journalText&&<div style={{paddingTop:14,marginTop:4}}><div style={{fontSize:12,color:'rgba(0,0,0,0.58)',lineHeight:2,fontStyle:'italic',fontFamily:"Georgia,'Nanum Myeongjo',serif",letterSpacing:'0.1px'}}>{selLog.journalText}</div></div>}
          </div>
        )}
      </div>
    </div>
  );
}

  // 설치 배너 및 초기 체크
  useEffect(()=>{
    var isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
    if(!isStandalone){
      var dismissed=localStorage.getItem('installBannerDismissed');
      if(!dismissed)setTimeout(()=>setShowInstallBanner(true),2000);
    }
  },[]);

  // 날짜 변경 감지 (오전 5시 리셋)
  useEffect(()=>{
    if(!userLoaded)return;
    function checkDayChange(){
      var newDay=gameDay();
      if(newDay!==currentDayRef.current){
        currentDayRef.current=newDay;
        setDoneCount(0);
        setSlots([mkSlot(),mkSlot(),mkSlot()]);
        setConfirmed(false);
      }
    }
    document.addEventListener('visibilitychange',checkDayChange);
    var iv=setInterval(checkDayChange,60000);
    return()=>{document.removeEventListener('visibilitychange',checkDayChange);clearInterval(iv);};
  },[userLoaded]);

  // 베타 보상 수집 타이핑 애니메이션
  useEffect(()=>{
    if(betaModal!=='dialogue')return;
    if(betaTyped.length>=betaFull.length){
      var t=setTimeout(()=>setBetaModal(betaIsNew?'resultNew':'resultDup'),700);
      return()=>clearTimeout(t);
    }
    var t=setTimeout(()=>setBetaTyped(p=>betaFull.slice(0,p.length+1)),45);
    return()=>clearTimeout(t);
  },[betaModal,betaTyped,betaFull,betaIsNew]);

  // 유저 데이터 로드
  useEffect(()=>{
    var day=gameDay();
    Promise.all(STORAGE_KEYS.map(storeGet)).then(vals=>{
      var mahwaVal=vals[0]!==null?Number(vals[0])||0:0;
      var ownedMap=vals[1]!==null?JSON.parse(vals[1]):{};
      var affVal=vals[2]!==null?JSON.parse(vals[2]):{};
      var lvVal=vals[3]!==null?JSON.parse(vals[3]):{};
      // 마법사 목록 초기화
      var wList=_wizardDefs.map(w=>({...w,owned:ownedMap[w.id]||false}));
      var initAff=Object.fromEntries(wList.map(w=>[w.id,affVal[w.id]||0]));
      var initLv=Object.fromEntries(wList.map(w=>[w.id,lvVal[w.id]||1]));
      setWizards(wList);
      setAffinity(initAff);
      setAffinityChanges(Object.fromEntries(wList.map(w=>[w.id,null])));
      setLevel(initLv);
      setLvTransitions(Object.fromEntries(wList.map(w=>[w.id,null])));
      setMahwa(mahwaVal);
      if(vals[4]!==null){
  var dd=JSON.parse(vals[4]);
  if(dd.date===day) setDoneCount(dd.count);
  else setDoneCount(0); // 날짜가 다르면 명시적으로 0으로 초기화
}
      if(vals[5]!==null)setGachaDate(vals[5]);
      if(vals[6]!==null){var ss=JSON.parse(vals[6]);if(ss.date===day){setSlots(ss.slots);setConfirmed(ss.confirmed);}}
      if(vals[7]==='1')setFirstRunDone(true);
      if(vals[8]!==null){
        var savedLogs=JSON.parse(vals[8]);
        var updated={...savedLogs};var changed=false;
        Object.keys(updated).forEach(ds=>{if(ds!==day&&!updated[ds].finalized){updated[ds]=finalizeLog(updated[ds]);changed=true;}});
        var fl=changed?updated:savedLogs;
        setLogs(fl);
        if(Object.values(fl).some(l=>l.journalUnread))setTimeout(()=>setShowJournalPopup(true),300);
      }
      if(vals[9]!==null)setPlayerName(vals[9]);
      // vals[10] = app:firstGachaDone (localStorage only, not in vals array)
      if(vals[11]!==null){try{setClubFilter(JSON.parse(vals[11]));}catch(e){}}
      if(vals[12]!==null){try{setFavTasks(JSON.parse(vals[12]));}catch(e){}}
      if(vals[13]!==null){try{setMahwaLog(JSON.parse(vals[13]));}catch(e){}}
      var betaDone=localStorage.getItem('app:betaReward2026');
      var firstGacha=localStorage.getItem('app:firstGachaDone');
      var tod=gameDay();
      if(!betaDone&&firstGacha==='1'&&tod>='2026-04-20'&&tod<='2026-04-19'){
        setBetaModal('announcement');
      }
      setUserLoaded(true);
    }).catch(()=>setUserLoaded(true));
  },[]);

  // 자동 저장
  useEffect(()=>{if(!userLoaded)return;storeSet('app:mahwa',String(mahwa));},[mahwa,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;var om=Object.fromEntries(wizards.map(w=>[w.id,w.owned]));storeSet('app:wizards',JSON.stringify(om));},[wizards,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:affinity',JSON.stringify(affinity));},[affinity,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:level',JSON.stringify(level));},[level,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:doneCount',JSON.stringify({date:gameDay(),count:doneCount}));},[doneCount,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:slotSession',JSON.stringify({slots,confirmed,date:gameDay()}));},[slots,confirmed,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:firstRunDone',firstRunDone?'1':'0');},[firstRunDone,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:logs',JSON.stringify(logs));},[logs,userLoaded]);
  useEffect(()=>{if(!userLoaded||clubFilter===null)return;storeSet('app:clubFilter',JSON.stringify(clubFilter));},[clubFilter,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:favTasks',JSON.stringify(favTasks));},[favTasks,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:mahwaLog',JSON.stringify(mahwaLog));},[mahwaLog,userLoaded]);

  // 신규 분과회 감지
  useEffect(()=>{
    if(!userLoaded||!clubFilter)return;
    var allClubs=[...new Set(_wizardDefs.map(w=>w.club))];
    var knownClubs=clubFilter.knownClubs||allClubs;
    var newClubs=allClubs.filter(c=>!knownClubs.includes(c));
    if(newClubs.length>0){
      setNewClubQueue(newClubs.map(club=>({
        club,
        wizNames:_wizardDefs.filter(w=>w.club===club).map(w=>w.name)
      })));
    }
  },[userLoaded]);

  // 마화 트랜잭션 로그
  // 베타 보상 수집 실행
  function startBetaGacha(){
    var targetClubs=['어게인','A시'];
    var inFilter=clubFilter&&clubFilter.clubs&&clubFilter.clubs.some(c=>targetClubs.includes(c));
    if(!inFilter){setBetaModal('missed');return;}
    var pool=wizards.filter(w=>targetClubs.includes(w.club));
    if(pool.length===0){setBetaModal('missed');return;}
    var wiz=pool[Math.floor(Math.random()*pool.length)];
    var isNew=!wiz.owned;
    setBetaGWiz(wiz);setBetaIsNew(isNew);
    var txt=getLine(wiz.id,isNew?'MEET':'MEET_AGAIN')||'…';
    setBetaFull(txt);setBetaTyped('');
    localStorage.setItem('app:betaReward2026','1');
    if(isNew){
      setWizards(p=>{
        var updated=p.map(w=>w.id===wiz.id?{...w,owned:true}:w);
        storeSet('app:wizards',JSON.stringify(Object.fromEntries(updated.map(w=>[w.id,w.owned]))));
        return updated;
      });
    }else{
      applyAff(wiz.id,20,'up');
      addLogEntry({taskId:'__beta_gacha__',taskName:'베타 보상 수집(중복)',wizardId:wiz.id,wizardName:wiz.name,delta:20,dir:'up',source:'gacha'});
    }
    setBetaModal('dialogue');
  }

  // 마화 트랜잭션 로그
  function addMahwaLog(type,amount,balance,desc,extra){
    var entry={ts:Date.now(),type,amount,balance,desc};
    if(extra)Object.assign(entry,extra);
    setMahwaLog(prev=>{
      var updated=[...prev,entry];
      storeSet('app:mahwaLog',JSON.stringify(updated));
      return updated;
    });
  }

  // 로그 추가
  function addLogEntry({taskId,taskName,wizardId,wizardName,delta,dir,source}){
    var day=gameDay();
    setLogs(prev=>{
      var dl=prev[day]||{entries:[],affinityTotals:{},completedCount:0,finalized:false,journalWizardId:null,journalText:null,journalUnread:false};
      var newEntries=[...dl.entries,{taskId,taskName,wizardId,wizardName,delta,dir,source,ts:Date.now()}];
      var newTotals={...dl.affinityTotals};
      if(wizardId){var ex=newTotals[wizardId]||{name:wizardName,total:0};newTotals[wizardId]={name:wizardName,total:ex.total+(dir==='up'?delta:-delta)};}
      var completedCount=newEntries.filter(e=>e.dir==='up'&&e.source==='task').length;
      return{...prev,[day]:{...dl,entries:newEntries,affinityTotals:newTotals,completedCount}};
    });
  }

  function applyAff(wId,delta,dir){
    var from=affinity[wId]||0,curLv=level[wId]||1;
    var to=dir==='up'?from+delta:from-delta;
    var chgFrom=from,chgDelta=delta,chgDir=dir;
    var wiz=wizards.find(w=>w.id===wId);
var maxLv=wiz?wiz.maxLv||5:5;
if(dir==='up'&&curLv>=maxLv)to=Math.min(to,LV_REQ[maxLv-1]);
if(to>=LV_REQ[curLv]&&curLv<maxLv){
      var newLv=curLv+1,carry=to-LV_REQ[curLv];
      to=carry;chgFrom=0;chgDelta=carry;
      setLevel(p=>({...p,[wId]:newLv}));
      var wiz=wizards.find(w=>w.id===wId);
      setLvUpEvent({wiz,prevLv:curLv,newLv,dialogue:getLvUpLine(wId,curLv)});
      setLvTransitions(p=>({...p,[wId]:{from:curLv,to:newLv}}));
      setTimeout(()=>setLvTransitions(p=>({...p,[wId]:null})),4000);
    }
    setAffinity(p=>({...p,[wId]:to}));
    setAffinityChanges(p=>({...p,[wId]:{from:chgFrom,delta:chgDelta,dir:chgDir}}));
    setTimeout(()=>setAffinityChanges(p=>({...p,[wId]:null})),4500);
  }

  function onUpd(idx,patch){
    if(patch==='complete'){
      var s=slots[idx];
      var wiz=wizards.find(w=>w.id===s.wizardId);
      var task=tasks.find(t=>t.id===s.taskId);
      var delta=s.tagMatch?25:20;
      applyAff(s.wizardId,delta,'up');
      if(doneCount<13){
        setMahwa(n=>{
          var next=n+10;
          addMahwaLog('task',+10,next,`임무 완료: ${task?task.name:'?'} (${wiz?wiz.name:'?'})`);
          return next;
        });
      }
      if(doneCount===12)setShowMahwaLimit(true);
      setDoneCount(n=>n+1);
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,status:'done',dialogue:getLine(s.wizardId,'TASK_SUCCESS')}:sl));
      addLogEntry({taskId:s.taskId,taskName:task?task.name:'?',wizardId:s.wizardId,wizardName:wiz?wiz.name:'?',delta,dir:'up',source:'task'});
    }else if(patch==='forfeit'){
      var s2=slots[idx];
      var wiz2=wizards.find(w=>w.id===s2.wizardId);
      var task2=tasks.find(t=>t.id===s2.taskId);
      applyAff(s2.wizardId,20,'down');
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,status:'forfeited',dialogue:getLine(s2.wizardId,'TASK_FAILURE')}:sl));
      addLogEntry({taskId:s2.taskId,taskName:task2?task2.name:'?',wizardId:s2.wizardId,wizardName:wiz2?wiz2.name:'?',delta:20,dir:'down',source:'task'});
    }else if(patch==='activate'){
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,status:'active',editing:false,startedAt:Date.now()}:sl));
    }else{
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,...patch}:sl));
    }
  }

  // 임무 확정: fillEmpty=true면 빈 슬롯에 시스템 슬롯 채움
  function onConfirmMission(fillEmpty){
    var usedIds=slots.filter(s=>s.wizardId).map(s=>s.wizardId);
    var pool=wizards.filter(w=>w.owned&&!usedIds.includes(w.id));
    var newSlots=slots.map(s=>{
      if(!s.isSystem&&s.taskId&&s.wizardId)return{...s,status:'active',startedAt:Date.now()};
      if(fillEmpty&&(!s.taskId||!s.wizardId)){
        if(pool.length>0){
          var chosen=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
          return mkSystemSlot(chosen);
        }else{
          return{...mkSlot(),isSystem:true,status:'system_active',systemText:null};
        }
      }
      return s;
    });
    setSlots(newSlots);setConfirmed(true);
  }
  function onReset(){setSlots([mkSlot(),mkSlot(),mkSlot()]);setConfirmed(false);}
  function onSlotReset(idx){setSlots(p=>p.map((sl,i)=>i===idx?{...mkSlot(),editing:true}:sl));}

  // T 버튼
  function onTestFinalize(){
    var day=gameDay();
    setLogs(prev=>{
      var dl=prev[day];
      if(!dl||dl.entries.length===0){
        var ownedW=wizards.filter(w=>w.owned);if(ownedW.length===0)return prev;
        var entries=[],totals={};
        for(var k=0;k<3;k++){var rw=ownedW[Math.floor(Math.random()*ownedW.length)];var rt=tasks[Math.floor(Math.random()*tasks.length)];entries.push({taskId:rt.id,taskName:rt.name,wizardId:rw.id,wizardName:rw.name,delta:20,dir:'up',source:'task',ts:Date.now()});if(!totals[rw.id])totals[rw.id]={name:rw.name,total:0};totals[rw.id].total+=20;}
        dl={entries,affinityTotals:totals,completedCount:3,finalized:false,journalWizardId:null,journalText:null,journalUnread:false};
      }
      var fin=finalizeLog(dl);var newLogs={...prev,[day]:fin};
      if(Object.values(newLogs).some(l=>l.journalUnread))setTimeout(()=>setShowJournalPopup(true),200);
      return newLogs;
    });
  }
  function onMarkRead(ds){setLogs(prev=>{if(!prev[ds]||!prev[ds].journalUnread)return prev;return{...prev,[ds]:{...prev[ds],journalUnread:false}};});}

  // 설정 기능
  function handleBackup(){
    Promise.all(STORAGE_KEYS.map(k=>storeGet(k).then(v=>({k,v})))).then(pairs=>{
      var data={};pairs.forEach(({k,v})=>{if(v!==null)data[k]=v;});
      var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='mahwa_backup_'+new Date().toISOString().slice(0,10)+'.json';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    });
  }
  async function handleRestore(data){
    await Promise.all(STORAGE_KEYS.map(storeDel));
    await Promise.all(Object.entries(data).map(([k,v])=>storeSet(k,v)));
    setShowSettings(false);
    onForceReset();
  }
  function handleChangeClubs(newClubs){
    var updated={...clubFilter,clubs:newClubs,changedAt:new Date().toISOString().slice(0,10)};
    setClubFilter(updated);
    storeSet('app:clubFilter',JSON.stringify(updated));
  }
  function handleNewClubDecision(club,include){
    setClubFilter(prev=>{
      var knownClubs=[...(prev.knownClubs||prev.clubs),club];
      var clubs=include?[...prev.clubs,club]:prev.clubs;
      var updated={...prev,clubs,knownClubs};
      storeSet('app:clubFilter',JSON.stringify(updated));
      return updated;
    });
    setNewClubQueue(prev=>prev.slice(1));
  }
  function handleInstantChangeClubs(){
    if(mahwa<300)return;
    setMahwa(n=>{var next=n-300;addMahwaLog('instant_change',-300,next,'수집 필터 즉시 변경');return next;});
    setClubFilter(prev=>{
      var updated={...prev,changedAt:'2000-01-01'};
      storeSet('app:clubFilter',JSON.stringify(updated));
      return updated;
    });
  }

  function resetAllData(){
    Promise.all([...STORAGE_KEYS.map(storeDel)]);
    setWizards(_wizardDefs.map(w=>({...w,owned:false})));
    setSlots([mkSlot(),mkSlot(),mkSlot()]);
    setConfirmed(false);setMahwa(0);setDoneCount(0);setGachaDate('');
    setAffinity(Object.fromEntries(_wizardDefs.map(w=>[w.id,0])));
    setAffinityChanges(Object.fromEntries(_wizardDefs.map(w=>[w.id,null])));
    setLevel(Object.fromEntries(_wizardDefs.map(w=>[w.id,1])));
    setLvTransitions(Object.fromEntries(_wizardDefs.map(w=>[w.id,null])));
    setLvUpEvent(null);setFirstRunDone(false);setLogs({});setPlayerName('');setClubFilter(null);setFavTasks([]);setMahwaLog([]);
    localStorage.removeItem('app:primaryColor');
    applyPrimaryColor('#B8922A');
  }

  var ownedCount=wizards.filter(w=>w.owned).length;
  var isLoading=!userLoaded;

  if(isLoading)return<SparkleLoader msg='준비 중...'/>;
  if(!firstRunDone){

var cf={clubs:clubs||[],knownClubs:allKnown,changedAt:new Date().toISOString().slice(0,10)};

      setFirstRunDone(true);

  }

  return(
    <div style={{paddingBottom:54}}>
      {/* 설정 버튼 (A) */}
      <button onClick={()=>setShowSettings(true)} style={{position:'fixed',top:14,right:14,width:28,height:28,borderRadius:'50%',border:'0.5px solid rgba(0,0,0,0.15)',background:'rgba(255,255,255,0.9)',fontSize:11,fontWeight:600,color:'rgba(0,0,0,0.4)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',zIndex:150,boxShadow:'0 1px 4px rgba(0,0,0,0.08)'}}>A</button>

      {page==='mission'&&<MissionPage wizards={wizards} tasks={tasks} mahwa={mahwa} doneCount={doneCount} affinity={affinity} affinityChanges={affinityChanges} level={level} lvTransitions={lvTransitions} lvUpEvent={lvUpEvent} setLvUpEvent={setLvUpEvent} onUpd={onUpd} onConfirmMission={onConfirmMission} onReset={onReset} onSlotReset={onSlotReset} slots={slots} confirmed={confirmed} favTasks={favTasks}/>}
      {page==='collect'&&<CollectPage wizards={wizards} setWizards={setWizards} mahwa={mahwa} setMahwa={setMahwa} affinity={affinity} level={level} applyAff={applyAff} ownedCount={ownedCount} gachaDate={gachaDate} setGachaDate={setGachaDate} addLogEntry={addLogEntry} clubFilter={clubFilter} addMahwaLog={addMahwaLog}/>}
      {page==='record'&&<RecordPage logs={logs} wizards={wizards} onMarkRead={onMarkRead} onTestFinalize={onTestFinalize}/>}
      {showInstallBanner&&(
  <div style={{position:'fixed',bottom:62,left:12,right:12,background:'white',borderRadius:12,padding:'14px 16px',boxShadow:'0 4px 20px rgba(0,0,0,0.12)',border:'0.5px solid #D8D8D8',zIndex:190,display:'flex',alignItems:'center',gap:12}}>
    <div style={{flex:1}}>
      <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',marginBottom:3}}>홈 화면에 설치하면 더 쾌적해요</div>

      ):(
        <div style={{fontSize:11,color:'var(--color-text-secondary)',maxWidth:120,lineHeight:1.6,textAlign:'right'}}>브라우저 메뉴 → 홈 화면에 추가 → 앱 설치</div>
      )}
      <button onClick={()=>{setShowInstallBanner(false);localStorage.setItem('installBannerDismissed','1');}} style={{padding:'5px 14px',borderRadius:8,border:'0.5px solid #D8D8D8',background:'white',color:'var(--color-text-tertiary)',fontSize:11,cursor:'pointer'}}>다시 보지 않기</button>
    </div>
  </div>
)}
      <BottomNav page={page} setPage={setPage}/>

      {showSettings&&<SettingsPanel

      {showResetConfirm&&<ConfirmModal msg={'데이터를 정말 초기화하나요?\n모든 진행 상황이 삭제됩니다.'} confirmLabel='초기화' cancelLabel='취소' onConfirm={()=>{resetAllData();setShowResetConfirm(false);}} onCancel={()=>setShowResetConfirm(false)} confirmDisabled={false} danger={true}/>}

      {/* 신규 분과회 팝업 */}
      {newClubQueue.length>0&&(
        <Overlay>
          <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'88%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
            <div style={{fontSize:12,fontWeight:600,color:'var(--color-primary)',textAlign:'center',marginBottom:16,letterSpacing:'0.3px'}}>신규 분과회 확보 성공!</div>

              <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>{newClubQueue[0].wizNames.join(' · ')}</div>
            </div>
            <div style={{fontSize:13,color:'var(--color-text-primary)',textAlign:'center',marginBottom:20,lineHeight:1.8}}>당신의 이야기에 등장시킬까요?</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>handleNewClubDecision(newClubQueue[0].club,false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>아니오</button>
              <button onClick={()=>handleNewClubDecision(newClubQueue[0].club,true)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>예</button>
            </div>
          </div>
        </Overlay>
      )}
      {betaModal&&newClubQueue.length===0&&(
        <Overlay>
          {betaModal==='announcement'&&(
            <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'88%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
              <div style={{fontSize:12,fontWeight:600,color:'var(--color-primary)',textAlign:'center',marginBottom:16,letterSpacing:'0.3px'}}>베타테스터 이용 보상</div>
              <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:2,marginBottom:8,textAlign:'center'}}>밤낮 임무에 매진하여 주시는<br/>여러분께 감사의 뜻을 담아<br/>신규 분과회 한정 수집 기회를<br/>드립니다.</div>
              <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:20}}>대상 분과회: A시 · 어게인</div>
              <button onClick={startBetaGacha} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>수집하기</button>
            </div>
          )}
          {betaModal==='missed'&&(
            <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'88%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
              <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center',fontFamily:"Georgia,'Nanum Myeongjo',serif",fontStyle:'italic'}}>신규 마법사? 누구지? ……돌아보려는 순간 사라졌다. 아무 일도 일어나지 않았다.</div>
              <button onClick={()=>{localStorage.setItem('app:betaReward2026','1');setBetaModal(null);}} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
            </div>
          )}
          {(betaModal==='dialogue'||betaModal==='resultNew'||betaModal==='resultDup')&&betaGWiz&&(
            <div style={{maxWidth:320,width:'88%'}}>
              <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:betaGWiz.bg,borderRadius:12,border:'0.5px solid '+betaGWiz.border}}>
                <Avatar wiz={betaGWiz} size={48}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:betaGWiz.accent,marginBottom:6}}>{betaGWiz.name}</div>
                  <div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{betaTyped}{betaTyped.length<betaFull.length&&<span style={{opacity:0.4}}>▌</span>}</div>
                </div>
              </div>
              {(betaModal==='resultNew'||betaModal==='resultDup')&&(
                <div style={{marginTop:12}}>
                  <div style={{textAlign:'center',padding:'11px',background:'rgba(255,255,255,0.7)',borderRadius:10,border:'0.5px solid rgba(0,0,0,0.07)',marginBottom:8}}>
                    <div style={{fontSize:13,color:'rgba(0,0,0,0.55)',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>{betaModal==='resultNew'?betaGWiz.name+' 수집 성공!':betaGWiz.name+'의 인연이 상승했습니다.'}</div>
                  </div>
                  <button onClick={()=>setBetaModal(null)} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
                </div>
              )}
            </div>
          )}
        </Overlay>
      )}
      {showMahwaLimit&&(
  <Overlay>
    <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
      <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>오늘의 마화 보상이 모두 지급되었습니다.</div>
      <button onClick={()=>setShowMahwaLimit(false)} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
    </div>
  </Overlay>
)}
        {showJournalPopup&&(
        <Overlay>
          <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
            <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>미확인 일지를 확인할까요?</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setShowJournalPopup(false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>나중에</button>
              <button onClick={()=>{setShowJournalPopup(false);setPage('record');}} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>네</button>
            </div>
          </div>
        </Overlay>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
