      </div>
    </div>
  );
}

// ── 이벤트: 집중 모드 타이머 ──────────────────────────────────────────────────
function FocusMode({wiz,taskLabel,targetMs,initialElapsed,onComplete,onGiveUp,onSaveTimer}){
  var[elapsed,setElapsed]=useState(initialElapsed||0);
  var[canComplete,setCanComplete]=useState((initialElapsed||0)>=targetMs);
  var[showGiveUp,setShowGiveUp]=useState(false);
  var intervalRef=useRef(null);
  var lastTickRef=useRef(null);
  var isVisibleRef=useRef(!document.hidden);

  useEffect(function(){
    function handleVis(){
      isVisibleRef.current=!document.hidden;
      if(!document.hidden)lastTickRef.current=Date.now();
    }
    document.addEventListener('visibilitychange',handleVis);
    lastTickRef.current=Date.now();
    intervalRef.current=setInterval(function(){
      if(!isVisibleRef.current)return;
      var now=Date.now();
      var delta=now-(lastTickRef.current||now);
      lastTickRef.current=now;
      setElapsed(function(prev){
        var next=prev+delta;
        if(next>=targetMs)setCanComplete(true);
        return next;
      });
    },200);
    return function(){
      clearInterval(intervalRef.current);
      document.removeEventListener('visibilitychange',handleVis);
    };
  },[]);

  var saveTickRef=useRef(0);
  useEffect(function(){
    saveTickRef.current++;
    if(saveTickRef.current%25===0)onSaveTimer(elapsed);
  },[elapsed]);

  var progress=Math.min(elapsed/targetMs,1);
  var r=54,circ=2*Math.PI*r;
  var dashOffset=circ*(1-progress);

  return(
    <div style={{position:'fixed',inset:0,background:'#15161C',zIndex:500,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'40px 24px'}}>
      {wiz&&(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,marginBottom:32}}>
          <Avatar wiz={wiz} size={56}/>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.5)'}}>{wiz.name}{wiz.josa2} 함께</div>
        </div>
      )}
      <div style={{position:'relative',width:140,height:140,marginBottom:20}}>
        <svg width="140" height="140" style={{transform:'rotate(-90deg)'}}>
          <circle cx="70" cy="70" r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="6"/>
          <circle cx="70" cy="70" r={r} fill="none"
            stroke={canComplete?'var(--color-primary)':'rgba(255,255,255,0.5)'}
            strokeWidth="6" strokeDasharray={circ} strokeDashoffset={dashOffset}
            strokeLinecap="round" style={{transition:'stroke-dashoffset 0.2s ease,stroke 0.5s ease'}}/>
        </svg>
        <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <div style={{fontSize:28,fontWeight:300,color:'white',fontVariantNumeric:'tabular-nums',letterSpacing:'2px'}}>{fmtTimer(elapsed)}</div>
          <div style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginTop:4,letterSpacing:'1px'}}>{canComplete?'완료 가능':'집중 중'}</div>
        </div>
      </div>
      <div style={{fontSize:14,color:'rgba(255,255,255,0.6)',marginBottom:8,fontStyle:'italic',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>{taskLabel}</div>
      <div style={{fontSize:11,color:'rgba(255,255,255,0.28)',marginBottom:40}}>{canComplete?'언제든 완료를 눌러도 됩니다':'20분 동안 집중하세요'}</div>
      <button onClick={function(){onSaveTimer(0);onComplete(elapsed);}} disabled={!canComplete}
        style={{width:'100%',maxWidth:280,padding:'14px',borderRadius:12,border:'none',
          background:canComplete?'var(--color-primary)':'rgba(255,255,255,0.08)',
          color:canComplete?'white':'rgba(255,255,255,0.25)',
          fontSize:15,fontWeight:500,marginBottom:16,cursor:canComplete?'pointer':'not-allowed',transition:'background 0.5s,color 0.5s'}}>
        완료
      </button>
      <button onClick={function(){setShowGiveUp(true);}}
        style={{background:'transparent',border:'none',fontSize:12,color:'rgba(255,255,255,0.28)',textDecoration:'underline',textDecorationStyle:'dotted',cursor:'pointer'}}>
        포기하기
      </button>
      {showGiveUp&&(
        <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',padding:'0 24px'}}>
          <div style={{background:'white',borderRadius:14,padding:'24px 20px',width:'100%',maxWidth:300}}>
            <div style={{fontSize:13,color:'var(--color-text-primary)',textAlign:'center',marginBottom:8}}>집중 모드를 종료할까요?</div>
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:20,lineHeight:1.7}}>포기해도 페널티는 없습니다.<br/>다시 도전할 수 있습니다.</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={function(){setShowGiveUp(false);}} style={{flex:1,padding:'10px',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,color:'var(--color-text-secondary)',cursor:'pointer',fontFamily:'inherit'}}>계속하기</button>
              <button onClick={function(){onSaveTimer(elapsed);onGiveUp();}} style={{flex:1,padding:'10px',borderRadius:8,border:'none',background:'#8A3030',color:'white',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>포기하기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── 이벤트: VN 뷰어 ────────────────────────────────────────────────────────────
var BG_STYLES={
  office:{bg:'#EEE8DC'},street:{bg:'#D6E8D6'},sky:{bg:'#D0E4F0'},room:{bg:'#E8E0D0'},default:{bg:'#E8E8E8'}
};
function VNViewer({episode,wizards,onClose}){
  var[idx,setIdx]=useState(0);
  var scenes=episode.scenes||[];
  var scene=scenes[idx]||null;
  var wiz=scene&&scene.speaker?wizards.find(function(w){return w.id===scene.speaker;}):null;
  var bgStyle=BG_STYLES[scene&&scene.bg]||BG_STYLES.default;
  var isLast=idx>=scenes.length-1;

  function next(){if(isLast){onClose();return;}setIdx(function(i){return i+1;});}

  if(!scene)return(
    <div style={{position:'fixed',inset:0,background:'#1A1A1A',zIndex:400,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
      <div style={{color:'rgba(255,255,255,0.4)',fontSize:13,marginBottom:24}}>스토리가 준비 중입니다.</div>
      <button onClick={onClose} style={{padding:'10px 28px',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,cursor:'pointer',fontFamily:'inherit'}}>닫기</button>
    </div>
  );

  return(
    <div onClick={next} style={{position:'fixed',inset:0,zIndex:400,display:'flex',flexDirection:'column',cursor:'pointer',userSelect:'none',background:bgStyle.bg,transition:'background 0.4s ease'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'52px 20px 12px'}}>
        <div style={{fontSize:11,color:'rgba(0,0,0,0.38)',letterSpacing:'0.5px'}}>{episode.title||''}</div>
        <button onClick={function(e){e.stopPropagation();onClose();}} style={{background:'rgba(0,0,0,0.08)',border:'none',borderRadius:20,padding:'4px 12px',fontSize:11,color:'rgba(0,0,0,0.4)',cursor:'pointer',fontFamily:'inherit'}}>닫기</button>
      </div>
      <div style={{textAlign:'center',fontSize:10,color:'rgba(0,0,0,0.25)',letterSpacing:'0.5px'}}>{idx+1} / {scenes.length}</div>
      <div style={{flex:1}}/>
      <div style={{padding:'0 16px 40px'}}>
        {wiz&&(
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
            <Avatar wiz={wiz} size={28}/>
            <span style={{fontSize:12,fontWeight:600,color:wiz.accent}}>{wiz.name}</span>
          </div>
        )}
        <div style={{background:'rgba(255,255,255,0.88)',borderRadius:12,padding:'16px 18px',border:'0.5px solid rgba(0,0,0,0.08)'}}>
          <p style={{fontSize:14,color:'var(--color-text-primary)',lineHeight:1.9,fontFamily:"Georgia,'Nanum Myeongjo',serif",letterSpacing:'0.1px',margin:0}}>{scene.text}</p>
        </div>
        <div style={{textAlign:'right',marginTop:8,fontSize:10,color:'rgba(0,0,0,0.25)'}}>{isLast?'[닫기]':'[화면을 탭하여 계속]'}</div>
      </div>
    </div>
  );
}

// ── 이벤트 페이지 ──────────────────────────────────────────────────────────────
function EventPage({meta,story,prog,setProg,wizards,mahwa,setMahwa,applyAff,setRoomItems,addLogEntry,addMahwaLog,onClose}){
  var[view,setView]=useState('page'); // 'page'|'focus'|'vn'
  var[selWiz,setSelWiz]=useState(null);
  var[showWizPick,setShowWizPick]=useState(false);
  var[vnEp,setVnEp]=useState(null);
  var[modal,setModal]=useState(null); // 'info'|'resumeConfirm'
  var[rewardInfo,setRewardInfo]=useState(null);
  var[toast,setToast]=useState('');

  var eventId=meta.event_id;
  var active=isEventActive(meta);
  var thisWeekDone=completedThisWeek(prog);
  var nextEpNum=nextEventEp(prog);
  var allDone=allEventEpsCompleted(prog);
  var completionDone=prog.rewards[99]!==null;
  var targetMs=(meta.focus_minutes||20)*60*1000;

  function showToast(msg){setToast(msg);setTimeout(function(){setToast('');},2500);}

  // 프롤로그 자동 재생 + 참가 보상 지급
  useEffect(function(){
    if(prog.prologueShown)return;
    var prologueEp=story?story.episodes.find(function(e){return e.ep===0;}):null;
    var t=setTimeout(function(){
      if(prologueEp&&prologueEp.scenes&&prologueEp.scenes.length>0){
        setVnEp({...prologueEp,onClose:function(){
          setView('page');setVnEp(null);
          // 프롤로그 완료 후 참가 보상 지급
          grantPrologueReward();
        }});
        setView('vn');
      }
      setProg(function(p){return{...p,prologueShown:true};});
    },600);
    return function(){clearTimeout(t);};
  },[]);

  function grantPrologueReward(){
    var pItem=meta.items&&meta.items.find(function(i){return i.granted_at_ep===0;});
    if(!pItem)return;
    grantEventItems([pItem],null);
    showToast('참가 보상이 지급되었습니다!');
  }

  // 이벤트 아이템 지급 (roomItems에 추가)
  function grantEventItems(items,ep){
    items.forEach(function(item){
      (item.recipients||[]).forEach(function(rec){
        setRoomItems(function(p){
          var prev=Array.isArray(p[rec.wiz_id])?p[rec.wiz_id]:[];
          // 중복 방지
          if(prev.some(function(r){return r.itemId===item.item_id;}))return p;
          var updated={...p,[rec.wiz_id]:[...prev,{itemId:item.item_id,acquiredAt:gameDay(),type:'event'}]};
          storeSet('app:roomItems',JSON.stringify(updated));
          return updated;
        });
      });
    });
  }

  // affinity 지급 (이벤트 임무 완료 시)
  function grantEventAff(wiz,delta){
    applyAff(wiz.id,delta,'up');
    addLogEntry({taskId:meta.task_id,taskName:meta.task_label,wizardId:wiz.id,wizardName:wiz.name,delta:delta,dir:'up',source:'event_task',eventId:eventId});
  }

  // 타이머 저장
  function handleSaveTimer(elapsed){
    setProg(function(p){return{...p,timerState:{elapsed:elapsed,weekKey:weekKey()}};});
  }

  // 집중 모드 완료
  function handleFocusComplete(){
    var ep=nextEpNum;
    if(!ep){setView('page');return;}
    var reward=meta.rewards&&meta.rewards.find(function(r){return r.ep===ep;});
    var rewardItems=meta.items&&meta.items.filter(function(i){return i.granted_at_ep===ep;});

    // 마화 지급
    if(reward&&reward.mahwa){
      setMahwa(function(m){
        var nx=m+reward.mahwa;
        addMahwaLog('event_reward',reward.mahwa,nx,'이벤트 보상('+ep+'화): 마화 '+reward.mahwa+'닢',{eventId:eventId});
        return nx;
      });
    }

    // affinity: 이벤트 클럽 마법사와 했으면 bonus
    if(selWiz){
      var delta=meta.bonus_task_ids&&meta.bonus_task_ids.includes(meta.task_id)?meta.bonus_affinity||5:5;
      grantEventAff(selWiz,delta);
    }

    // 아이템 지급
    if(rewardItems&&rewardItems.length)grantEventItems(rewardItems,ep);

    // 진도 업데이트
    setProg(function(p){
      var newRewards={...p.rewards,[ep]:{grantedAt:new Date().toISOString(),weekKey:weekKey()}};
      var newUnlocked=[...new Set([...p.unlockedEps,reward&&reward.unlock_story_ep].filter(Boolean))];
      var updated={...p,rewards:newRewards,unlockedEps:newUnlocked,timerState:{elapsed:0,weekKey:''}};

      // 완수 보상 체크
      if([1,2,3].every(function(e){return newRewards[e]!==null;})&&!p.rewards[99]){
        var cReward=meta.rewards&&meta.rewards.find(function(r){return r.ep===99;});
        var cItems=meta.items&&meta.items.filter(function(i){return i.granted_at_ep===99;});
        if(cReward&&cReward.mahwa){
          setMahwa(function(m){
            var nx=m+cReward.mahwa;
            addMahwaLog('event_reward',cReward.mahwa,nx,'이벤트 완수 보상: 마화 '+cReward.mahwa+'닢',{eventId:eventId});
            return nx;
          });
        }
        if(cItems&&cItems.length)grantEventItems(cItems,99);
        updated.rewards={...newRewards,99:{grantedAt:new Date().toISOString(),weekKey:weekKey()}};
        setTimeout(function(){setRewardInfo({ep:99,isCompletion:true,reward:cReward,items:cItems});},400);
      }
      return updated;
    });

    addLogEntry({taskId:'__event__',taskName:'이벤트 임무('+meta.task_label+')',wizardId:selWiz?selWiz.id:'',wizardName:selWiz?selWiz.name:'',delta:0,dir:'up',source:'event_task',eventId:eventId});
    setRewardInfo({ep:ep,isCompletion:false,reward:reward,items:rewardItems});
    setView('page');
  }

  function startFocus(){
    if(!selWiz){showToast('마법사를 먼저 선택해 주세요.');return;}
    var saved=prog.timerState;
    if(saved&&saved.elapsed>0&&saved.weekKey===weekKey()){setModal('resumeConfirm');}
    else{setProg(function(p){return{...p,timerState:{elapsed:0,weekKey:weekKey()}};});setView('focus');}
  }

  function openStory(ep){
    if(!story)return showToast('스토리를 불러오는 중입니다.');
    var epData=story.episodes.find(function(e){return e.ep===ep;});
    if(!epData||!epData.scenes||!epData.scenes.length)return showToast('스토리가 준비 중입니다.');
    setVnEp(epData);setView('vn');
  }

  // ── 포커스/VN 화면 ──────────────────────────────────────────────────────────
  if(view==='focus'&&selWiz){
    return<FocusMode wiz={selWiz} taskLabel={meta.task_label} targetMs={targetMs}
      initialElapsed={prog.timerState&&prog.timerState.elapsed||0}
      onComplete={handleFocusComplete}
      onGiveUp={function(){setView('page');showToast('집중 모드를 종료했습니다. 다시 도전할 수 있어요.');}}
      onSaveTimer={handleSaveTimer}/>;
  }
  if(view==='vn'&&vnEp){
    return<VNViewer episode={vnEp} wizards={wizards}
      onClose={vnEp.onClose||function(){setView('page');setVnEp(null);}}/>;
  }

  var periodStr=parseEventDate(meta.start_date).slice(5).replace('-','/')+' – '+parseEventDate(meta.end_date).slice(5).replace('-','/');

  // ── 이벤트 페이지 본문 ──────────────────────────────────────────────────────
  return(
    <div style={{position:'fixed',inset:0,background:'#F6F6F6',zIndex:250,overflowY:'auto'}}>
      <div style={{maxWidth:420,margin:'0 auto',paddingBottom:40}}>

        {/* 헤더 배너 */}
        <div style={{background:'linear-gradient(135deg,#2A3A5A 0%,#4A3020 100%)',padding:'52px 20px 24px',position:'relative',overflow:'hidden'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,bottom:0,opacity:0.06,backgroundImage:'repeating-linear-gradient(45deg,white 0,white 1px,transparent 0,transparent 50%)',backgroundSize:'20px 20px'}}/>
          <div style={{position:'relative'}}>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.5)',letterSpacing:'1.5px',marginBottom:6}}>EVENT</div>
            <div style={{fontSize:19,fontWeight:600,color:'white',lineHeight:1.4,marginBottom:4}}>{meta.title}</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,0.55)',fontStyle:'italic',marginBottom:10}}>{meta.subtitle}</div>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <span style={{fontSize:11,color:'rgba(255,255,255,0.45)'}}>{periodStr}</span>
              {active
                ?<span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'rgba(184,146,42,0.3)',color:'#F0C040',border:'0.5px solid rgba(184,146,42,0.5)'}}>진행 중</span>
                :<span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.4)'}}>종료</span>
              }
            </div>
            <button onClick={function(){setModal('info');}} style={{position:'absolute',top:0,right:0,background:'rgba(255,255,255,0.12)',border:'0.5px solid rgba(255,255,255,0.2)',borderRadius:20,padding:'4px 12px',fontSize:11,color:'rgba(255,255,255,0.6)',cursor:'pointer',fontFamily:'inherit'}}>안내</button>
            <button onClick={onClose} style={{position:'absolute',top:28,right:0,background:'rgba(255,255,255,0.08)',border:'0.5px solid rgba(255,255,255,0.15)',borderRadius:20,padding:'4px 12px',fontSize:11,color:'rgba(255,255,255,0.45)',cursor:'pointer',fontFamily:'inherit'}}>✕ 닫기</button>
          </div>
        </div>

        <div style={{padding:'16px 16px 0'}}>

          {/* 이벤트 임무 슬롯 */}
          <div style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'16px',marginBottom:12}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.5px',color:'var(--color-text-tertiary)'}}>이벤트 임무</div>
              {thisWeekDone&&active&&<span style={{fontSize:10,padding:'2px 8px',borderRadius:10,background:'rgba(184,146,42,0.1)',color:'var(--color-primary)',border:'0.5px solid rgba(184,146,42,0.3)'}}>이번 주 완료</span>}
            </div>
            {/* 임무 + 마법사 통합 슬롯 */}
            <div style={{padding:'12px 14px',borderRadius:10,background:'rgba(184,146,42,0.04)',border:'1px solid rgba(184,146,42,0.2)',marginBottom:12,display:'flex',alignItems:'center',gap:12}}>
              <button onClick={function(){if(active&&!allDone&&!thisWeekDone)setShowWizPick(true);}}
                style={{width:44,height:44,borderRadius:'50%',flexShrink:0,border:'1.5px dashed rgba(184,146,42,0.5)',background:'rgba(184,146,42,0.06)',display:'flex',alignItems:'center',justifyContent:'center',cursor:(active&&!allDone&&!thisWeekDone)?'pointer':'default',padding:0,overflow:'hidden',fontFamily:'inherit'}}>
                {selWiz?<Avatar wiz={selWiz} size={44}/>:<span style={{fontSize:18,color:'rgba(184,146,42,0.4)'}}>+</span>}
              </button>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:'var(--color-text-primary)',marginBottom:3}}>{meta.task_label}</div>
                <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>
                  {selWiz?<span style={{color:selWiz.accent}}>{selWiz.name}</span>:<span>집중 모드 {meta.focus_minutes}분</span>}
                </div>
              </div>
              {active&&!allDone&&!thisWeekDone&&(
                <button onClick={function(){setShowWizPick(true);}} style={{flexShrink:0,padding:'5px 10px',borderRadius:8,border:'0.5px solid rgba(184,146,42,0.4)',background:'transparent',fontSize:11,color:'var(--color-primary)',cursor:'pointer',fontFamily:'inherit'}}>
                  {selWiz?'변경':'마법사 배치'}
                </button>
              )}
            </div>
            {/* 상태별 하단 */}
            {!active?(
              <div style={{padding:'12px',borderRadius:10,background:'rgba(0,0,0,0.03)',textAlign:'center',fontSize:12,color:'var(--color-text-tertiary)'}}>이벤트가 종료되었습니다</div>
            ):allDone?(
              <div style={{padding:'12px',borderRadius:10,background:'rgba(184,146,42,0.04)',textAlign:'center',fontSize:12,color:'var(--color-primary)'}}>모든 회차를 완료했습니다 ✦</div>
            ):thisWeekDone?(
              <div style={{padding:'12px',borderRadius:10,background:'rgba(0,0,0,0.03)',textAlign:'center',fontSize:12,color:'var(--color-text-tertiary)',lineHeight:1.7}}>이번 주 임무를 완료했습니다.<br/><span style={{fontSize:11}}>다음 주 월요일 오전 5시에 초기화됩니다.</span></div>
            ):(
              <button onClick={startFocus} disabled={!selWiz}
                style={{width:'100%',padding:'13px',borderRadius:10,border:'none',background:selWiz?'var(--color-primary)':'rgba(0,0,0,0.07)',color:selWiz?'white':'rgba(0,0,0,0.28)',fontSize:14,fontWeight:500,cursor:selWiz?'pointer':'not-allowed',transition:'background 0.2s',fontFamily:'inherit'}}>
                {prog.timerState&&prog.timerState.elapsed>0&&prog.timerState.weekKey===weekKey()?'이어서 집중하기':'집중 모드 시작'}
              </button>
            )}
          </div>

          {/* 보상 + 스토리 통합 */}
          <div style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'16px',marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:600,letterSpacing:'0.5px',color:'var(--color-text-tertiary)',marginBottom:12}}>보상 및 스토리</div>
            <div style={{display:'flex',flexDirection:'column',gap:0}}>
              {/* 프롤로그 행 */}
              <div style={{display:'flex',alignItems:'center',gap:12,paddingBottom:12,borderBottom:'0.5px solid rgba(0,0,0,0.06)'}}>
                <div style={{width:36,height:36,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:'var(--color-primary)'}}>
                  <span style={{fontSize:13,color:'white'}}>✧</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',marginBottom:2}}>프롤로그</div>
                  <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>이벤트 시작 시 자동 해금</div>
                </div>
                <button onClick={function(){openStory(0);}}
                  style={{flexShrink:0,width:32,height:32,borderRadius:8,border:'0.5px solid rgba(184,146,42,0.3)',background:'rgba(184,146,42,0.06)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:16,fontFamily:'inherit'}}>
                  📖
                </button>
              </div>
              {/* 1~3화 + 완수 */}
              {(meta.rewards||[]).map(function(r,idx){
                var done=prog.rewards[r.ep]!==null;
                var isCurrent=!done&&r.ep===nextEpNum;
                var isCompletion=r.ep===99;
                var storyUnlocked=!isCompletion&&prog.unlockedEps.includes(r.unlock_story_ep);
                var isLast=idx===(meta.rewards.length-1);
                return(
                  <div key={r.ep} style={{display:'flex',alignItems:'center',gap:12,paddingTop:12,paddingBottom:isLast?0:12,borderBottom:isLast?'none':'0.5px solid rgba(0,0,0,0.06)',opacity:(!done&&!isCurrent&&!isCompletion)?0.45:1}}>
                    <div style={{width:36,height:36,borderRadius:'50%',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',background:done?'var(--color-primary)':isCurrent?'rgba(184,146,42,0.1)':'rgba(0,0,0,0.04)',border:done?'none':isCurrent?'1.5px solid var(--color-primary)':'0.5px solid rgba(0,0,0,0.12)'}}>
                      {done
                        ?<span style={{fontSize:12,color:'white',fontWeight:600}}>完</span>
                        :<span style={{fontSize:13,color:isCurrent?'var(--color-primary)':'rgba(0,0,0,0.28)',fontWeight:500}}>{isCompletion?'✦':r.ep}</span>
                      }
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:isCurrent?500:400,color:'var(--color-text-primary)',marginBottom:2}}>{r.ep_title}</div>
                      <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>마화 {r.mahwa}닢</div>
                    </div>
                    <div style={{flexShrink:0,display:'flex',alignItems:'center',gap:6}}>
                      {done&&prog.rewards[r.ep]&&(
                        <span style={{fontSize:10,color:'var(--color-text-tertiary)'}}>
                          {new Date(prog.rewards[r.ep].grantedAt).toLocaleDateString('ko-KR',{month:'short',day:'numeric'})}
                        </span>
                      )}
                      {!isCompletion&&storyUnlocked&&(
                        <button onClick={function(){openStory(r.unlock_story_ep);}}
                          style={{width:32,height:32,borderRadius:8,border:'0.5px solid rgba(184,146,42,0.3)',background:'rgba(184,146,42,0.06)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:15,fontFamily:'inherit'}}>
                          📖
                        </button>
                      )}
                      {isCurrent&&!storyUnlocked&&<span style={{fontSize:10,color:'var(--color-primary)'}}>진행 중</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      </div>

      {/* 마법사 선택 */}
      {showWizPick&&<EventWizPickModal wizards={wizards} targetClub={meta.target_club} onSelect={function(wiz){setSelWiz(wiz);setShowWizPick(false);}} onClose={function(){setShowWizPick(false);}}/>}

      {/* 안내 모달 */}
      {modal==='info'&&(
        <Overlay>
          <div style={{background:'white',borderRadius:14,padding:'22px 20px',maxWidth:320,width:'100%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.1)'}}>
            <div style={{fontSize:14,fontWeight:600,color:'var(--color-text-primary)',marginBottom:10}}>{meta.title}</div>
            <div style={{fontSize:12,color:'var(--color-text-secondary)',lineHeight:1.9,marginBottom:16}}>
              이벤트 기간 중 주 1회, 지정 임무를 집중 모드로 완료하면 보상을 지급합니다.<br/>3주 동안 모두 완료하면 완수 보상도 받을 수 있습니다.<br/><br/>
              <span style={{color:'var(--color-primary)',fontWeight:500}}>✦ {meta.target_club} 분과회</span> 마법사와 함께 수행하거나, 같은 임무를 일반 슬롯에서 수행해도 인연 +{meta.bonus_affinity}가 추가됩니다.
            </div>
            <button onClick={function(){setModal(null);}} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>확인</button>
          </div>
        </Overlay>
      )}

      {/* 타이머 재개 확인 */}
      {modal==='resumeConfirm'&&(
        <Overlay>
          <div style={{background:'white',borderRadius:14,padding:'22px 20px',maxWidth:300,width:'100%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.1)'}}>
            <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',textAlign:'center',marginBottom:8}}>이전 기록이 있습니다</div>
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:20,lineHeight:1.7}}>
              {fmtTimer(prog.timerState.elapsed)}에서 이어서 시작할까요?
            </div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={function(){setProg(function(p){return{...p,timerState:{elapsed:0,weekKey:weekKey()}};});setModal(null);setView('focus');}} style={{flex:1,padding:'10px',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:12,color:'var(--color-text-secondary)',cursor:'pointer',fontFamily:'inherit'}}>처음부터</button>
              <button onClick={function(){setModal(null);setView('focus');}} style={{flex:2,padding:'10px',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>이어서 시작</button>
            </div>
          </div>
        </Overlay>
      )}

      {/* 보상 모달 */}
      {rewardInfo&&(
        <Overlay>
          <div style={{background:'white',borderRadius:14,padding:'22px 20px',maxWidth:320,width:'100%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.1)',textAlign:'center'}}>
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',letterSpacing:'0.5px',marginBottom:8}}>{rewardInfo.isCompletion?'이벤트 완수 보상':'회차 보상'}</div>
            <div style={{fontSize:18,fontWeight:600,color:'var(--color-primary)',marginBottom:4}}>
              {rewardInfo.isCompletion?'✦ 완수!':rewardInfo.ep+'화 완료!'}
            </div>
            {rewardInfo.reward&&rewardInfo.reward.mahwa>0&&(
              <div style={{fontSize:13,color:'var(--color-text-secondary)',marginBottom:16}}>마화 +{rewardInfo.reward.mahwa}닢</div>
            )}
            {rewardInfo.items&&rewardInfo.items.length>0&&(
              <div style={{background:'rgba(0,0,0,0.025)',borderRadius:10,padding:'12px',marginBottom:16}}>
                {rewardInfo.items.map(function(item){return(
                  <div key={item.item_id} style={{marginBottom:8}}>
                    <div style={{fontSize:12,fontWeight:500,color:'var(--color-text-primary)',marginBottom:2}}>{item.name}</div>
                    <div style={{fontSize:10,color:'var(--color-text-tertiary)'}}>{item.description}</div>
                    {(item.recipients||[]).map(function(rec){
                      var rwiz=wizards.find(function(w){return w.id===rec.wiz_id;});
                      return rwiz?(
                        <div key={rec.wiz_id} style={{display:'flex',alignItems:'center',gap:6,justifyContent:'center',marginTop:6}}>
                          <Avatar wiz={rwiz} size={20}/>
                          <span style={{fontSize:11,color:'var(--color-text-tertiary)'}}>{rwiz.name}의 소지품으로 추가됨</span>
                        </div>
                      ):null;
                    })}
                  </div>
                );})}
              </div>
            )}
            <button onClick={function(){setRewardInfo(null);}} style={{width:'100%',padding:'10px',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'}}>확인</button>
          </div>
        </Overlay>
      )}

      {/* 토스트 */}
      {toast&&<div style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',background:'rgba(30,30,30,0.88)',color:'white',fontSize:12,padding:'10px 18px',borderRadius:20,zIndex:600,whiteSpace:'nowrap',pointerEvents:'none'}}>{toast}</div>}
    </div>
  );
}


function BottomNav({page,setPage}){
  return(
    <div style={{position:'fixed',bottom:0,left:0,right:0,height:54,background:'white',borderTop:'0.5px solid #DCDCDC',display:'flex',zIndex:200}}>
      {[{id:'mission',label:'임무'},{id:'bookshelf',label:'책장'},{id:'store',label:'상점'},{id:'record',label:'기록'}].map(tab=>{
        var active=page===tab.id;
        return<button key={tab.id} onClick={()=>setPage(tab.id)} style={{flex:1,border:'none',borderTop:active?'2px solid var(--color-primary)':'2px solid transparent',background:'transparent',fontSize:13,cursor:'pointer',color:active?'var(--color-primary)':'rgba(0,0,0,0.38)',fontWeight:active?500:400,transition:'color 0.2s'}}>{tab.label}</button>;
      })}
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  var[appKey,setAppKey]=useState(0);
  return<AppInner key={appKey} onForceReset={()=>setAppKey(k=>k+1)}/>;
}

function AppInner({onForceReset}){
  var[userLoaded,setUserLoaded]=useState(false); // 유저 데이터 로드 완료
  var[firstRunDone,setFirstRunDone]=useState(false);
  var[showJournalPopup,setShowJournalPopup]=useState(false);
  var[showSettings,setShowSettings]=useState(false);
  var[showResetConfirm,setShowResetConfirm]=useState(false);
  var[page,setPage]=useState('mission');
  var[bookshelfKey,setBookshelfKey]=useState(0);

  function handleSetPage(p){
    if(p==='bookshelf') setBookshelfKey(k=>k+1); // 책장 탭 클릭 시 항상 목록으로 리셋
    setPage(p);
  }
  var[wizards,setWizards]=useState([]);
  var[slots,setSlots]=useState([mkSlot(),mkSlot(),mkSlot()]);
  var[confirmed,setConfirmed]=useState(false);
  var[mahwa,setMahwa]=useState(0);
  var[doneCount,setDoneCount]=useState(0);
  var[gachaDate,setGachaDate]=useState('');
  var[affinity,setAffinity]=useState({});
  var[affinityChanges,setAffinityChanges]=useState({});
  var[level,setLevel]=useState({});
  var[lvTransitions,setLvTransitions]=useState({});
  var[lvUpEvent,setLvUpEvent]=useState(null);
  var[logs,setLogs]=useState({});
  var[playerName,setPlayerName]=useState('');
  var[showInstallBanner,setShowInstallBanner]=useState(false);
  var[showMahwaLimit,setShowMahwaLimit]=useState(false);
  var[clubFilter,setClubFilter]=useState(null);
  var[newClubQueue,setNewClubQueue]=useState([]);
  var[favTasks,setFavTasks]=useState([]);
  var[mahwaLog,setMahwaLog]=useState([]);
  var[betaModal,setBetaModal]=useState(null);  var[betaGWiz,setBetaGWiz]=useState(null);
  var[betaIsNew,setBetaIsNew]=useState(false);
  var[betaFull,setBetaFull]=useState('');
  var[betaTyped,setBetaTyped]=useState('');
  var[storeDate,setStoreDate]=useState({gacha:'',forfeitWeekKey:'',forfeitWeekCount:0});
  var[inventory,setInventory]=useState({forfeitTickets:0});
  var[customTasks,setCustomTasks]=useState([]);
  var[reportInfo,setReportInfo]=useState({date:'',count:0});
  var[showReport,setShowReport]=useState(false);
  var[gachaCount,setGachaCount]=useState({});
  var[weeklyReportData,setWeeklyReportData]=useState(null);
  // 선물·책장 신규 상태
  var[wizardStats,setWizardStats]=useState({});   // app:wizardStats
  var[roomItems,setRoomItems]=useState({});        // app:roomItems
  var[maxLvReached,setMaxLvReached]=useState({}); // app:maxLvReached
  // 이벤트 상태
  var[eventMeta,setEventMeta]=useState(null);     // fetch된 이벤트 메타
  var[eventStory,setEventStory]=useState(null);   // fetch된 스토리
  var[eventProgress,setEventProgress]=useState({}); // app:eventProgress
  var[showEvent,setShowEvent]=useState(false);    // 이벤트 페이지 표시 여부
  var tasks=[...customTasks,...FB_TASKS];
  var currentDayRef = useRef(gameDay());


  // 설치 배너 및 초기 체크
  useEffect(()=>{
    var isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
    if(!isStandalone){
      var dismissed=localStorage.getItem('installBannerDismissed');
      if(!dismissed)setTimeout(()=>setShowInstallBanner(true),2000);
    }
  },[]);

  // 날짜 변경 감지 (오전 5시 리셋)
  useEffect(()=>{
    if(!userLoaded)return;
    function checkDayChange(){
      var newDay=gameDay();
      if(newDay!==currentDayRef.current){
        currentDayRef.current=newDay;
        setDoneCount(0);
        setSlots([mkSlot(),mkSlot(),mkSlot()]);
        setConfirmed(false);
      }
    }
    document.addEventListener('visibilitychange',checkDayChange);
    var iv=setInterval(checkDayChange,60000);
    return()=>{document.removeEventListener('visibilitychange',checkDayChange);clearInterval(iv);};
  },[userLoaded]);

  // 베타 보상 수집 타이핑 애니메이션
  useEffect(()=>{
    if(betaModal!=='dialogue')return;
    if(betaTyped.length>=betaFull.length){
      var t=setTimeout(()=>setBetaModal(betaIsNew?'resultNew':'resultDup'),700);
      return()=>clearTimeout(t);
    }
    var t=setTimeout(()=>setBetaTyped(p=>betaFull.slice(0,p.length+1)),45);
    return()=>clearTimeout(t);
  },[betaModal,betaTyped,betaFull,betaIsNew]);

  // 유저 데이터 로드
  useEffect(()=>{
    var day=gameDay();
    Promise.all(STORAGE_KEYS.map(storeGet)).then(vals=>{
      var mahwaVal=vals[0]!==null?Number(vals[0])||0:0;
      var ownedMap=vals[1]!==null?JSON.parse(vals[1]):{};
      var affVal=vals[2]!==null?JSON.parse(vals[2]):{};
      var lvVal=vals[3]!==null?JSON.parse(vals[3]):{};
      // 마법사 목록 초기화
      var wList=_wizardDefs.map(w=>({...w,owned:ownedMap[w.id]||false}));
      var initAff=Object.fromEntries(wList.map(w=>[w.id,affVal[w.id]||0]));
      var initLv=Object.fromEntries(wList.map(w=>[w.id,lvVal[w.id]||1]));
      setWizards(wList);
      setAffinity(initAff);
      setAffinityChanges(Object.fromEntries(wList.map(w=>[w.id,null])));
      setLevel(initLv);
      setLvTransitions(Object.fromEntries(wList.map(w=>[w.id,null])));
      setMahwa(mahwaVal);
      if(vals[4]!==null){
  var dd=JSON.parse(vals[4]);
  if(dd.date===day) setDoneCount(dd.count);
  else setDoneCount(0); // 날짜가 다르면 명시적으로 0으로 초기화
}
      if(vals[5]!==null)setGachaDate(vals[5]);
      if(vals[6]!==null){var ss=JSON.parse(vals[6]);if(ss.date===day){setSlots(ss.slots);setConfirmed(ss.confirmed);}}
      if(vals[7]==='1')setFirstRunDone(true);
      if(vals[8]!==null){
        var savedLogs=JSON.parse(vals[8]);
        var updated={...savedLogs};var changed=false;
        Object.keys(updated).forEach(ds=>{if(ds!==day&&!updated[ds].finalized){updated[ds]=finalizeLog(updated[ds]);changed=true;}});
        var fl=changed?updated:savedLogs;
        setLogs(fl);
        if(Object.values(fl).some(l=>l.journalUnread))setTimeout(()=>setShowJournalPopup(true),300);
      }
      if(vals[9]!==null)setPlayerName(vals[9]);
      // vals[10] = app:firstGachaDone (localStorage only, not in vals array)
      if(vals[11]!==null){try{setClubFilter(JSON.parse(vals[11]));}catch(e){}}
      if(vals[12]!==null){try{setFavTasks(JSON.parse(vals[12]));}catch(e){}}
      if(vals[13]!==null){try{setMahwaLog(JSON.parse(vals[13]));}catch(e){}}
      // storeDate 로드 (gachaDate 마이그레이션 포함)
      var oldGachaDate=vals[5]||'';
      if(vals[15]!==null){
        try{
          var sd=JSON.parse(vals[15]);
          if(!sd.gacha&&oldGachaDate===day)sd={...sd,gacha:day};
          if(sd.forfeit&&!sd.forfeitWeekKey){sd={...sd,forfeitWeekKey:weekKey(),forfeitWeekCount:1};delete sd.forfeit;}
          if(!sd.forfeitWeekKey)sd={...sd,forfeitWeekKey:'',forfeitWeekCount:0};
          setStoreDate(sd);
        }catch(e){}
      }else if(oldGachaDate===day){
        setStoreDate({gacha:day,forfeitWeekKey:'',forfeitWeekCount:0});
      }
      if(vals[16]!==null){
  try{
    var inv=JSON.parse(vals[16]);
    var sd2=vals[15]?JSON.parse(vals[15]):{};
    if(sd2.forfeitWeekKey&&sd2.forfeitWeekKey!==weekKey()){
      inv={...inv,forfeitTickets:0};
    }
    setInventory(inv);
  }catch(e){}
}
      if(vals[17]!==null){try{setCustomTasks(JSON.parse(vals[17]));}catch(e){}}
      if(vals[18]!==null){try{setReportInfo(JSON.parse(vals[18]));}catch(e){}}
      // gachaCount 로드 + 마이그레이션
      var gc={};
      if(vals[19]!==null){try{gc=JSON.parse(vals[19]);}catch(e){}}
      else{
        // mahwaLog에서 마이그레이션
        var ml=[];try{if(vals[13]!==null)ml=JSON.parse(vals[13]);}catch(e){}
        ml.filter(e=>(e.type==='gacha_new'||e.type==='gacha_dup')&&e.wizardId).forEach(e=>{gc[e.wizardId]=(gc[e.wizardId]||0)+1;});
        storeSet('app:gachaCount',JSON.stringify(gc));
      }
      setGachaCount(gc);
      // ── 신규 키 로딩 (인덱스 21-23) ────────────────────────────────────────
      // wizardStats (21)
      var wsVal={};
      if(vals[21]!==null){try{wsVal=JSON.parse(vals[21]);}catch(e){}}
      else{
        // 마이그레이션: logs에서 taskCount/taskBreakdown 추출
        var savedLogs3={};try{if(vals[8]!==null)savedLogs3=JSON.parse(vals[8]);}catch(e){}
        Object.values(savedLogs3).forEach(dl=>{
          (dl.entries||[]).filter(e=>e.source==='task'&&e.dir==='up').forEach(e=>{
            if(!e.wizardId)return;
            if(!wsVal[e.wizardId])wsVal[e.wizardId]={firstMet:null,taskCount:0,taskBreakdown:{}};
            wsVal[e.wizardId].taskCount++;
            wsVal[e.wizardId].taskBreakdown[e.taskName]=(wsVal[e.wizardId].taskBreakdown[e.taskName]||0)+1;
          });
        });
        // firstMet: mahwaLog gacha_new에서 추출
        var ml3=[];try{if(vals[13]!==null)ml3=JSON.parse(vals[13]);}catch(e){}
        ml3.filter(e=>e.type==='gacha_new'&&e.wizardId).forEach(e=>{
          var ds=new Date(e.ts).toISOString().slice(0,10);
          if(!wsVal[e.wizardId])wsVal[e.wizardId]={firstMet:null,taskCount:0,taskBreakdown:{}};
          if(!wsVal[e.wizardId].firstMet||ds<wsVal[e.wizardId].firstMet)wsVal[e.wizardId].firstMet=ds;
        });
        // 최초 2명(firstRunDone 시점에 owned된 마법사)의 firstMet이 없으면 logs 최초 기록일로 보완
        var ownedMap={};try{if(vals[1]!==null)ownedMap=JSON.parse(vals[1]);}catch(e){}
        var allLogDays=Object.keys(savedLogs3).sort();
        var firstLogDay=allLogDays.length>0?allLogDays[0]:gameDay();
        Object.keys(ownedMap).filter(wid=>ownedMap[wid]).forEach(wid=>{
          if(!wsVal[wid])wsVal[wid]={firstMet:null,taskCount:0,taskBreakdown:{}};
          if(!wsVal[wid].firstMet)wsVal[wid].firstMet=firstLogDay;
        });
        storeSet('app:wizardStats',JSON.stringify(wsVal));
      }
      setWizardStats(wsVal);
      // roomItems (22)
      if(vals[22]!==null){try{setRoomItems(JSON.parse(vals[22]));}catch(e){}}
      // maxLvReached (23) - 마이그레이션: 현재 level 데이터 기준
      var mrVal={};
      if(vals[23]!==null){try{mrVal=JSON.parse(vals[23]);}catch(e){}
      }else{
        var lvVal2=vals[3]!==null?JSON.parse(vals[3]):{};
        _wizardDefs.forEach(w=>{if((lvVal2[w.id]||1)>=(w.maxLv||5))mrVal[w.id]=true;});
        storeSet('app:maxLvReached',JSON.stringify(mrVal));
      }
      setMaxLvReached(mrVal);
      // eventProgress (24)
      var epVal={};
      if(vals[24]!==null){try{epVal=JSON.parse(vals[24]);}catch(e){}}
      setEventProgress(epVal);
      // 주간 리포트 자동 트리거 (월요일 접속 시, 아직 안 본 경우)
      var shown=vals[20]||'';
      var lastMon=lastWeekMonday();
      if(now.getDay()===1&&shown!==lastMon){
        // now는 아직 정의 안 됐으므로 현재 요일 재확인
        var nowDay=new Date();if(nowDay.getHours()<5)nowDay=new Date(nowDay.getTime()-864e5);
        if(nowDay.getDay()===1){
          var savedLogs2={};try{if(vals[8]!==null)savedLogs2=JSON.parse(vals[8]);}catch(e){}
          var savedWizards=_wizardDefs.map(w=>({...w,owned:(vals[1]!==null?JSON.parse(vals[1]):{})[w.id]||false}));
          var savedMahwaLog=[];try{if(vals[13]!==null)savedMahwaLog=JSON.parse(vals[13]);}catch(e){}
          var sunStr2=weekEnd(lastMon);
          var report=buildWeeklyReport(savedLogs2,savedWizards,savedMahwaLog,gc,lastMon,sunStr2);
          setWeeklyReportData(report);
          // 저장
          storeSet('app:weeklyReportShown',lastMon);
        }
      }
      var betaDone=localStorage.getItem('app:betaReward2026a');
      var firstGacha=localStorage.getItem('app:firstGachaDone');
      var tod=gameDay();
      if(!betaDone&&firstGacha==='1'&&tod>='2026-05-01'&&tod<='2026-05-02'){
        setBetaModal('announcement');
      }
      setUserLoaded(true);
      // 이벤트 데이터 fetch (백그라운드)
      fetch(EVENT_DATA_URL)
        .then(function(r){return r.json();})
        .then(function(data){_activeEvent=data;setEventMeta(data);})
        .catch(function(){});
      fetch(EVENT_STORY_URL)
        .then(function(r){return r.json();})
        .then(function(data){_activeStory=data;setEventStory(data);})
        .catch(function(){});
    }).catch(()=>setUserLoaded(true));
  },[]);

  // 자동 저장
  useEffect(()=>{if(!userLoaded)return;storeSet('app:mahwa',String(mahwa));},[mahwa,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;var om=Object.fromEntries(wizards.map(w=>[w.id,w.owned]));storeSet('app:wizards',JSON.stringify(om));},[wizards,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:affinity',JSON.stringify(affinity));},[affinity,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:level',JSON.stringify(level));},[level,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:doneCount',JSON.stringify({date:gameDay(),count:doneCount}));},[doneCount,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:slotSession',JSON.stringify({slots,confirmed,date:gameDay()}));},[slots,confirmed,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:firstRunDone',firstRunDone?'1':'0');},[firstRunDone,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:logs',JSON.stringify(logs));},[logs,userLoaded]);
  useEffect(()=>{if(!userLoaded||clubFilter===null)return;storeSet('app:clubFilter',JSON.stringify(clubFilter));},[clubFilter,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:favTasks',JSON.stringify(favTasks));},[favTasks,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:mahwaLog',JSON.stringify(mahwaLog));},[mahwaLog,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:storeDate',JSON.stringify(storeDate));},[storeDate,userLoaded]);
  useEffect(()=>{if(!userLoaded)return;storeSet('app:inventory',JSON.stringify(inventory));},[inventory,userLoaded]);

    var txt=getLine(wiz.id,isNew?'MEET':'MEET_AGAIN')||'…';
    setBetaFull(txt);setBetaTyped('');

    if(isNew){
      setWizards(p=>{
        var updated=p.map(w=>w.id===wiz.id?{...w,owned:true}:w);
        storeSet('app:wizards',JSON.stringify(Object.fromEntries(updated.map(w=>[w.id,w.owned]))));
        return updated;

  // 마화 트랜잭션 로그
  function addMahwaLog(type,amount,balance,desc,extra){
    var entry={ts:Date.now(),type,amount,balance,desc};
    if(extra)Object.assign(entry,extra);
    setMahwaLog(prev=>{
      var updated=[...prev,entry];
      storeSet('app:mahwaLog',JSON.stringify(updated));
      return updated;
    });
  }

  // 로그 추가
  function addLogEntry({taskId,taskName,wizardId,wizardName,delta,dir,source}){
    var day=gameDay();
    setLogs(prev=>{
      var dl=prev[day]||{entries:[],affinityTotals:{},completedCount:0,finalized:false,journalWizardId:null,journalText:null,journalUnread:false};
      var newEntries=[...dl.entries,{taskId,taskName,wizardId,wizardName,delta,dir,source,ts:Date.now()}];
      var newTotals={...dl.affinityTotals};
      if(wizardId){var ex=newTotals[wizardId]||{name:wizardName,total:0};newTotals[wizardId]={name:wizardName,total:ex.total+(dir==='up'?delta:-delta)};}
      var completedCount=newEntries.filter(e=>e.dir==='up'&&e.source==='task').length;
      return{...prev,[day]:{...dl,entries:newEntries,affinityTotals:newTotals,completedCount}};
    });
  }

  function applyAff(wId,delta,dir){
    var from=affinity[wId]||0,curLv=level[wId]||1;
    var to=dir==='up'?from+delta:from-delta;
    var chgFrom=from,chgDelta=delta,chgDir=dir;
    var wiz=wizards.find(w=>w.id===wId);
var maxLv=wiz?wiz.maxLv||5:5;
if(dir==='up'&&curLv>=maxLv)to=Math.min(to,LV_REQ[maxLv-1]);
if(to>=LV_REQ[curLv]&&curLv<maxLv){
      var newLv=curLv+1,carry=to-LV_REQ[curLv];
      to=carry;chgFrom=0;chgDelta=carry;
      setLevel(p=>({...p,[wId]:newLv}));
      var wiz=wizards.find(w=>w.id===wId);
      setLvUpEvent({wiz,prevLv:curLv,newLv,dialogue:getLvUpLine(wId,curLv)});
      setLvTransitions(p=>({...p,[wId]:{from:curLv,to:newLv}}));
      setTimeout(()=>setLvTransitions(p=>({...p,[wId]:null})),4000);
    }
    setAffinity(p=>({...p,[wId]:to}));
    setAffinityChanges(p=>({...p,[wId]:{from:chgFrom,delta:chgDelta,dir:chgDir}}));
    setTimeout(()=>setAffinityChanges(p=>({...p,[wId]:null})),4500);
    // maxLvReached: 현재 레벨이 maxLv에 도달한 경우 기록
    if(newLv>=(wiz?wiz.maxLv||5:5)){setMaxLvReached(p=>({...p,[wId]:true}));}
  }

  function onUpd(idx,patch){
    if(patch==='complete'){
      var s=slots[idx];
      var wiz=wizards.find(w=>w.id===s.wizardId);
      var task=tasks.find(t=>t.id===s.taskId);
      var delta=s.tagMatch?25:20;
      applyAff(s.wizardId,delta,'up');
      if(doneCount<13){
        setMahwa(n=>{
          var next=n+10;
          addMahwaLog('task',+10,next,`임무 완료: ${task?task.name:'?'} (${wiz?wiz.name:'?'})`);
          return next;
        });
      }
      if(doneCount===12)setShowMahwaLimit(true);
      setDoneCount(n=>n+1);
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,status:'done',dialogue:getLine(s.wizardId,'TASK_SUCCESS')}:sl));
      addLogEntry({taskId:s.taskId,taskName:task?task.name:'?',wizardId:s.wizardId,wizardName:wiz?wiz.name:'?',delta,dir:'up',source:'task'});
      // wizardStats 업데이트
      var tname=task?task.name:'?';
      setWizardStats(p=>{var ws={...p};if(!ws[s.wizardId])ws[s.wizardId]={firstMet:null,taskCount:0,taskBreakdown:{}};ws[s.wizardId]={...ws[s.wizardId],taskCount:(ws[s.wizardId].taskCount||0)+1,taskBreakdown:{...ws[s.wizardId].taskBreakdown,[tname]:(ws[s.wizardId].taskBreakdown[tname]||0)+1}};return ws;});
    }else if(patch==='forfeit'){
      var s2=slots[idx];
      var wiz2=wizards.find(w=>w.id===s2.wizardId);
      var task2=tasks.find(t=>t.id===s2.taskId);
      applyAff(s2.wizardId,20,'down');
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,status:'forfeited',dialogue:getLine(s2.wizardId,'TASK_FAILURE')}:sl));
      addLogEntry({taskId:s2.taskId,taskName:task2?task2.name:'?',wizardId:s2.wizardId,wizardName:wiz2?wiz2.name:'?',delta:20,dir:'down',source:'task'});
    }else if(patch==='forfeit_ticket'){
      var s3=slots[idx];
      var wiz3=wizards.find(w=>w.id===s3.wizardId);
      var task3=tasks.find(t=>t.id===s3.taskId);
      // 인연 하락 없음, 기록에도 남기지 않음
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,status:'forfeited',dialogue:getLine(s3.wizardId,'TASK_FAILURE')}:sl));
      setInventory(p=>{var u={...p,forfeitTickets:Math.max(0,(p.forfeitTickets||0)-1)};storeSet('app:inventory',JSON.stringify(u));return u;});
    }else if(patch==='activate'){
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,status:'active',editing:false,startedAt:Date.now()}:sl));
    }else{
      setSlots(p=>p.map((sl,i)=>i===idx?{...sl,...patch}:sl));
    }
  }

  // 임무 확정: fillEmpty=true면 빈 슬롯에 시스템 슬롯 채움
  function onConfirmMission(fillEmpty){
    var usedIds=slots.filter(s=>s.wizardId).map(s=>s.wizardId);
    var pool=wizards.filter(w=>w.owned&&!usedIds.includes(w.id));
    var newSlots=slots.map(s=>{
      if(!s.isSystem&&s.taskId&&s.wizardId)return{...s,status:'active',startedAt:Date.now()};
      if(fillEmpty&&(!s.taskId||!s.wizardId)){
        if(pool.length>0){
          var chosen=pool.splice(Math.floor(Math.random()*pool.length),1)[0];
          return mkSystemSlot(chosen);
        }else{
          return{...mkSlot(),isSystem:true,status:'system_active',systemText:null};
        }
      }
      return s;
    });
    setSlots(newSlots);setConfirmed(true);
  }
  function onReset(){setSlots([mkSlot(),mkSlot(),mkSlot()]);setConfirmed(false);}
  function onSlotReset(idx){setSlots(p=>p.map((sl,i)=>i===idx?{...mkSlot(),editing:true}:sl));}

  // T 버튼
  function onTestFinalize(){
    var day=gameDay();
    setLogs(prev=>{
      var dl=prev[day];
      if(!dl||dl.entries.length===0){
        var ownedW=wizards.filter(w=>w.owned);if(ownedW.length===0)return prev;
        var entries=[],totals={};
        for(var k=0;k<3;k++){var rw=ownedW[Math.floor(Math.random()*ownedW.length)];var rt=tasks[Math.floor(Math.random()*tasks.length)];entries.push({taskId:rt.id,taskName:rt.name,wizardId:rw.id,wizardName:rw.name,delta:20,dir:'up',source:'task',ts:Date.now()});if(!totals[rw.id])totals[rw.id]={name:rw.name,total:0};totals[rw.id].total+=20;}
        dl={entries,affinityTotals:totals,completedCount:3,finalized:false,journalWizardId:null,journalText:null,journalUnread:false};
      }
      var fin=finalizeLog(dl);var newLogs={...prev,[day]:fin};
      if(Object.values(newLogs).some(l=>l.journalUnread))setTimeout(()=>setShowJournalPopup(true),200);
      return newLogs;
    });
  }

      var url=URL.createObjectURL(blob);
      var a=document.createElement('a');a.href=url;a.download='mahwa_backup_'+new Date().toISOString().slice(0,10)+'.json';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    });
  }

            <div style={{background:'rgba(184,146,42,0.06)',borderRadius:8,padding:'12px 14px',marginBottom:16,border:'0.5px solid rgba(184,146,42,0.2)'}}>
              <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',marginBottom:4}}>{newClubQueue[0].club} 분과회</div>
              <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>{newClubQueue[0].wizNames.join(' · ')}</div>
            </div>
            <div style={{fontSize:13,color:'var(--color-text-primary)',textAlign:'center',marginBottom:20,lineHeight:1.8}}>당신의 이야기에 등장시킬까요?</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>handleNewClubDecision(newClubQueue[0].club,false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>아니오</button>
              <button onClick={()=>handleNewClubDecision(newClubQueue[0].club,true)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>예</button>
            </div>
          </div>
        </Overlay>
      )}
      {betaModal&&newClubQueue.length===0&&(
        <Overlay>
          {betaModal==='announcement'&&(
            <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'88%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
              <div style={{fontSize:12,fontWeight:600,color:'var(--color-primary)',textAlign:'center',marginBottom:16,letterSpacing:'0.3px'}}>신규 분과회 추가 보상</div>
              <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:2,marginBottom:8,textAlign:'center'}}>새로운 분과회가 대거 포착되었습니다.<br/>지금이라면 특별히 1명<br/>무료로 수집할 기회!</div>
              <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:20}}>대상 분과회: 웬수들 · 악당들 · 바보들</div>
              <button onClick={startBetaGacha} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>수집하기</button>
            </div>
          )}
          {betaModal==='missed'&&(
            <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:300,width:'88%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
              <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center',fontFamily:"Georgia,'Nanum Myeongjo',serif",fontStyle:'italic'}}>신규 마법사? 누구지? ……돌아보려는 순간 사라졌다. 아무 일도 일어나지 않았다.</div>
              <button onClick={()=>{localStorage.setItem('app:betaReward2026a','1');setBetaModal(null);}} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
            </div>
          )}
          {(betaModal==='dialogue'||betaModal==='resultNew'||betaModal==='resultDup')&&betaGWiz&&(
            <div style={{maxWidth:320,width:'88%'}}>
              <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:betaGWiz.bg,borderRadius:12,border:'0.5px solid '+betaGWiz.border}}>
                <Avatar wiz={betaGWiz} size={48}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:betaGWiz.accent,marginBottom:6}}>{betaGWiz.name}</div>
                  <div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{betaTyped}{betaTyped.length<betaFull.length&&<span style={{opacity:0.4}}>▌</span>}</div>
                </div>
              </div>
              {(betaModal==='resultNew'||betaModal==='resultDup')&&(
                <div style={{marginTop:12}}>
                  <div style={{textAlign:'center',padding:'11px',background:'rgba(255,255,255,0.7)',borderRadius:10,border:'0.5px solid rgba(0,0,0,0.07)',marginBottom:8}}>
                    <div style={{fontSize:13,color:'rgba(0,0,0,0.55)',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>{betaModal==='resultNew'?betaGWiz.name+' 수집 성공!':betaGWiz.name+'의 인연이 상승했습니다.'}</div>
                  </div>
                  <button onClick={()=>setBetaModal(null)} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
                </div>
              )}
            </div>
          )}
        </Overlay>
      )}
      {showMahwaLimit&&(
  <Overlay>
    <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
      <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>오늘의 마화 보상이 모두 지급되었습니다.</div>
      <button onClick={()=>setShowMahwaLimit(false)} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
    </div>
  </Overlay>
)}
        {showJournalPopup&&(
        <Overlay>
          <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
            <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>미확인 일지를 확인할까요?</div>
            <div style={{display:'flex',gap:8}}>
              <button onClick={()=>setShowJournalPopup(false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>나중에</button>
              <button onClick={()=>{setShowJournalPopup(false);setPage('record');}} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>네</button>
            </div>
          </div>
        </Overlay>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
