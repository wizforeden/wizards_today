                    <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginTop:2}}>{clubWizards.map(w=>w.name).join(' · ')}</div>
                  </div>
                  <div style={{width:18,height:18,borderRadius:'50%',border:'1.5px solid '+(checked?'var(--color-primary)':'rgba(0,0,0,0.2)'),background:checked?'var(--color-primary)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.15s'}}>
                    {checked&&<span style={{color:'white',fontSize:10,lineHeight:1}}>✓</span>}
                  </div>
                </div>
              );
            })}
          </div>
          <button onClick={handleClubConfirm} disabled={selectedClubs.length===0} style={{width:'100%',padding:'11px 0',borderRadius:10,border:'none',background:selectedClubs.length>0?'var(--color-primary)':'rgba(0,0,0,0.07)',color:selectedClubs.length>0?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:selectedClubs.length>0?'pointer':'not-allowed'}}>
            {selectedClubs.length>0?`${selectedClubs.length}개 분과회 선택 완료`:'1개 이상 선택해 주세요'}
          </button>
        </div>
      )}
      {phase==='acquiring'&&acqWiz&&(
        <div style={{maxWidth:380,width:'100%'}}>
          <div style={{textAlign:'center',marginBottom:16}}><div style={{fontSize:11,color:'rgba(0,0,0,0.3)',letterSpacing:'1px'}}>{acqIdx+1} / {queue.length}</div></div>
          <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:acqWiz.bg,borderRadius:12,border:'0.5px solid '+acqWiz.border}}>
            <Avatar wiz={acqWiz} size={48}/>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:600,color:acqWiz.accent,marginBottom:6}}>{acqWiz.name}</div>
              <div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{typed}{typed.length<full.length&&<span style={{opacity:0.4}}>▌</span>}</div>
            </div>
          </div>
          {showResult&&<div style={{marginTop:12,textAlign:'center',padding:'11px',background:'rgba(255,255,255,0.7)',borderRadius:10,border:'0.5px solid rgba(0,0,0,0.07)'}}><div style={{fontSize:13,color:'rgba(0,0,0,0.55)',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>{acqWiz.name} 수집 성공!</div></div>}
        </div>
      )}
      {phase==='mahwaPopup'&&(
        <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
          <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>초기 자금으로 마화 80닢이 지급되었습니다.</div>
          <button onClick={()=>onComplete(nameInput,selectedClubs)} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
        </div>
      )}
    </div>
  );
}

// ── 임무 페이지 ───────────────────────────────────────────────────────────────
function MissionPage({wizards,tasks,mahwa,doneCount,affinity,affinityChanges,level,lvTransitions,lvUpEvent,setLvUpEvent,onUpd,onConfirmMission,onReset,onSlotReset,slots,confirmed,favTasks,inventory,logs}){
  var[modal,setModal]=useState(null);
  var[diceMsg,setDiceMsg]=useState('');
  function formatElapsed(startedAt){
    if(!startedAt)return '알 수 없는 시간';
    var mins=Math.floor((Date.now()-startedAt)/60000);
    if(mins<1)return '1분 미만';
    if(mins<60)return mins+'분';
    var h=Math.floor(mins/60),m=mins%60;
    return m>0?h+'시간 '+m+'분':h+'시간';
  }

  function handleRandomAssign(){
    var idleSlots=slots.map((sl,i)=>({sl,i})).filter(({sl})=>!sl.isSystem&&sl.status==='idle'&&!sl.wizardId);
    if(idleSlots.length===0)return;
    var targets=idleSlots.filter(({sl})=>sl.taskId);
    if(targets.length===0){setDiceMsg('error:먼저 임무를 설정해 주세요.');setTimeout(()=>setDiceMsg(''),3000);return;}
    var lastDone={};
    Object.keys(logs||{}).sort().forEach(dateStr=>{
      (logs[dateStr].entries||[]).filter(e=>e.dir==='up'&&e.source==='task').forEach(e=>{
        if(e.wizardId)lastDone[e.wizardId]=dateStr;
      });
    });
    var usedIds=slots.map(s=>s.wizardId).filter(Boolean);
    var owned=wizards.filter(w=>w.owned&&!usedIds.includes(w.id));
    if(owned.length===0)return;
    owned.sort((a,b)=>{
      var da=lastDone[a.id]||'0000-00-00';
      var db=lastDone[b.id]||'0000-00-00';
      return da<db?-1:da>db?1:0;
    });
    var assignCount=Math.min(targets.length,owned.length);
    var remaining=[...owned];
    targets.slice(0,assignCount).forEach(({i})=>{
      if(remaining.length===0)return;
      var pool=remaining.slice(0,Math.min(5,remaining.length));
      var picked=pool[Math.floor(Math.random()*pool.length)];
      remaining=remaining.filter(w=>w.id!==picked.id);
      var t=tasks.find(t=>t.id===slots[i].taskId);
      var tm=!!(picked&&t&&picked.tags.includes(t.tag));
      onUpd(i,{wizardId:picked.id,tagMatch:tm,dialogue:getLine(picked.id,tm?'TASK_MATCH':'TASK_UNMATCH')});
    });
    setDiceMsg('ok:마법사를 자동으로 배치했습니다.');
    setTimeout(()=>setDiceMsg(''),3000);
  }

  var canConfirm=!confirmed&&slots.some(s=>!s.isSystem&&s.taskId&&s.wizardId);
  var hasEmpty=slots.some(s=>!s.isSystem&&(!s.taskId||!s.wizardId));
  var userSlots=slots.filter(s=>!s.isSystem&&s.taskId&&s.wizardId);
  var allDone=confirmed&&userSlots.length>0&&userSlots.every(s=>s.status==='done'||s.status==='forfeited');
  var usedWizIds=slots.map(s=>s.wizardId).filter(Boolean);

  var idleSlotsNoWiz=slots.filter(s=>!s.isSystem&&s.status==='idle'&&!s.wizardId);
  var hasTaskNoWiz=idleSlotsNoWiz.some(s=>s.taskId);
  var hasIdleNoTask=idleSlotsNoWiz.length>0&&!hasTaskNoWiz;
  var hasAssignableSlot=!confirmed&&(hasTaskNoWiz||hasIdleNoTask);

  function handleConfirmClick(){
    if(hasEmpty)setModal({type:'confirmWithEmpty'});
    else{onConfirmMission(false);setModal(null);}
  }
  function handleOk(){
    if(modal.type==='confirmWithEmpty'){onConfirmMission(true);setModal(null);}
    else if(modal.type==='forfeit'){onUpd(modal.idx,'forfeit');setModal(null);}
    else if(modal.type==='forfeit_ticket'){onUpd(modal.idx,'forfeit_ticket');setModal(null);}
    else if(modal.type==='activateSlot'){onUpd(modal.idx,'activate');setModal(null);}
    else if(modal.type==='confirmComplete'){onUpd(modal.idx,'complete');setModal(null);}
    else if(modal.type==='sysReset'){onSlotReset(modal.idx);setModal(null);}
  }
  var l1=<span>오늘 완료한 임무: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{doneCount}건</span></span>;
  var l2=<span>소지 마화: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{mahwa}닢</span></span>;
  return(
    <div style={{padding:'60px 16px 20px',maxWidth:420,margin:'0 auto'}}>
      <PageHeader title='오늘의 임무' line1={l1} line2={l2}/>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
        <button onClick={hasAssignableSlot?handleRandomAssign:undefined} title="마법사 무작위 배치"
          style={{width:34,height:34,borderRadius:'50%',border:'0.5px solid rgba(0,0,0,0.13)',background:'white',cursor:hasAssignableSlot?'pointer':'not-allowed',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,opacity:hasAssignableSlot?1:0.35,transition:'all 0.15s',flexShrink:0}}>🎲</button>
        {diceMsg&&<span style={{fontSize:11,color:diceMsg.startsWith('error:')?'#8A3030':'#3A6A28'}}>{diceMsg.replace(/^(error:|ok:)/,'')}</span>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {slots.map((sl,i)=><SlotCard key={i} slot={sl} idx={i} confirmed={confirmed} affinity={affinity} affinityChanges={affinityChanges} level={level} lvTransitions={lvTransitions} onUpd={onUpd} usedWizIds={usedWizIds} wizards={wizards} tasks={tasks} onAskForfeit={idx=>setModal({type:'forfeit',idx})} onSlotReset={onSlotReset} allDone={allDone} onAskActivate={idx=>setModal({type:'activateSlot',idx})}
onAskComplete={(idx,startedAt)=>setModal({type:'confirmComplete',idx,elapsed:formatElapsed(startedAt),startedAt})}
onAskSysReset={(idx,wizName)=>setModal({type:'sysReset',idx,wizName})} favTasks={favTasks}/>)}
        {!confirmed&&<button onClick={handleConfirmClick} disabled={!canConfirm} style={{marginTop:4,background:canConfirm?'var(--color-primary)':'rgba(0,0,0,0.07)',color:canConfirm?'white':'var(--color-text-tertiary)',border:'none',borderRadius:'var(--border-radius-lg)',padding:'11px 0',fontSize:13,fontWeight:500,cursor:canConfirm?'pointer':'not-allowed',transition:'background 0.2s'}}>임무 확정</button>}
        {allDone&&<div style={{textAlign:'center',padding:'18px 16px',marginTop:4,background:'#EAEAEA',borderRadius:'var(--border-radius-lg)',border:'0.5px solid #D0D0D0'}}><div style={{fontSize:14,fontWeight:500,color:'#3A4A40',marginBottom:10,fontFamily:"Georgia,'Nanum Myeongjo',serif",letterSpacing:'0.3px'}}>당신의 임무, 세계를 구했다!</div><button onClick={onReset} style={{background:'white',color:'var(--color-text-secondary)',border:'0.5px solid #C8C8C8',borderRadius:'var(--border-radius-md)',padding:'6px 20px',fontSize:12,cursor:'pointer'}}>Reset</button></div>}
      </div>
      {modal&&modal.type!=='forfeit'&&<ConfirmModal
        msg={modal.type==='confirmWithEmpty'?'빈 임무 슬롯이 있어요.\n이대로 임무를 확정할까요?':modal.type==='activateSlot'?'이대로 새 임무를 시작할까요?':modal.type==='sysReset'?modal.wizName+'의 자유 행동을 종료할까요?':
modal.type==='sysReset'?modal.wizName+'의 자유 행동을 종료할까요?':
modal.type==='confirmComplete'?(modal.startedAt&&(Date.now()-modal.startedAt)>=18000000?'꽤 시간이 필요한 임무였군요!\n완료 보고서를 제출하시겠어요?':'임무를 수령한 지 '+modal.elapsed+'이 경과하였네요.\n완료 보고서를 제출하시겠어요?'):'정말 포기하시겠어요?'}
        confirmLabel='예' cancelLabel={modal.type==='confirmComplete'?'아직':'아니오'}
        onConfirm={handleOk}
        onCancel={modal.type==='activateSlot'?()=>{onUpd(modal.idx,{wizardId:null,dialogue:null,tagMatch:false});setModal(null);}:()=>setModal(null)}
        confirmDisabled={false}
      />}
      {modal&&modal.type==='forfeit'&&<ForfeitModal
        forfeitTickets={(inventory&&inventory.forfeitTickets)||0}
        onForfeit={handleOk}
        onForfeitTicket={()=>{onUpd(modal.idx,'forfeit_ticket');setModal(null);}}
        onCancel={()=>setModal(null)}
      />}
      <div style={{textAlign:'center',marginTop:24,paddingBottom:8}}>
        <span style={{fontSize:10,color:'rgba(0,0,0,0.2)',lineHeight:1.8}}>브라우저 캐시·쿠키 삭제 전 데이터를 백업해 두세요 (우상단 A → 데이터 백업)</span>
      </div>
    </div>
  );
}


// ── 상점 페이지 ───────────────────────────────────────────────────────────────
function StorePage({wizards,setWizards,mahwa,setMahwa,affinity,level,applyAff,ownedCount,storeDate,setStoreDate,addLogEntry,clubFilter,addMahwaLog,inventory,setInventory,customTasks,setCustomTasks,setGachaCount,roomItems,setRoomItems,maxLvReached,setMaxLvReached,wizardStats,setWizardStats,logs}){
  var[storeTab,setStoreTab]=useState('consumable'); // 'consumable' | 'gift'

  // ── 소모품 탭 상태 ──────────────────────────────────────────────────────────
  var[phase,setPhase]=useState('idle');
  var[gWiz,setGWiz]=useState(null);
  var[gNew,setGNew]=useState(false);
  var[full,setFull]=useState('');
  var[typed,setTyped]=useState('');
  var[gType,setGType]=useState('normal');
  var[customName,setCustomName]=useState('');
  var[flash,setFlash]=useState('');
  var[showFirstBonus,setShowFirstBonus]=useState(false);
  var[forfeitConfirm,setForfeitConfirm]=useState(false);

  // ── 선물 탭 상태 ───────────────────────────────────────────────────────────
  var[giftFlow,setGiftFlow]=useState(null);
  var[giftCd,setGiftCd]=useState(getNextSlotMs());

  var today=gameDay();
  var gachaDone=storeDate.gacha===today;
  var thisWeek=weekKey();
  var forfeitWeekCount=storeDate.forfeitWeekKey===thisWeek?(storeDate.forfeitWeekCount||0):0;
  var forfeitDone=forfeitWeekCount>=3;

  // 오늘 선물 매진 목록
  var dailySoldIds=new Set(
    storeDate.dailyGiftSold&&storeDate.dailyGiftSold.date===today
      ?storeDate.dailyGiftSold.ids:[]
  );
  function markDailySold(id){
    setStoreDate(p=>{
      var prev=(p.dailyGiftSold&&p.dailyGiftSold.date===today)?(p.dailyGiftSold.ids||[]):[];
      return{...p,dailyGiftSold:{date:today,ids:[...prev,id]}};
    });
  }

  // maxLvReached 확인 (전용 아이템 노출 조건)
  var availableOnly=FB_ROOM_ITEMS.filter(item=>{
    if(item.type!=='only')return false;
    var wiz=wizards.find(w=>w.id===item.forWiz);
    return wiz&&wiz.owned&&maxLvReached[item.forWiz];
  });

  // 갱신 카운트다운
  useEffect(()=>{
    if(storeTab!=='gift')return;
    var t=setInterval(()=>setGiftCd(getNextSlotMs()),1000);
    return()=>clearInterval(t);
  },[storeTab]);

  // ── 소모품 탭 로직 ──────────────────────────────────────────────────────────
  useEffect(()=>{
    if(phase!=='dialogue')return;
    if(typed.length>=full.length){
      var t=setTimeout(()=>{
        if(gNew){
          setWizards(p=>{
            var up=p.map(w=>w.id===gWiz.id?{...w,owned:true}:w);
            storeSet('app:wizards',JSON.stringify(Object.fromEntries(up.map(w=>[w.id,w.owned]))));
            return up;
          });
          addMahwaLog('gacha_new',0,mahwa,'신규 수집: '+gWiz.name,{wizardId:gWiz.id,wizardName:gWiz.name});
          if(setGachaCount)setGachaCount(p=>{var u={...p,[gWiz.id]:(p[gWiz.id]||0)+1};storeSet('app:gachaCount',JSON.stringify(u));return u;});
          // wizardStats firstMet 기록
          setWizardStats(p=>{
            var ws={...p};
            if(!ws[gWiz.id])ws[gWiz.id]={firstMet:null,taskCount:0,taskBreakdown:{}};
            if(!ws[gWiz.id].firstMet)ws[gWiz.id]={...ws[gWiz.id],firstMet:gameDay()};
            return ws;
          });
          setPhase('resultNew');
        }else{
          applyAff(gWiz.id,20,'up');
          setMahwa(n=>{var nx=n+30;addMahwaLog('gacha_dup',+30,nx,'중복 수집: '+gWiz.name+' (마화 30 환급)',{wizardId:gWiz.id,wizardName:gWiz.name});return nx;});
          if(setGachaCount)setGachaCount(p=>{var u={...p,[gWiz.id]:(p[gWiz.id]||0)+1};storeSet('app:gachaCount',JSON.stringify(u));return u;});
          addLogEntry({taskId:'__gacha__',taskName:'수집(중복)',wizardId:gWiz.id,wizardName:gWiz.name,delta:20,dir:'up',source:'gacha'});
          setPhase('resultDup');
        }
      },700);
      return()=>clearTimeout(t);
    }
    var t=setTimeout(()=>setTyped(p=>full.slice(0,p.length+1)),45);
    return()=>clearTimeout(t);
  },[phase,typed,full,gNew,gWiz,gType]);

  useEffect(()=>{
    if(phase!=='loading')return;
    var t=setTimeout(()=>{
      var pool=clubFilter&&clubFilter.clubs&&clubFilter.clubs.length>0
        ?wizards.filter(w=>clubFilter.clubs.includes(w.club))
        :wizards;
      var wiz=pool.length>0?pool[Math.floor(Math.random()*pool.length)]:wizards[Math.floor(Math.random()*wizards.length)];
      var isNew=!wiz.owned;
      setGWiz(wiz);setGNew(isNew);
      setFull(getLine(wiz.id,isNew?'MEET':'MEET_AGAIN')||'…');
      setTyped('');setPhase('dialogue');
    },3000);
    return()=>clearTimeout(t);
  },[phase]);

  // 랜덤 선물 로딩
  useEffect(()=>{
    if(giftFlow?.step!=='randomLoading')return;
    var t=setTimeout(()=>{
      var ownedWizards=wizards.filter(w=>w.owned);
      var item=seededPickN(FB_ROOM_ITEMS.filter(i=>i.type==='normal'),1,Math.floor(Math.random()*99999))[0];
      var eligible=ownedWizards.filter(w=>!isRoomItemOwned(item.id,w.id,roomItems));
      var twoWiz=seededPickN(eligible,Math.min(2,eligible.length),Math.floor(Math.random()*99999));
      var noOne=twoWiz.length===0;
      if(noOne)setMahwa(m=>m+10);
      setGiftFlow(f=>({...f,item,eligibleWizards:twoWiz,noOne,step:'randomReveal'}));
    },1400);
    return()=>clearTimeout(t);
  },[giftFlow?.step]);

  function doFlash(msg){setFlash(msg);setTimeout(()=>setFlash(''),3000);}

  function startNormalGacha(){
    setMahwa(n=>{var nx=n-100;addMahwaLog('gacha_cost',-100,nx,'수집 시도');return nx;});
    setStoreDate(p=>{var u={...p,gacha:today};storeSet('app:storeDate',JSON.stringify(u));return u;});
    setGType('normal');setPhase('loading');
  }
  function buyForfeit(){
    var wk=weekKey();var cnt=storeDate.forfeitWeekKey===wk?(storeDate.forfeitWeekCount||0):0;
    if(cnt>=3)return;
    setMahwa(n=>{var nx=n-30;addMahwaLog('forfeit_cost',-30,nx,'포기 사유서 구매');return nx;});
    setStoreDate(p=>{var u={...p,forfeitWeekKey:wk,forfeitWeekCount:cnt+1};storeSet('app:storeDate',JSON.stringify(u));return u;});
    setInventory(p=>{var u={...p,forfeitTickets:(p.forfeitTickets||0)+1};storeSet('app:inventory',JSON.stringify(u));return u;});
    doFlash('포기 사유서 1매를 구입했습니다.');
  }
  function confirmCustomTask(){
    var name=customName.trim();if(!name)return;
    var tag=TASK_TAG_ORDER[Math.floor(Math.random()*TASK_TAG_ORDER.length)];
    var newTask={id:'CT'+Date.now(),name,tag,isCustom:true};
    setCustomTasks(p=>{var u=[...p,newTask];storeSet('app:customTasks',JSON.stringify(u));return u;});
    setMahwa(n=>{var nx=n-100;addMahwaLog('custom_task_cost',-100,nx,'창작 임무 추가: '+name);return nx;});
    setPhase('idle');setCustomName('');
    doFlash('"'+name+'" 임무가 추가되었습니다.');
  }
  function finishGacha(){
    if(gType==='normal'&&!localStorage.getItem('app:firstGachaDone')){
      localStorage.setItem('app:firstGachaDone','1');
      setShowFirstBonus(true);
    }
    setGWiz(null);setPhase('idle');
  }

  // ── 선물 처리 공통 ─────────────────────────────────────────────────────────
  function applyGift(wiz,item,mahwaCost){
    var delta=giftDelta(wiz,item);
    var msg=giftMsg(wiz,item,delta);
    // affinity 적용 (applyAff 사용 → LvUpBanner 포함)
    applyAff(wiz.id,delta,'up');
    // maxLvReached 업데이트
    var newLv=(level[wiz.id]||1);
    if(delta>=0&&newLv>=(wiz.maxLv||5)){
      setMaxLvReached(p=>({...p,[wiz.id]:true}));
    }
    // roomItems에 아이템 추가
    setRoomItems(p=>{
      var prev=Array.isArray(p[wiz.id])?p[wiz.id]:[];
      var updated={...p,[wiz.id]:[...prev,{itemId:item.id,acquiredAt:gameDay(),type:item.type}]};
      storeSet('app:roomItems',JSON.stringify(updated));
      return updated;
    });
    // 마화 차감 (이미 차감된 경우 0)
    if(mahwaCost>0){
      setMahwa(n=>{var nx=n-mahwaCost;addMahwaLog('gift_'+item.type,-mahwaCost,nx,'선물: '+item.name+' → '+wiz.name,{wizardId:wiz.id,itemId:item.id});return nx;});
    }
    // logs 기록
    addLogEntry({taskId:'__gift__',taskName:item.name,wizardId:wiz.id,wizardName:wiz.name,delta,dir:'up',source:'gift',itemType:item.type});
    // 결과 모달
    setGiftFlow({step:'giftResult',result:{wiz,item,delta,msg}});
  }

  // 일반 구매 핸들러
  function onDailyStart(item){setGiftFlow({type:'daily',item,step:'dailyWizPick'});}
  function onDailyWizProceed(wiz){
    var item=giftFlow.item;
    if(item&&item.type==='normal'&&countNormalItems(wiz.id,roomItems)>=NORMAL_MAX){
      setGiftFlow(f=>({...f,selectedWiz:wiz,returnStep:'dailyConfirm',step:'discardPick'}));
    }else{
      setGiftFlow(f=>({...f,selectedWiz:wiz,step:'dailyConfirm'}));
    }
  }
  function onDailyConfirm(){
    var{item,selectedWiz}=giftFlow;
    markDailySold(item.id);
    applyGift(selectedWiz,item,item.cost);
  }

  // 랜덤 구매 핸들러
  function onRandomStart(){setGiftFlow({type:'random',step:'randomConfirm'});}
  function onRandomConfirm(){setMahwa(m=>m-GIFT_RANDOM_PRICE);setGiftFlow(f=>({...f,step:'randomLoading'}));}
  function onRandomRevealProceed(){
    if(giftFlow.noOne){setGiftFlow(null);return;}
    setGiftFlow(f=>({...f,step:'randomWizPick'}));
  }
  function onRandomWizProceed(wiz){
    var item=giftFlow.item;
    if(countNormalItems(wiz.id,roomItems)>=NORMAL_MAX){
      setGiftFlow(f=>({...f,selectedWiz:wiz,returnStep:'random2ndConfirm',step:'discardPick'}));
    }else{
      setGiftFlow(f=>({...f,selectedWiz:wiz,step:'random2ndConfirm'}));
    }
  }
  function onRandom2ndBack(){setGiftFlow(f=>({...f,step:'randomWizPick'}));}
  function onRandom2ndConfirm(){applyGift(giftFlow.selectedWiz,giftFlow.item,0);}
  function onRandomDiscard(){setMahwa(m=>m+10);doFlash('선물을 버렸습니다. 마화 10닢 반환.');setGiftFlow(null);}

  // 전용 구매 핸들러
  function onOnlyStart(item,wiz){setGiftFlow({type:'only',item,targetWiz:wiz,step:'onlyConfirm'});}
  function onOnlyConfirm(){applyGift(giftFlow.targetWiz,giftFlow.item,ONLY_PRICE);}

  // 버리기 핸들러
  function onDiscardSelect(discardItem){setGiftFlow(f=>({...f,discardItem,step:'discardConfirm'}));}
  function onDiscardBack(){setGiftFlow(f=>({...f,step:'discardPick'}));}
  function onDiscardConfirm(){
    var{selectedWiz,discardItem}=giftFlow;
    setRoomItems(p=>{
      var prev=Array.isArray(p[selectedWiz.id])?p[selectedWiz.id]:[];
      var updated={...p,[selectedWiz.id]:prev.filter(r=>r.itemId!==discardItem.id)};
      storeSet('app:roomItems',JSON.stringify(updated));
      return updated;
    });
    setGiftFlow(f=>({...f,step:f.returnStep}));
  }
  function onGiftResultClose(){
    setGiftFlow(null);
  }

  var items=[
    {id:'gacha',sym:'✦',name:'마법사 수집',desc:'어쩌면 당신의 진정한 임무',price:100,done:gachaDone,active:!gachaDone&&mahwa>=100,onBuy:startNormalGacha,btnLabel:'수집'},
    {id:'forfeit',sym:'⬡',name:'포기 사유서',desc:'잔소리는 듣겠지만 평판은 지킬 것이다',price:30,done:forfeitDone,active:!forfeitDone&&mahwa>=30,onBuy:()=>setForfeitConfirm(true),info:'이번 주 ('+forfeitWeekCount+'/3)매 구매'},
    {id:'custom',sym:'❖',name:'창작 임무 추가',desc:customTasks.length>=5?'임무 창작 한도에 도달했습니다 (5/5)':'원하는 임무를 작성하여 목록에 추가한다',price:100,done:false,active:mahwa>=100&&customTasks.length<5,onBuy:()=>{setCustomName('');setPhase('custom_input');},info:'('+customTasks.length+'/5)개 창작 완료'},
  ];

  var showDlg=phase==='dialogue'||phase==='resultNew'||phase==='resultDup';
  var dailySlotItems=getDailyGiftItems();
  var slotLabel=getCurrentSlot()===0?'AM 5:00 – PM 5:00':'PM 5:00 – AM 5:00';
  var ownedWizards=wizards.filter(w=>w.owned);

  return(<>
    <div style={{padding:'60px 16px 20px',maxWidth:420,margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:16}}>
        <div style={{fontSize:17,fontWeight:500,color:'var(--color-text-primary)',letterSpacing:'-0.3px'}}>상점</div>
        <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginTop:6}}>
          수집한 마법사: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{ownedCount}명</span>
          <span style={{marginLeft:14}}>소지 마화: <span style={{fontWeight:500,color:'var(--color-primary)'}}>{mahwa}닢</span></span>
        </div>
      </div>

      {/* 탭 */}
      <div style={{display:'flex',marginBottom:16,border:'0.5px solid rgba(0,0,0,0.1)',borderRadius:10,overflow:'hidden'}}>
        {[{id:'consumable',label:'소모품'},{id:'gift',label:'선물'}].map(tab=>(
          <div key={tab.id} onClick={()=>setStoreTab(tab.id)}
            style={{flex:1,textAlign:'center',padding:'9px 0',fontSize:13,cursor:'pointer',
              fontWeight:storeTab===tab.id?600:400,
              background:storeTab===tab.id?'rgba(0,0,0,0.06)':'white',
              color:storeTab===tab.id?'var(--color-text-primary)':'rgba(0,0,0,0.35)',
              borderRight:tab.id==='consumable'?'0.5px solid rgba(0,0,0,0.1)':'none'}}>
            {tab.label}
          </div>
        ))}
      </div>

      {flash&&<div style={{fontSize:12,color:'#3A6A28',textAlign:'center',marginBottom:12,padding:'8px',background:'rgba(58,106,40,0.06)',borderRadius:8}}>{flash}</div>}

      {/* ── 소모품 탭 ── */}
      {storeTab==='consumable'&&(<>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {items.map(it=>(
            <div key={it.id} style={{background:'white',borderRadius:'var(--border-radius-lg)',border:'0.5px solid rgba(0,0,0,0.08)',padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
              <div style={{fontSize:20,color:'var(--color-primary)',opacity:0.7,flexShrink:0,width:28,textAlign:'center'}}>{it.sym}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:500,color:it.done?'var(--color-text-tertiary)':'var(--color-text-primary)',marginBottom:2}}>{it.name}</div>
                <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{it.desc}</div>
                <div style={{display:'flex',gap:8,alignItems:'center'}}>
                  <span style={{fontSize:11,color:'var(--color-text-tertiary)'}}>마화 {it.price}닢</span>
                  {it.info&&<span style={{fontSize:10,color:'var(--color-text-tertiary)'}}>{it.info}</span>}
                </div>
              </div>
              <button onClick={it.active?it.onBuy:undefined} disabled={!it.active}
                style={{flexShrink:0,padding:'7px 14px',borderRadius:'var(--border-radius-md)',border:'0.5px solid rgba(0,0,0,0.12)',background:it.done?'rgba(0,0,0,0.04)':'white',fontSize:12,color:it.done?'rgba(0,0,0,0.28)':it.active?'var(--color-text-primary)':'rgba(0,0,0,0.28)',cursor:it.active?'pointer':'not-allowed',fontWeight:500}}>
                {it.done?'매진':it.active?it.btnLabel:'구매'}
              </button>
            </div>
          ))}
        </div>

        {/* 수집 결과 */}
        {showDlg&&gWiz&&(
          <Overlay>
            <div style={{maxWidth:320,width:'90%'}}>
              <div style={{display:'flex',gap:12,alignItems:'flex-start',padding:'14px',background:gWiz.bg,borderRadius:12,border:'0.5px solid '+gWiz.border}}>
                <Avatar wiz={gWiz} size={48}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:600,color:gWiz.accent,marginBottom:6}}>{gWiz.name}</div>
                  <div style={{fontSize:13,color:'rgba(0,0,0,0.65)',lineHeight:1.75,minHeight:40}}>{typed}{typed.length<full.length&&<span style={{opacity:0.4}}>▌</span>}</div>
                </div>
              </div>
              {(phase==='resultNew'||phase==='resultDup')&&(
                <div style={{marginTop:12}}>
                  <div style={{textAlign:'center',padding:'11px',background:'rgba(255,255,255,0.7)',borderRadius:10,border:'0.5px solid rgba(0,0,0,0.07)',marginBottom:8}}>
                    <div style={{fontSize:13,color:'rgba(0,0,0,0.55)',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>{phase==='resultNew'?gWiz.name+' 수집 성공!':gWiz.name+'의 인연이 상승했습니다.'}</div>
                  </div>
                  <button onClick={finishGacha} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
                </div>
              )}
            </div>
          </Overlay>
        )}
        {phase==='loading'&&<SparkleLoader msg='마법사와 접촉 중…'/>}
        {phase==='custom_input'&&(
          <Overlay>
            <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
              <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',textAlign:'center',marginBottom:14}}>임무 이름을 입력하세요</div>
              <input autoFocus value={customName} onChange={e=>setCustomName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&customName.trim())confirmCustomTask();}} placeholder="임무 이름" style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'0.5px solid #D0D0D0',fontSize:13,outline:'none',marginBottom:14,boxSizing:'border-box',fontFamily:'inherit'}}/>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setPhase('idle')} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>취소</button>
                <button onClick={confirmCustomTask} disabled={!customName.trim()} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:customName.trim()?'var(--color-primary)':'rgba(0,0,0,0.07)',color:customName.trim()?'white':'rgba(0,0,0,0.3)',fontSize:13,fontWeight:500,cursor:customName.trim()?'pointer':'not-allowed'}}>추가</button>
              </div>
            </div>
          </Overlay>
        )}
        {forfeitConfirm&&(
          <Overlay>
            <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
              <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',textAlign:'center',marginBottom:8}}>포기 사유서를 구매할까요?</div>
              <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',marginBottom:20,lineHeight:1.7}}>구매한 사유서는 이번 주 일요일까지만 사용 가능합니다.</div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setForfeitConfirm(false)} style={{flex:1,padding:'9px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'var(--color-text-secondary)'}}>취소</button>
                <button onClick={()=>{buyForfeit();setForfeitConfirm(false);}} style={{flex:1,padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>구매</button>
              </div>
            </div>
          </Overlay>
        )}
        {showFirstBonus&&(
          <Overlay>
            <div style={{background:'white',borderRadius:12,padding:'24px 20px',maxWidth:280,width:'86%',border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.08)'}}>
              <div style={{fontSize:13,color:'var(--color-text-primary)',lineHeight:1.9,marginBottom:20,textAlign:'center'}}>첫 수집을 기념하여<br/>오늘의 수집 기회가 다시 제공됩니다.</div>
              <button onClick={()=>{setShowFirstBonus(false);setStoreDate(p=>{var u={...p,gacha:''};storeSet('app:storeDate',JSON.stringify(u));return u;});}} style={{width:'100%',padding:'9px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer'}}>확인</button>
            </div>
          </Overlay>
        )}
      </>)}

      {/* ── 선물 탭 ── */}
      {storeTab==='gift'&&(<>
        {/* 오늘의 아이템 */}
        <div style={{marginBottom:20}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:10}}>
            <span style={{fontSize:14,fontWeight:700,color:'var(--color-text-primary)',letterSpacing:'-0.2px'}}>오늘의 아이템</span>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:9,color:'var(--color-text-tertiary)',marginBottom:1}}>{slotLabel}</div>
              <div style={{fontSize:9,color:'var(--color-text-tertiary)',fontVariantNumeric:'tabular-nums'}}>갱신까지 {fmtCd(giftCd)}</div>
            </div>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {dailySlotItems.map(item=>{
              var sold=dailySoldIds.has(item.id);
              return(
                <div key={item.id} style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'12px 14px',display:'flex',alignItems:'center',gap:12,opacity:sold?0.5:1}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',marginBottom:2}}>{item.name}</div>
                    <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.description}</div>
                    <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>마화 {item.cost}닢</div>
                  </div>
                  <button onClick={()=>!sold&&onDailyStart(item)} disabled={sold}
                    style={{flexShrink:0,padding:'7px 14px',borderRadius:8,border:'0.5px solid rgba(0,0,0,0.12)',background:sold?'rgba(0,0,0,0.04)':'white',fontSize:12,color:sold?'rgba(0,0,0,0.28)':'var(--color-text-primary)',cursor:sold?'default':'pointer',fontWeight:500}}>
                    {sold?'매진':'구매'}
                  </button>
                </div>
              );
            })}
          </div>
        </div>

        {/* 랜덤 선물 */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:'0.8px',color:'var(--color-text-tertiary)',marginBottom:10}}>랜덤 선물</div>
          <div style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'12px 14px',display:'flex',alignItems:'center',gap:12}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',marginBottom:2}}>랜덤 선물</div>
              <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:3}}>선물받을 마법사는 운에 달려 있다</div>
              <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>마화 {GIFT_RANDOM_PRICE}닢</div>
            </div>
            <button onClick={onRandomStart} style={{flexShrink:0,padding:'7px 14px',borderRadius:8,border:'0.5px solid rgba(0,0,0,0.12)',background:'white',fontSize:12,color:'var(--color-text-primary)',cursor:'pointer',fontWeight:500}}>구매</button>
          </div>
        </div>

        {/* 전용 아이템 */}
        <div style={{marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:700,color:'var(--color-text-primary)',letterSpacing:'-0.2px',marginBottom:10}}>전용 아이템</div>
          {availableOnly.length===0?(
            <div style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'18px 16px',textAlign:'center'}}>
              <div style={{fontSize:13,color:'var(--color-text-tertiary)',marginBottom:8,fontStyle:'italic',fontFamily:"Georgia,'Nanum Myeongjo',serif"}}>아직은 그렇게 가까운 마법사가 없다….</div>
              <div style={{fontSize:10,color:'var(--color-text-tertiary)',lineHeight:1.7}}>마법사와 운명 5점을 달성하면 특별한 선물을 줄 수 있습니다.</div>
            </div>
          ):(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[
                ...availableOnly.filter(i=>!isRoomItemOwned(i.id,i.forWiz,roomItems)),
                ...availableOnly.filter(i=>isRoomItemOwned(i.id,i.forWiz,roomItems)),
              ].map(item=>{
                var wiz=wizards.find(w=>w.id===item.forWiz);
                var sold=isRoomItemOwned(item.id,item.forWiz,roomItems);
                return(
                  <div key={item.id} style={{background:'white',borderRadius:12,border:'0.5px solid '+(sold?'rgba(0,0,0,0.08)':wiz.border),padding:'12px 14px',display:'flex',alignItems:'center',gap:12,opacity:sold?0.5:1}}>
                    <Avatar wiz={wiz} size={38}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2}}>
                        <span style={{fontSize:13,fontWeight:500,color:'var(--color-text-primary)'}}>{item.name}</span>
                        <span style={{fontSize:9,padding:'1px 6px',borderRadius:10,background:wiz.bg,color:wiz.accent,border:'0.5px solid '+wiz.border,fontWeight:500}}>전용</span>
                      </div>
                      <div style={{fontSize:10,color:'var(--color-text-tertiary)',marginBottom:3}}>{wiz.name}의 물건</div>
                      <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:3,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.description}</div>
                      <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>마화 {ONLY_PRICE}닢</div>
                    </div>
                    <button onClick={()=>!sold&&onOnlyStart(item,wiz)} disabled={sold}
                      style={{flexShrink:0,padding:'7px 14px',borderRadius:8,border:'0.5px solid rgba(0,0,0,0.12)',background:sold?'rgba(0,0,0,0.04)':'white',fontSize:12,color:sold?'rgba(0,0,0,0.28)':'var(--color-text-primary)',cursor:sold?'default':'pointer',fontWeight:500}}>
                      {sold?'매진':'구매'}
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </>)}
    </div>

    {/* ── 선물 모달들 ── */}
    {giftFlow?.step==='dailyWizPick'&&(
      <GiftWizPickModal item={giftFlow.item} wizards={ownedWizards} roomItems={roomItems} affinity={affinity} level={level} onProceed={onDailyWizProceed} onClose={()=>setGiftFlow(null)}/>
    )}
    {giftFlow?.step==='dailyConfirm'&&(
      <GiftDailyConfirmModal item={giftFlow.item} wiz={giftFlow.selectedWiz} onConfirm={onDailyConfirm} onClose={()=>setGiftFlow(null)}/>
    )}
    {(giftFlow?.step==='randomConfirm'||giftFlow?.step==='randomLoading')&&(
      <GiftRandomConfirmModal onConfirm={onRandomConfirm} onClose={()=>setGiftFlow(null)} loading={giftFlow.step==='randomLoading'}/>
    )}
    {giftFlow?.step==='randomReveal'&&(
      <GiftRandomRevealModal item={giftFlow.item} noOne={giftFlow.noOne} onProceed={onRandomRevealProceed}/>
    )}
    {giftFlow?.step==='randomWizPick'&&(
      <GiftRandomWizPickModal item={giftFlow.item} wizards={giftFlow.eligibleWizards} affinity={affinity} level={level} onProceed={onRandomWizProceed} onDiscard={onRandomDiscard}/>
    )}
    {giftFlow?.step==='random2ndConfirm'&&(
      <GiftRandom2ndConfirmModal item={giftFlow.item} wiz={giftFlow.selectedWiz} onConfirm={onRandom2ndConfirm} onBack={onRandom2ndBack}/>
    )}
    {giftFlow?.step==='onlyConfirm'&&(
      <GiftOnlyConfirmModal item={giftFlow.item} wiz={giftFlow.targetWiz} onConfirm={onOnlyConfirm} onClose={()=>setGiftFlow(null)}/>
    )}
    {giftFlow?.step==='discardPick'&&(
      <GiftDiscardPickModal wiz={giftFlow.selectedWiz} roomItems={roomItems} wizards={wizards}
        onSelect={onDiscardSelect}
        onCancel={giftFlow.type==='random'?()=>setGiftFlow(f=>({...f,step:'randomWizPick'})):()=>setGiftFlow(f=>({...f,step:'dailyWizPick'}))}
        onDiscardAndRefund={giftFlow.type==='random'?()=>{setMahwa(m=>m+10);doFlash('선물을 버렸습니다. 마화 10닢 반환.');setGiftFlow(null);}:undefined}
      />
    )}
    {giftFlow?.step==='discardConfirm'&&(
      <GiftDiscardConfirmModal item={giftFlow.discardItem} wiz={giftFlow.selectedWiz} onConfirm={onDiscardConfirm} onBack={onDiscardBack}/>
    )}
    {giftFlow?.step==='giftResult'&&(
      <GiftResultModal result={giftFlow.result} affinity={affinity} level={level} onClose={onGiftResultClose}/>
    )}
  </>);
}

// ── 선물 관련 모달 컴포넌트 ───────────────────────────────────────────────────
var GIFT_MODAL_BOX={background:'white',borderRadius:14,padding:'22px 20px',width:'100%',maxWidth:340,border:'0.5px solid #D0D0D0',boxShadow:'0 4px 20px rgba(0,0,0,0.10)',boxSizing:'border-box'};
var GIFT_BTN_CANCEL={flex:1,padding:'10px 0',borderRadius:8,border:'0.5px solid #D0D0D0',background:'white',fontSize:13,cursor:'pointer',color:'rgba(0,0,0,0.5)',fontFamily:'inherit'};
var GIFT_BTN_CONFIRM={flex:2,padding:'10px 0',borderRadius:8,border:'none',background:'var(--color-primary)',color:'white',fontSize:13,fontWeight:500,cursor:'pointer',fontFamily:'inherit'};

function GiftOverlay({onClose,children}){
  return(
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.38)',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 16px'}}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',display:'flex',justifyContent:'center'}}>{children}</div>
    </div>
  );
}

function GiftWizPickModal({item,wizards,roomItems,affinity,level,onProceed,onClose}){
  var[sel,setSel]=useState(null);
  return(
    <GiftOverlay onClose={onClose}>
      <div style={{...GIFT_MODAL_BOX,display:'flex',flexDirection:'column',maxHeight:'82vh',overflow:'hidden'}}>
        <div style={{padding:'0 0 12px',borderBottom:'0.5px solid rgba(0,0,0,0.07)'}}>
          <div style={{fontSize:14,fontWeight:600,color:'var(--color-text-primary)',marginBottom:4}}>{item.name}</div>
          <div style={{fontSize:11,color:'var(--color-text-tertiary)',lineHeight:1.6,marginBottom:4}}>{item.description}</div>
          <div style={{fontSize:11,color:'var(--color-text-tertiary)'}}>마화 {item.cost}닢</div>
        </div>
        <div style={{padding:'10px 0 6px',fontSize:12,fontWeight:500,color:'var(--color-text-secondary)'}}>누구에게 선물할까요?</div>
        <div style={{overflowY:'auto',flex:1,display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,alignContent:'start'}}>
          {wizards.map(wiz=>{
            var already=isRoomItemOwned(item.id,wiz.id,roomItems);
            var lv=level[wiz.id]||1,aff=affinity[wiz.id]||0;
            var active=sel?.id===wiz.id;
            var threshold=lv<5?LV_REQ[lv]:LV_REQ[4];

// ── 기록 페이지 ───────────────────────────────────────────────────────────────
function RecordPage({logs,wizards,onMarkRead,onTestFinalize}){
  // 날짜 객체 → ISO 키 (로컬 날짜 기준)
  function toKey(date){
    if(!date)return null;
    var y=date.getFullYear();
    var m=String(date.getMonth()+1).padStart(2,'0');
    var d=String(date.getDate()).padStart(2,'0');
    return y+'-'+m+'-'+d;
  }
  // 구형(toDateString) 또는 신형(ISO) 키 모두 조회
  function getLogByDate(date){
    var isoKey=toKey(date);
    var legacyKey=date.toDateString();
    return logs[isoKey]||logs[legacyKey]||null;
  }

  var now=new Date();
  var[calYear,setCalYear]=useState(now.getFullYear());
  var[calMonth,setCalMonth]=useState(now.getMonth());
  var[selDate,setSelDate]=useState(null);
  var detailRef=useRef(null);
  var WEEKDAYS=['일','월','화','수','목','금','토'];
  function prevMonth(){if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);setSelDate(null);}
  function nextMonth(){if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);setSelDate(null);}
  var daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  var firstDay=new Date(calYear,calMonth,1).getDay();
  var todayStr=gameDay();
  function getLog(d){
    var date=new Date(calYear,calMonth,d);
    return getLogByDate(date);
  }
  function handleDayClick(d){
    var date=new Date(calYear,calMonth,d);
    setSelDate(date);
    var isoKey=toKey(date);
    var legacyKey=date.toDateString();
    var ds=logs[isoKey]?isoKey:legacyKey;
    if(logs[ds]&&logs[ds].journalUnread)onMarkRead(ds);
    setTimeout(()=>{if(detailRef.current)detailRef.current.scrollIntoView({behavior:'smooth',block:'start'});},80);
  }
  var selLog=selDate?getLogByDate(selDate):null;
  return(
    <div style={{padding:'60px 16px 20px',maxWidth:420,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,paddingTop:8}}>
        <button onClick={prevMonth} style={{width:32,height:32,border:'none',background:'none',cursor:'pointer',fontSize:20,color:'rgba(0,0,0,0.35)',display:'flex',alignItems:'center',justifyContent:'center'}}>‹</button>
        <div style={{fontSize:14,fontWeight:500,color:'var(--color-text-primary)'}}>{calYear}년 {calMonth+1}월</div>
        <button onClick={nextMonth} style={{width:32,height:32,border:'none',background:'none',cursor:'pointer',fontSize:20,color:'rgba(0,0,0,0.35)',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:4}}>
        {WEEKDAYS.map(d=><div key={d} style={{textAlign:'center',fontSize:10,color:'rgba(0,0,0,0.3)',padding:'2px 0'}}>{d}</div>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:'2px 1px'}}>
        {Array.from({length:firstDay}).map((_,i)=><div key={'e'+i}/>)}
        {Array.from({length:daysInMonth}).map((_,i)=>{
          var d=i+1,log=getLog(d),cnt=log?log.completedCount||0:0;
          var dateObj=new Date(calYear,calMonth,d);
          var dateStr=toKey(dateObj);
          var isToday=dateStr===todayStr,isSel=selDate&&(dateStr===toKey(selDate)),hasUnread=log&&log.journalUnread;
          var spark=cnt>=3?{sz:13,c:'#C8A030'}:cnt>=1?{sz:9,c:'rgba(0,0,0,0.22)'}:null;
          return(
            <div key={d} onClick={()=>handleDayClick(d)} style={{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',padding:'5px 1px 4px',borderRadius:8,cursor:'pointer',background:isSel?'rgba(74,96,128,0.12)':isToday?'rgba(74,96,128,0.05)':'transparent',border:isToday&&!isSel?'0.5px solid rgba(74,96,128,0.18)':'0.5px solid transparent',minHeight:44,userSelect:'none'}}>
              {hasUnread&&<div style={{position:'absolute',top:4,right:5,width:5,height:5,borderRadius:'50%',background:'#C4634A',boxShadow:'0 0 0 1.5px rgba(255,255,255,0.9)'}}/>}
              <div style={{fontSize:12,color:isSel?'var(--color-primary)':'var(--color-text-primary)',fontWeight:isSel||isToday?600:400,lineHeight:1.4,marginBottom:2}}>{d}</div>
              <div style={{height:15,display:'flex',alignItems:'center',justifyContent:'center'}}>{spark&&<span style={{fontSize:spark.sz,color:spark.c,lineHeight:1}}>✦</span>}</div>
            </div>
          );
        })}
      </div>
      <div style={{borderTop:'0.5px solid rgba(0,0,0,0.08)',margin:'16px 0'}}/>
      <div ref={detailRef}>
        {!selDate&&<div style={{textAlign:'center',padding:'32px 0',color:'var(--color-text-tertiary)',fontSize:12,letterSpacing:'0.3px'}}>날짜를 선택하세요<div style={{fontSize:10,marginTop:6,opacity:0.7}}>* 오전 5시에 날짜가 변경됩니다</div></div>}
        {selDate&&(!selLog||selLog.completedCount===0)&&<div style={{textAlign:'center',padding:'32px 0',color:'var(--color-text-tertiary)',fontSize:12}}>{selDate.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}의 기록이 없습니다</div>}
        {selDate&&selLog&&selLog.completedCount>0&&(
          <div>
            <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginBottom:12}}>{selDate.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'})}</div>
            <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:12}}>
              {(selLog.entries||[]).map((entry,i)=>{
                var isUp=entry.dir==='up';
                var isGift=entry.source==='gift';
                var label=isGift
                  ?<span>선물<span style={{fontSize:10,color:'rgba(0,0,0,0.38)',marginLeft:3}}>({entry.taskName})</span> | {entry.wizardName}</span>
                  :<span>{entry.taskName} | {entry.wizardName}</span>;
                return<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
                  <span style={{fontSize:12,color:isUp?'var(--color-text-primary)':'rgba(0,0,0,0.32)',flex:1,lineHeight:1.5}}>{label}</span>
                  <span style={{fontSize:11,fontWeight:500,color:isUp?'#3A6A28':'rgba(0,0,0,0.28)',flexShrink:0}}>{isUp?'♥+':'♥ −'}{entry.delta}</span>
                </div>;
              })}
            </div>
            {Object.keys(selLog.affinityTotals||{}).length>0&&(
              <div style={{borderTop:'0.5px solid rgba(0,0,0,0.07)',paddingTop:9,marginBottom:selLog.journalText?16:0,display:'flex',flexDirection:'column',gap:4}}>
                {Object.entries(selLog.affinityTotals).map(([wId,data])=>{
                  var isPos=data.total>=0;
                  return<div key={wId} style={{fontSize:11,color:'var(--color-text-secondary)'}}>{data.name}의 인연이 총&nbsp;<span style={{color:isPos?'#3A6A28':'#8A5050',fontWeight:500}}>{isPos?'+':''}{data.total}</span>&nbsp;{isPos?'상승했습니다.':'하락했습니다.'}</div>;
                })}
              </div>
            )}
            {selLog.finalized&&selLog.journalText&&<div style={{paddingTop:14,marginTop:4}}><div style={{fontSize:12,color:'rgba(0,0,0,0.58)',lineHeight:2,fontStyle:'italic',fontFamily:"Georgia,'Nanum Myeongjo',serif",letterSpacing:'0.1px'}}>{selLog.journalText}</div></div>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── 책장 페이지 ───────────────────────────────────────────────────────────────
function BookshelfPage({wizards,affinity,level,roomItems,maxLvReached,wizardStats,logs,clubFilter,setPage}){
  var[selWizId,setSelWizId]=useState(null);
  var[filterClub,setFilterClub]=useState('전체');

  // 책장 탭 재클릭 시 상세→목록 복귀를 위해 setPage를 감싸서 BottomNav에 전달
  // → BottomNav에서 'bookshelf' 클릭 시 selWizId를 초기화하도록 외부에서 처리

  // clubFilter에 포함된 분과회 마법사 전체 (owned 여부 무관)
  var allowedClubs=clubFilter&&clubFilter.clubs&&clubFilter.clubs.length>0?clubFilter.clubs:null;
  var filteredWizards=allowedClubs
    ?wizards.filter(w=>allowedClubs.includes(w.club))
    :wizards;

  // 분과회 목록 (필터된 마법사 기준)
  var clubs=['전체',...[...new Set(filteredWizards.map(w=>w.club))].sort((a,b)=>a.localeCompare(b,'ko'))];
  var displayed=filterClub==='전체'?filteredWizards:filteredWizards.filter(w=>w.club===filterClub);
  // 분과회별 그룹화
  var grouped={};
  displayed.forEach(w=>{
    if(!grouped[w.club])grouped[w.club]=[];
    grouped[w.club].push(w);
  });

  if(selWizId){
    var wiz=wizards.find(w=>w.id===selWizId);
    if(wiz)return<WizardDetailPage wiz={wiz} affinity={affinity} level={level} roomItems={roomItems} maxLvReached={maxLvReached} wizardStats={wizardStats} onBack={()=>setSelWizId(null)}/>;
  }

  var ownedCount=filteredWizards.filter(w=>w.owned).length;

  return(
    <div style={{padding:'60px 16px 80px',maxWidth:420,margin:'0 auto'}}>
      <div style={{textAlign:'center',marginBottom:14}}>
        <div style={{fontSize:17,fontWeight:500,color:'var(--color-text-primary)',letterSpacing:'-0.3px'}}>책장</div>
        <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginTop:4}}>{ownedCount}명 수집 중</div>
      </div>

      {/* 분과회 필터 버튼 */}
      <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:16,paddingBottom:2,scrollbarWidth:'none'}}>
        {clubs.map(club=>(
          <button key={club} onClick={()=>setFilterClub(club)}
            style={{flexShrink:0,padding:'5px 13px',borderRadius:20,
              border:'0.5px solid '+(filterClub===club?'var(--color-primary)':'rgba(0,0,0,0.13)'),
              background:filterClub===club?'var(--color-primary)':'white',
              color:filterClub===club?'white':'var(--color-text-secondary)',
              fontSize:12,cursor:'pointer',fontFamily:'inherit',
              fontWeight:filterClub===club?500:400,transition:'all 0.12s'}}>
            {club}
          </button>
        ))}
      </div>

      {/* 분과회별 그룹 */}
      {Object.entries(grouped).map(([club,wizList])=>(
        <div key={club} style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--color-text-tertiary)',letterSpacing:'0.5px',marginBottom:10}}>{club}</div>
          {/* 4열 아바타 그리드 */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
            {wizList.map(wiz=>{
              var owned=wiz.owned;
              return(
                <button key={wiz.id} onClick={()=>owned&&setSelWizId(wiz.id)}
                  style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5,
                    background:'none',border:'none',cursor:owned?'pointer':'default',
                    fontFamily:'inherit',padding:'4px 0'}}>
                  {/* 원형 아바타 or 회색 슬롯 */}
                  <div style={{width:56,height:56,borderRadius:'50%',overflow:'hidden',
                    border:'1.5px solid '+(owned?wiz.border:'rgba(0,0,0,0.1)'),
                    background:owned?wiz.bg:'rgba(0,0,0,0.05)',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    filter:owned?'none':'grayscale(1)',opacity:owned?1:0.45}}>
                    {owned&&wiz.img
                      ?<img src={wiz.img} alt={wiz.name} style={{width:'100%',height:'100%',objectFit:'cover'}} onError={e=>{e.target.style.display='none';}}/>
                      :<span style={{fontSize:20,fontWeight:600,color:owned?wiz.accent:'rgba(0,0,0,0.2)'}}>
                        {owned?wiz.name[0]:'?'}
                      </span>
                    }
                  </div>
                  {/* 이름 */}
                  <div style={{fontSize:10,color:owned?'var(--color-text-primary)':'var(--color-text-tertiary)',
                    fontWeight:owned?500:400,textAlign:'center',lineHeight:1.3,
                    width:'100%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {owned?wiz.name:'???'}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ── 마법사 상세 페이지 ─────────────────────────────────────────────────────────
function WizardDetailPage({wiz,affinity,level,roomItems,maxLvReached,wizardStats,onBack}){
  var aff=affinity[wiz.id]||0;
  var lv=level[wiz.id]||1;
  var threshold=lv<5?LV_REQ[lv]:LV_REQ[4];
  var prog=lv>=5?1:Math.min(1,Math.max(0,aff/threshold));
  var stats=wizardStats[wiz.id]||{firstMet:null,taskCount:0,taskBreakdown:{}};
  var ownedRecs=Array.isArray(roomItems[wiz.id])?roomItems[wiz.id]:[];
  var ownedNormal=getWizNormalItems(wiz.id,roomItems);
  var ownedOnly=ownedRecs.filter(r=>r.type==='only').map(r=>FB_ROOM_ITEMS.find(i=>i.id===r.itemId)).filter(Boolean);
  var ownedEvent=ownedRecs.filter(r=>r.type==='event').map(r=>FB_ROOM_ITEMS.find(i=>i.id===r.itemId)).filter(Boolean);
  var allOwned=[...ownedOnly,...ownedNormal,...ownedEvent];
  var roomLocked=lv<3;
  var roomScore=calcRoomScore(wiz,ownedRecs);
  var roomMsg=getRoomMsg(roomScore,wiz);

  // action comment pool — 방문할 때마다 랜덤 (gameDay+wiz.id 시드로 하루 단위 고정)
  var actionPool=buildActionPool(wiz,ownedRecs,FB_ROOM_ITEMS);
  var actionSlot=(new Date().getHours()>=5&&new Date().getHours()<17)?0:1;
  var actionSeed=hashStr(gameDay()+String(actionSlot)+wiz.id)%actionPool.length;
  var todayAction=actionPool[actionSeed];

  // 임무 TOP3
  var taskEntries=Object.entries(stats.taskBreakdown||{}).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // 대화 기록: LV_UP 대사 (현재 lv-1 이하 모두) + MEET 대사
  var dialogues=[];
  var meetLine=_dlg[wiz.id]&&_dlg[wiz.id].MEET?_dlg[wiz.id].MEET[0]:null;
  if(meetLine)dialogues.push({type:'meet',lv:0,text:meetLine});
  for(var lvk=1;lvk<lv;lvk++){
    var lvLine=_dlg[wiz.id]&&_dlg[wiz.id].LV_UP&&_dlg[wiz.id].LV_UP[lvk]?_dlg[wiz.id].LV_UP[lvk][0]:null;
    if(lvLine)dialogues.push({type:'lvup',lv:lvk,text:lvLine});
  }

  return(
    <div style={{maxWidth:420,margin:'0 auto',paddingBottom:80}}>

      {/* ── 헤더 ── */}
      <div style={{background:wiz.bg,borderBottom:'0.5px solid '+wiz.border,padding:'52px 16px 18px'}}>
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          {/* 아바타 크게 */}
          <Avatar wiz={wiz} size={72}/>
          {/* 텍스트 + 인연 바 */}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:wiz.accent,opacity:0.65,marginBottom:2,letterSpacing:'0.3px'}}>{wiz.m_name||''}</div>
            <div style={{fontSize:20,fontWeight:600,color:wiz.accent,marginBottom:1,lineHeight:1.2}}>{wiz.name}</div>
            <div style={{fontSize:10,color:wiz.accent,opacity:0.55,marginBottom:8}}>{wiz.club}</div>
            {/* 인연 바 */}
            <div style={{height:4,borderRadius:2,background:'rgba(0,0,0,0.12)',overflow:'hidden',marginBottom:4}}>
              <div style={{width:(prog*100)+'%',height:'100%',background:wiz.accent,opacity:0.8,borderRadius:2,transition:'width 0.5s ease'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontSize:11,color:wiz.accent,fontWeight:600}}>운명 Lv.{lv}</span>
              <span style={{fontSize:10,color:wiz.accent,opacity:0.6}}>{aff} / {lv>=5?LV_REQ[4]:threshold}</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{padding:'14px 16px 0'}}>

        {/* ── 관계 섹션 ── */}
        <div style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'14px 16px',marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--color-text-tertiary)',letterSpacing:'0.5px',marginBottom:12}}>관계</div>
          {/* 임무 수행 | 주요 임무 - 2열 */}
          <div style={{display:'flex',gap:0,marginBottom:12}}>
            <div style={{flex:1,textAlign:'center'}}>
              <div style={{fontSize:22,fontWeight:600,color:wiz.accent,lineHeight:1}}>{stats.taskCount||0}</div>
              <div style={{fontSize:10,color:'var(--color-text-tertiary)',marginTop:4}}>함께한 임무</div>
            </div>
            <div style={{width:'0.5px',background:'rgba(0,0,0,0.08)',margin:'4px 0'}}/>
            <div style={{flex:2,paddingLeft:14}}>
              <div style={{fontSize:10,color:'var(--color-text-tertiary)',marginBottom:6}}>주요 임무</div>
              {taskEntries.length>0
                ?taskEntries.map(([name,count])=>(
                  <div key={name} style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:12,color:'var(--color-text-secondary)'}}>{name}</span>
                    <span style={{fontSize:11,color:'var(--color-text-tertiary)'}}>{count}회</span>
                  </div>
                ))
                :<div style={{fontSize:11,color:'var(--color-text-tertiary)',fontStyle:'italic'}}>아직 없음</div>
              }
            </div>
          </div>
          {/* 첫 만남 */}
          <div style={{paddingTop:10,borderTop:'0.5px solid rgba(0,0,0,0.06)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:11,color:'var(--color-text-tertiary)'}}>처음 만난 날</span>
            <span style={{fontSize:12,fontWeight:500,color:'var(--color-text-primary)'}}>{stats.firstMet||'—'}</span>
          </div>
        </div>

        {/* ── 대화 기록 ── */}
        {dialogues.length>0&&(
          <div style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'14px 16px',marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:600,color:'var(--color-text-tertiary)',letterSpacing:'0.5px',marginBottom:10}}>대화 기록</div>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              {dialogues.map((d,i)=>(
                <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{flexShrink:0,marginTop:2}}>
                    <Avatar wiz={wiz} size={28}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:wiz.accent,opacity:0.65,marginBottom:3,letterSpacing:'0.3px'}}>
                      {d.type==='meet'?'처음 만남':'운명 Lv.'+d.lv+' 달성'}
                    </div>
                    <div style={{fontSize:12,color:'var(--color-text-primary)',lineHeight:1.75,fontFamily:"Georgia,'Nanum Myeongjo',serif",fontStyle:'italic',background:wiz.bg,padding:'8px 10px',borderRadius:8,border:'0.5px solid '+wiz.border}}>
                      {d.text}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── 숙소 섹션 ── */}
        <div style={{background:'white',borderRadius:12,border:'0.5px solid rgba(0,0,0,0.08)',padding:'14px 16px',marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:600,color:'var(--color-text-tertiary)',letterSpacing:'0.5px',marginBottom:10}}>숙소</div>
          {roomLocked?(
            <div style={{textAlign:'center',padding:'14px 0',color:'var(--color-text-tertiary)',fontSize:12,fontStyle:'italic',fontFamily:"Georgia,'Nanum Myeongjo',serif",lineHeight:1.8}}>
              아직은 방을 구경할 만한 사이가 아니다.<br/>
              <span style={{fontSize:10}}>(운명 Lv.3 달성 시 개방)</span>
            </div>
          ):(
            <>
              {/* 숙소 상태 메시지 - 박스 없이 정자체 */}
              <div style={{fontSize:12,color:'var(--color-text-secondary)',marginBottom:10,lineHeight:1.6}}>
                {roomMsg}
              </div>
              {/* action comment - 박스 이탤릭 */}
              <div style={{fontSize:12,color:'var(--color-text-primary)',lineHeight:1.8,marginBottom:12,fontStyle:'italic',fontFamily:"Georgia,'Nanum Myeongjo',serif",background:'rgba(0,0,0,0.025)',padding:'10px 12px',borderRadius:8,border:'0.5px solid rgba(0,0,0,0.06)'}}>
                {todayAction}
              </div>
              {/* 소지품 목록 */}
              {allOwned.length>0?(
                <div>
                  <div style={{fontSize:10,color:'var(--color-text-tertiary)',marginBottom:8}}>소지품</div>
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    {allOwned.map(item=>{
                      var desc=item.description||'';
                      var comment=getRoomListComment(item,wiz);
                      var fullText=comment?desc+' '+comment:desc;
                      return(
                        <div key={item.id} style={{display:'flex',gap:6,alignItems:'flex-start'}}>
                          <span style={{color:'var(--color-text-tertiary)',fontSize:10,marginTop:2,flexShrink:0}}>·</span>
                          <div style={{flex:1}}>
                            <span style={{fontSize:12,fontWeight:500,color:'var(--color-text-primary)',marginRight:5}}>{item.name}</span>
                            {item.type==='only'&&(
                              <span style={{fontSize:9,padding:'1px 5px',borderRadius:6,background:wiz.bg,color:wiz.accent,border:'0.5px solid '+wiz.border,verticalAlign:'middle'}}>전용</span>
                            )}
                            {fullText&&(
                              <div style={{fontSize:11,color:'var(--color-text-tertiary)',marginTop:2,lineHeight:1.65}}>{fullText}</div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ):(
                <div style={{fontSize:11,color:'var(--color-text-tertiary)',textAlign:'center',padding:'8px 0',fontStyle:'italic'}}>아직 선물받은 물건이 없다.</div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

        <div style={{width:36,height:4,borderRadius:2,background:'rgba(0,0,0,0.12)',margin:'0 auto 16px'}}/>

        <div style={{overflowY:'auto',flex:1,display:'flex',flexDirection:'column',gap:8}}>
          {clubWizards.length>0&&(
            <>
              <div style={{fontSize:10,fontWeight:600,letterSpacing:'0.5px',color:'var(--color-primary)',marginBottom:2}}>✦ {targetClub}</div>

                <button key={wiz.id} onClick={function(){onSelect(wiz);}}
                  style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:10,border:'1.5px solid '+wiz.border,background:wiz.bg,cursor:'pointer',textAlign:'left',fontFamily:'inherit'}}>
                  <Avatar wiz={wiz} size={36}/>
                  <div>
                    <div style={{fontSize:13,fontWeight:500,color:wiz.accent}}>{wiz.name}</div>
                    <div style={{fontSize:10,color:wiz.accent,opacity:0.65}}>{wiz.club}</div>
                  </div>
                </button>
              );})}
              {otherWizards.length>0&&<div style={{height:'0.5px',background:'rgba(0,0,0,0.08)',margin:'4px 0'}}/>}
            </>
